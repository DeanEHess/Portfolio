<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>자산 대시보드</title>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="자산현황"/>
  <meta name="theme-color" content="#0f172a"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0f172a; color: #e2e8f0; font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif; min-height: 100vh; }
    input, button { outline: none; font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    ::-webkit-scrollbar { height: 4px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    #app { max-width: 600px; margin: 0 auto; padding: 16px 14px; }

    /* 로딩바 */
    .loading-bar { height: 3px; background: #1e293b; border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
    .loading-bar-inner { height: 100%; background: linear-gradient(90deg, #6366f1, #3b82f6, #6366f1); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .cell-loading { color: #475569; animation: blink 1s infinite; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* 헤더 */
    .hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .hdr-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .hdr-sub { font-size: 11px; color: #475569; margin-top: 3px; }
    .hdr-rate { font-size: 12px; color: #94a3b8; font-weight: 600; margin-top: 2px; }
    .hdr-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .btn { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 7px 13px; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .btn.on { background: #6366f1; }

    /* 탭 */
    .tabs { display: flex; gap: 4px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
    .tab { background: #1e293b; border: none; color: #64748b; padding: 7px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer; flex-shrink: 0; }
    .tab.on { background: #6366f1; color: #fff; font-weight: 700; }

    /* 카드 */
    .card { background: #1e293b; border-radius: 16px; padding: 14px; margin-bottom: 12px; border: 1px solid #334155; }
    .card-grad { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid #1e293b; border-radius: 16px; padding: 18px 16px; margin-bottom: 12px; }
    .card-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-title { font-weight: 700; font-size: 14px; }
    .card-total { font-weight: 800; font-size: 17px; }

    /* 테이블 */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { padding: 5px 6px; color: #475569; font-weight: 600; font-size: 10px; border-bottom: 1px solid #334155; white-space: nowrap; }
    td { padding: 8px 6px; vertical-align: middle; border-bottom: 1px solid #0f172a; }
    .r { text-align: right; }
    .ticker { font-weight: 600; font-size: 12px; }
    .name { font-size: 10px; color: #64748b; margin-top: 1px; }
    .price-na { color: #475569; font-size: 10px; }

    /* 인풋 */
    .inp { background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; padding: 4px 6px; font-size: 11px; width: 100%; }
    .inp-r { text-align: right; }
    .inp-l { text-align: left; }

    /* 버튼 */
    .add-btn { margin-top: 8px; background: transparent; border: 1px dashed #334155; color: #475569; padding: 6px 12px; border-radius: 8px; font-size: 12px; width: 100%; cursor: pointer; }
    .del-btn { background: #7f1d1d; border: none; color: #fca5a5; border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; }

    /* 수익률 */
    .up { color: #ef4444; font-weight: 700; }
    .dn { color: #3b82f6; font-weight: 700; }
    .na { color: #94a3b8; }

    /* 도넛 툴팁 */
    #tip { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 10px 16px; font-size: 13px; color: #e2e8f0; z-index: 999; text-align: center; min-width: 180px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); display: none; }
  </style>
</head>
<body>
<div id="app"></div>
<div id="tip"></div>
<script>
// ─── 상수 ────────────────────────────────────────────────────
const WORKER  = "https://asset-proxy.omyakryl0541.workers.dev";
const COLORS  = ["#6366f1","#f59e0b","#10b981","#3b82f6","#f43f5e","#a855f7","#06b6d4","#84cc16","#f97316","#ec4899"];
const TAB_LABELS = { overview:"전체", us:"미국주식", krx:"한국주식", pen:"연금저축", irp:"IRP", isa:"ISA", coins:"코인", cash:"현금" };
const DEFAULT_TAB_ORDER = ["overview","us","krx","pen","irp","isa","coins","cash"];

const US_DB = { NVO:"Novo Nordisk", TQQQ:"ProShares UltraPro QQQ", JEPQ:"JPMorgan Nasdaq Eq Premium", QLD:"ProShares Ultra QQQ", SGOV:"iShares 0-3M Treasury", QQQ:"Invesco QQQ", SPY:"SPDR S&P500", VOO:"Vanguard S&P500", VTI:"Vanguard Total Market", NVDA:"NVIDIA", AAPL:"Apple", MSFT:"Microsoft", GOOGL:"Alphabet", AMZN:"Amazon", META:"Meta", TSLA:"Tesla", SOXL:"Direxion Semi 3X", UPRO:"ProShares UltraPro S&P500", TLT:"iShares 20Y Treasury", GLD:"SPDR Gold", GLDM:"SPDR Gold MiniShares", PLTR:"Palantir", AMD:"AMD", JEPI:"JPMorgan Equity Premium", SCHD:"Schwab US Dividend", EQIX:"Equinix", MCD:"McDonald's", RTX:"RTX Corp", URA:"Global X Uranium", EQT:"EQT Corp" };
const KRX_ETF_DB = { "381170":"TIGER 미국테크TOP10 INDXX", "360750":"TIGER 미국S&P500", "381180":"TIGER 미국필라델피아반도체", "411060":"ACE KRX금현물", "367380":"ACE 미국나스닥100", "360200":"ACE 미국S&P500", "438080":"ACE 미국S&P500미국채혼합50액티브", "069500":"KODEX 200", "133690":"TIGER 미국나스닥100", "379800":"KODEX 미국S&P500", "448290":"KODEX 미국배당다우존스", "0072R0":"TIGER KRX금현물" };
const KRX_STOCK_DB = { "005930":"삼성전자", "000660":"SK하이닉스", "035420":"NAVER", "035720":"카카오", "000270":"기아", "005380":"현대차", "051910":"LG화학", "006400":"삼성SDI", "207940":"삼성바이오로직스", "068270":"셀트리온", "105560":"KB금융", "055550":"신한지주", "003550":"LG", "066570":"LG전자", "017670":"SK텔레콤", "030200":"KT" };
const GECKO_ID = { BTC:"bitcoin", ETH:"ethereum", XRP:"ripple", SOL:"solana", DOGE:"dogecoin", ADA:"cardano", MATIC:"matic-network", AVAX:"avalanche-2", DOT:"polkadot", LINK:"chainlink", UNI:"uniswap", ATOM:"cosmos", LTC:"litecoin", BCH:"bitcoin-cash", NEAR:"near", SHIB:"shiba-inu", TRX:"tron", XLM:"stellar", KLAY:"klay-token" };

// ─── 저장소 ──────────────────────────────────────────────────
const SK = "asset_v6";
const DEFAULT_DATA = {
  us:[], krx:[], pen:[], irp:[], isa:[],
  coins:[], cash:[{id:"ca1",n:"현금",a:0}],
  tabOrder:[...DEFAULT_TAB_ORDER],
  goals:[
    {id:"g1", year:2027, target:50000000,  snapshot:null},
    {id:"g2", year:2028, target:100000000, snapshot:null},
    {id:"g3", year:2030, target:300000000, snapshot:null},
    {id:"g4", year:2033, target:500000000, snapshot:null},
  ],
};

function loadData() {
  try {
    const raw = localStorage.getItem(SK);
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_DATA));
    const d = JSON.parse(raw);
    if (!d.krx)                 d.krx = [];
    if (!d.coins)               d.coins = [];
    if (!Array.isArray(d.cash)) d.cash = [{id:"ca1",n:"현금",a:typeof d.cash==="number"?d.cash:0}];
    if (!d.tabOrder)            d.tabOrder = [...DEFAULT_TAB_ORDER];
    // 새 탭이 추가됐을 때 기존 tabOrder에 없으면 자동 추가
    DEFAULT_TAB_ORDER.forEach(k => { if (!d.tabOrder.includes(k)) d.tabOrder.splice(d.tabOrder.indexOf("coins"), 0, k); });
    if (!d.isa)                 d.isa = [];
    if (!d.goals)               d.goals = JSON.parse(JSON.stringify(DEFAULT_DATA.goals));
    return d;
  } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function saveData() { try { localStorage.setItem(SK, JSON.stringify(ST)); } catch {} }

// ─── 앱 상태 ─────────────────────────────────────────────────
const ST      = loadData();
let usdKrw    = null;
let px        = {};
let loading   = false;
let lastUp    = null;
let editMode  = false;
let tab       = "overview";

// ─── 포맷 ────────────────────────────────────────────────────
const won  = n => n ? "₩" + Math.round(n).toLocaleString("ko-KR") : "—";
const usd  = n => n ? "$" + Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}) : "—";
const fPct = n => n==null ? "—" : (n>=0?"+":"")+n.toFixed(2)+"%";
const gCls = n => n==null ? "na" : n>=0 ? "up" : "dn";

// ─── 계산 ────────────────────────────────────────────────────
const usVal    = item => ((px[item.t]||item.a||0)) * item.q * (usdKrw||0);
const krxVal   = item => ((px[item.t]||item.a||0)) * item.q;
const usGp     = item => { const p=px[item.t]; return (p&&item.a&&item.q)?((p-item.a)/item.a)*100:null; };
const krxGp    = item => { const p=px[item.t]; return (p&&item.a&&item.q)?((p-item.a)/item.a)*100:null; };
const usPriceKrw = item => { const p=px[item.t]; return (p&&usdKrw)?p*usdKrw:null; };
const secTotal = (list,isUSD) => list.reduce((s,x)=>s+(isUSD?usVal(x):krxVal(x)),0);

// 평가금액 내림차순 정렬 (현재가 있는 것 우선)
function sortByVal(list, isUSD) {
  return [...list].sort((a,b) => {
    // 실제 평가금액 함수와 동일한 기준으로 정렬 (불일치 방지)
    const va = isUSD ? usVal(a) : krxVal(a);
    const vb = isUSD ? usVal(b) : krxVal(b);
    return vb - va;
  });
}

// ─── API fetch ───────────────────────────────────────────────
async function fetchAll() {
  if (loading) return;
  loading = true;
  render();

  const usTickers   = ST.us.map(s=>s.t).filter(Boolean);
  const krxCodes    = [...new Set([...ST.pen,...ST.irp,...ST.krx,...ST.isa].map(e=>e.t).filter(Boolean))];
  const coinTickers = [...new Set(ST.coins.map(x=>x.t).filter(Boolean))];
  const coinIds     = coinTickers.map(t=>GECKO_ID[t.toUpperCase()]).filter(Boolean);

  try {
    const params = new URLSearchParams({
      type:"all", us:usTickers.join(","), krx:krxCodes.join(","), coins:coinIds.join(",")
    });
    const d = await fetch(WORKER+"?"+params).then(r=>r.json());
    if (d.fx)  usdKrw = d.fx;
    Object.assign(px, d.us||{});
    Object.assign(px, d.krx||{});
    coinTickers.forEach(t => {
      const id = GECKO_ID[t.toUpperCase()];
      if (id && d.coins?.[id]?.krw) px[t] = d.coins[id].krw;
    });
  } catch {}

  loading = false;
  lastUp  = new Date();
  render();
}

// ─── SVG 도넛 ────────────────────────────────────────────────
// segs: [{l, v, c?}], interactive: 클릭 이벤트 여부
function buildDonutSVG(segs, total, cx, cy, R, r, interactive) {
  if (!segs.length || !total) return "";
  // 단일 종목: 완전한 원
  if (segs.length === 1) {
    const col = segs[0].c || COLORS[0];
    const extra = interactive
      ? ` data-label="${segs[0].l}" data-pct="100.0" data-val="${Math.round(segs[0].v)}" class="donut-seg" style="cursor:pointer"`
      : "";
    return `<circle cx="${cx}" cy="${cy}" r="${(R+r)/2}" fill="none" stroke="${col}" stroke-width="${R-r}"${extra}/>`;
  }
  let ang = -Math.PI/2;
  return segs.map((seg,i) => {
    const a = seg.v/total * Math.PI*2;
    const x1=cx+R*Math.cos(ang), y1=cy+R*Math.sin(ang);
    ang += a;
    const x2=cx+R*Math.cos(ang), y2=cy+R*Math.sin(ang);
    const xi1=cx+r*Math.cos(ang-a), yi1=cy+r*Math.sin(ang-a);
    const xi2=cx+r*Math.cos(ang),   yi2=cy+r*Math.sin(ang);
    const lg = a > Math.PI ? 1 : 0;
    const col = seg.c || COLORS[i%COLORS.length];
    const pct = (seg.v/total*100).toFixed(1);
    const extra = interactive
      ? ` data-label="${seg.l}" data-pct="${pct}" data-val="${Math.round(seg.v)}" class="donut-seg" style="cursor:pointer"`
      : "";
    return `<path d="M${xi1},${yi1}L${x1},${y1}A${R},${R} 0 ${lg},1 ${x2},${y2}L${xi2},${yi2}A${r},${r} 0 ${lg},0 ${xi1},${yi1}Z" fill="${col}" stroke="#0f172a" stroke-width="2"${extra}/>`;
  }).join("");
}

// 섹션 비중 도넛 카드 (평가금액 순 정렬된 items 받음)
function buildDonutCard(items, title) {
  if (!items.length) return "";
  const total = items.reduce((s,x)=>s+x.v, 0);
  if (!total) return "";
  const segs  = items.map((x,i) => ({l:x.l, v:x.v, c:COLORS[i%COLORS.length]}));
  const paths = buildDonutSVG(segs, total, 90, 90, 75, 45, true);
  const legend = segs.map(seg =>
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<div style="width:8px;height:8px;border-radius:2px;background:'+seg.c+'"></div>'
    +'<span style="font-size:11px">'+seg.l+'</span></div>'
    +'<div>'
    +'<span style="font-size:11px;font-weight:600">'+won(seg.v)+'</span>'
    +'<span style="font-size:10px;color:#475569;margin-left:4px">'+(seg.v/total*100).toFixed(1)+'%</span>'
    +'</div></div>'
  ).join("");
  return '<div class="card" style="margin-top:4px">'
    +'<div class="card-title" style="margin-bottom:12px">'+title+' 비중</div>'
    +'<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">'
    +'<svg width="180" height="180" viewBox="0 0 180 180" style="flex-shrink:0">'
    +paths
    +'<text x="90" y="85" text-anchor="middle" fill="#94a3b8" font-size="10" class="donut-ct">탭하여</text>'
    +'<text x="90" y="100" text-anchor="middle" fill="#94a3b8" font-size="10" class="donut-cb">확인</text>'
    +'</svg>'
    +'<div style="flex:1;min-width:150px">'+legend+'</div>'
    +'</div></div>';
}

// ─── 테이블 행 ────────────────────────────────────────────────
function buildRow(item, key, isUSD, valFn, gpFn, priceKrwFn, avgFmt) {
  const priceKrw = priceKrwFn(item);
  const val = valFn(item);
  const gp  = gpFn(item);
  const priceStr = priceKrw
    ? won(priceKrw)
    : (loading ? '<span class="cell-loading">···</span>' : '<span class="price-na">—</span>');
  if (editMode) {
    const db = key==="us" ? US_DB : key==="krx" ? KRX_STOCK_DB : key==="coins" ? null : KRX_ETF_DB;
    return '<tr data-id="'+item.id+'" data-key="'+key+'" data-usd="'+isUSD+'">'
      +'<td style="min-width:110px">'
      +'<input class="inp inp-l" style="font-weight:600;font-size:12px;margin-bottom:3px" data-f="t" data-id="'+item.id+'" value="'+item.t+'" placeholder="티커/코드"/>'
      +'<input class="inp inp-l" style="font-size:10px;color:#94a3b8" data-f="n" data-id="'+item.id+'" value="'+(item.n||"")+'" placeholder="종목명"/>'
      +'</td>'
      +'<td class="r"><input class="inp inp-r" type="number" '+(key==="coins"?'step="0.0001" ':'')+' data-f="q" data-id="'+item.id+'" value="'+(item.q||"")+'"/></td>'
      +'<td class="r"><input class="inp inp-r" type="number" data-f="a" data-id="'+item.id+'" value="'+(item.a||"")+'" placeholder="'+(avgFmt==="USD"?"USD":"KRW")+'"/></td>'
      +'<td class="r">'+priceStr+'</td>'
      +'<td class="r" style="font-weight:600" data-calc="val">'+(val?won(val):"₩0")+'</td>'
      +'<td class="r '+gCls(gp)+'" data-calc="gp">'+fPct(gp)+'</td>'
      +'<td><button class="del-btn" data-del="'+item.id+'" data-key="'+key+'">✕</button></td>'
      +'</tr>';
  }
  return '<tr>'
    +'<td style="min-width:110px"><div class="ticker">'+item.t+'</div><div class="name">'+(item.n||"")+'</div></td>'
    +'<td class="r">'+(key==="coins"?item.q:item.q)+'</td>'
    +'<td class="r" style="color:#94a3b8">'+(avgFmt==="USD"?usd(item.a):won(item.a))+'</td>'
    +'<td class="r">'+priceStr+'</td>'
    +'<td class="r" style="font-weight:600">'+(val?won(val):"₩0")+'</td>'
    +'<td class="r '+gCls(gp)+'" style="font-weight:700">'+fPct(gp)+'</td>'
    +'</tr>';
}

// ─── 섹션 (주식/ETF/코인 공통) ───────────────────────────────
function buildSection(title, key, list, accent, isUSD) {
  const valFn      = isUSD ? usVal  : krxVal;
  const gpFn       = isUSD ? usGp   : krxGp;
  const priceKrwFn = isUSD ? usPriceKrw : item => px[item.t]||null;
  const avgFmt     = isUSD ? "USD" : "KRW";
  const avgLabel   = isUSD ? "평단(USD)" : "평단(원)";
  const sorted     = sortByVal(list, isUSD);
  const total      = secTotal(list, isUSD);
  const rows       = sorted.map(item => buildRow(item, key, isUSD, valFn, gpFn, priceKrwFn, avgFmt)).join("");

  // 도넛용 데이터 (정렬된 순서 유지, 평가금액 > 0인 것만)
  const donutItems = sorted
    .filter(x => x.t && x.q > 0 && valFn(x) > 0)
    .map(x => ({l: x.t, v: valFn(x)}));

  return '<div class="card" style="border-top:3px solid '+accent+'">'
    +'<div class="card-hdr">'
    +'<span class="card-title">'+title+'</span>'
    +'<span class="card-total" style="color:'+accent+'">'+(total?won(total):"₩0")+'</span>'
    +'</div>'
    +'<div class="tbl-wrap"><table>'
    +'<thead><tr>'
    +'<th style="text-align:left">종목</th>'
    +'<th class="r">수량</th>'
    +'<th class="r">'+avgLabel+'</th>'
    +'<th class="r">현재가(원)</th>'
    +'<th class="r">평가금액</th>'
    +'<th class="r">수익률</th>'
    +(editMode?'<th></th>':"")
    +'</tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'</table></div>'
    +(editMode?'<button class="add-btn" data-add="'+key+'">+ 종목 추가</button>':"")
    +buildDonutCard(donutItems, title)
    +'</div>';
}

// ─── 현금 섹션 ───────────────────────────────────────────────
function buildCash() {
  const sorted = [...ST.cash].sort((a,b)=>(Number(b.a)||0)-(Number(a.a)||0));
  const cashT  = sorted.reduce((s,x)=>s+(Number(x.a)||0), 0);
  const rows   = sorted.map(item =>
    editMode
      ? '<tr data-id="'+item.id+'" data-key="cash">'
        +'<td><input class="inp inp-l" data-f="n" data-id="'+item.id+'" value="'+item.n+'" placeholder="예) 예금, 적금, 주택청약"/></td>'
        +'<td class="r"><input class="inp inp-r" type="number" data-f="a" data-id="'+item.id+'" value="'+(item.a||"")+'"/></td>'
        +'<td><button class="del-btn" data-del="'+item.id+'" data-key="cash">✕</button></td>'
        +'</tr>'
      : '<tr>'
        +'<td style="font-size:13px;font-weight:500">'+item.n+'</td>'
        +'<td class="r" style="font-size:13px;font-weight:600">'+(won(item.a)||"₩0")+'</td>'
        +'</tr>'
  ).join("");

  // 도넛용 데이터 (금액 > 0인 것만, 이미 정렬됨)
  const donutItems = sorted
    .filter(x => Number(x.a) > 0)
    .map(x => ({l: x.n, v: Number(x.a)}));

  return '<div class="card" style="border-top:3px solid #64748b">'
    +'<div class="card-hdr">'
    +'<span class="card-title">현금 / 예금</span>'
    +'<span class="card-total" style="color:#94a3b8">'+(cashT?won(cashT):"₩0")+'</span>'
    +'</div>'
    +'<div class="tbl-wrap"><table>'
    +'<thead><tr>'
    +'<th style="text-align:left">항목</th>'
    +'<th class="r">금액</th>'
    +(editMode?'<th></th>':"")
    +'</tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'</table></div>'
    +(editMode?'<button class="add-btn" data-add="cash">+ 항목 추가</button>':"")
    +buildDonutCard(donutItems, "현금/예금")
    +'</div>';
}

// ─── 목표 추적 ───────────────────────────────────────────────
function buildGoals(tot) {
  const now     = new Date();
  const curYear = now.getFullYear();
  const goals   = ST.goals || [];
  if (!goals.length) return "";

  // 연도 지난 목표에 snapshot 저장 (미달성 기록)
  goals.forEach(g => {
    if (curYear > g.year && g.snapshot === null) {
      g.snapshot = tot;  // 기간 종료 시점 자산 기록
      saveData();
    }
  });

  const rows = goals.map((g, i) => {
    const isExpired  = curYear > g.year;
    const isCurrent  = !isExpired && (i===0 || curYear > goals[i-1].year);
    const isAchieved = tot >= g.target || (isExpired && g.snapshot >= g.target);
    const val        = isExpired ? (g.snapshot||0) : tot;
    const pct        = Math.min(100, Math.round(val / g.target * 100));
    const isFuture   = !isExpired && !isCurrent;

    let statusIcon, statusColor, barColor;
    if (isAchieved)       { statusIcon="✅"; statusColor="#10b981"; barColor="#10b981"; }
    else if (isExpired)   { statusIcon="⚠️"; statusColor="#f59e0b"; barColor="#f59e0b"; }
    else if (isCurrent)   { statusIcon="🎯"; statusColor="#6366f1"; barColor="#6366f1"; }
    else                  { statusIcon="";   statusColor="#475569"; barColor="#334155"; }

    const targetStr = g.target >= 1e8
      ? (g.target/1e8).toFixed(g.target%1e8===0?0:1)+"억"
      : (g.target/1e4).toFixed(0)+"만";

    if (isFuture) {
      return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;opacity:0.4">'
        +'<div style="font-size:11px;color:#475569;width:36px;flex-shrink:0">'+g.year+'</div>'
        +'<div style="font-size:12px;color:#475569;width:52px;flex-shrink:0">'+targetStr+'</div>'
        +'<div style="flex:1;height:4px;background:#1e293b;border-radius:2px"></div>'
        +'</div>';
    }

    return '<div style="margin-bottom:12px">'
      // 헤더 행
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'
      +'<span style="font-size:12px">'+statusIcon+'</span>'
      +'<span style="font-size:12px;color:#94a3b8;width:36px;flex-shrink:0">'+g.year+'</span>'
      +'<span style="font-size:12px;font-weight:600;color:#e2e8f0;flex:1">'+targetStr+'</span>'
      +'<span style="font-size:12px;font-weight:700;color:'+statusColor+'">'+pct+'%</span>'
      +(isExpired&&!isAchieved?'<span style="font-size:10px;color:#f59e0b;margin-left:4px">기간종료</span>':"")
      +'</div>'
      // 진행바
      +'<div style="height:6px;background:#1e293b;border-radius:3px;overflow:hidden">'
      +'<div style="height:100%;width:'+pct+'%;background:'+barColor+';border-radius:3px;transition:width 0.5s"></div>'
      +'</div>'
      // 현재 금액
      +(isCurrent||isExpired
        ? '<div style="font-size:10px;color:#475569;margin-top:3px;text-align:right">'
          +(isExpired?'종료시 ':'현재 ')+won(val)
          +(isExpired&&!isAchieved?' · '+won(g.target-g.snapshot)+" 미달":'')
          +'</div>'
        : "")
      +'</div>';
  }).join("");

  // 편집 모드: 목표 수정 UI
  const editRows = editMode ? goals.map(g =>
    '<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">'
    +'<input class="inp inp-r" type="number" style="width:56px" data-gf="year" data-gid="'+g.id+'" value="'+g.year+'" placeholder="연도"/>'
    +'<input class="inp inp-r" type="number" style="flex:1" data-gf="target" data-gid="'+g.id+'" value="'+g.target+'" placeholder="목표금액(원)"/>'
    +'<button class="del-btn" data-gdel="'+g.id+'">✕</button>'
    +'</div>'
  ).join("")
  +'<button class="add-btn" id="btn-add-goal">+ 목표 추가</button>'
  : "";

  return '<div style="background:#1e293b;border-radius:16px;padding:14px;margin-bottom:12px;border:1px solid #334155;border-top:3px solid #6366f1">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
    +'<span style="font-weight:700;font-size:14px">📈 목표 달성 현황</span>'
    +'</div>'
    +(editMode ? editRows : rows)
    +'</div>';
}

// ─── 전체 현황 ───────────────────────────────────────────────
function buildOverview() {
  const usT    = secTotal(ST.us, true);
  const krxT   = secTotal(ST.krx, false);
  const penT   = secTotal(ST.pen, false);
  const irpT   = secTotal(ST.irp, false);
  const isaT   = secTotal(ST.isa, false);
  const coinsT = ST.coins.reduce((s,x)=>s+krxVal(x), 0);
  const cashT  = ST.cash.reduce((s,x)=>s+(Number(x.a)||0), 0);
  const tot    = usT+krxT+penT+irpT+isaT+coinsT+cashT;
  const pp     = v => tot>0 ? (v/tot*100).toFixed(1) : "0.0";

  const segs = [
    {l:"미국주식",v:usT,   c:"#6366f1"},
    {l:"한국주식",v:krxT,  c:"#f43f5e"},
    {l:"연금저축",v:penT,  c:"#f59e0b"},
    {l:"IRP",    v:irpT,  c:"#10b981"},
    {l:"ISA",    v:isaT,  c:"#f43f5e"},
    {l:"코인",   v:coinsT,c:"#3b82f6"},
    {l:"현금",   v:cashT, c:"#475569"},
  ].filter(s=>s.v>0);

  const lbl    = tot>=1e8?(tot/1e8).toFixed(1)+"억":(tot/1e4).toFixed(0)+"만";
  const paths  = buildDonutSVG(segs, tot, 80, 80, 65, 38, true);
  const legend = segs.map(s =>
    '<div class="legend-item" data-label="'+s.l+'" style="display:flex;justify-content:space-between;margin-bottom:7px;align-items:center;transition:opacity 0.2s">'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<div style="width:8px;height:8px;border-radius:2px;background:'+s.c+'"></div>'
    +'<span style="font-size:12px">'+s.l+'</span></div>'
    +'<div>'
    +'<span style="font-size:12px;font-weight:600">'+won(s.v)+'</span>'
    +'<span style="font-size:10px;color:#475569;margin-left:4px">'+pp(s.v)+'%</span>'
    +'</div></div>'
  ).join("");

  return buildGoals(tot)
    +'<div class="card-grad">'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:6px">총 평가 자산</div>'
    +'<div style="font-size:32px;font-weight:800;letter-spacing:-1px">'+(tot?won(tot):"₩0")+'</div>'
    +'<div style="margin-top:8px;display:flex;gap:14px;flex-wrap:wrap">'
    +segs.map(s=>'<span style="font-size:11px;color:#64748b">'+s.l+' <b style="color:#94a3b8">'+pp(s.v)+'%</b></span>').join("")
    +'</div></div>'
    +'<div class="card">'
    +'<div class="card-title" style="margin-bottom:12px">자산 배분</div>'
    +(segs.length
      ? '<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">'
        +'<svg id="overview-donut" width="160" height="160" viewBox="0 0 160 160" style="flex-shrink:0">'
        +paths
        +'<text x="80" y="75" text-anchor="middle" fill="#94a3b8" font-size="9" class="donut-ct">탭하여</text>'
        +'<text x="80" y="88" text-anchor="middle" fill="#94a3b8" font-size="9" class="donut-cb">확인</text>'
        +'</svg>'
        +'<div style="flex:1;min-width:140px">'+legend+'</div>'
        +'</div>'
      : '<div style="color:#475569;text-align:center;padding:16px;font-size:12px">자산을 입력해주세요</div>')
    +'</div>';
}

// ─── 렌더 ────────────────────────────────────────────────────
function render() {
  try {
    document.getElementById("app").innerHTML = buildPage();
    bindEvents();
    saveData();
  } catch(e) {
    document.getElementById("app").innerHTML =
      '<div style="padding:20px;color:#ef4444;font-size:13px">오류: '+e.message+'<br><pre style="font-size:10px;color:#94a3b8;white-space:pre-wrap">'+e.stack+'</pre></div>';
  }
}

// ─── 도넛 팝업 & 라인 ────────────────────────────────────────
function clearOverlayLine(svg) {
  svg?.parentElement?.querySelector(".donut-popup")?.remove();
  if (svg?.parentElement) {
    const legend = svg.parentElement.querySelector("div");
    if (legend) legend.style.visibility = "";
    svg.parentElement.style.position = "";
  }
}

function showDonutPopup(seg, svg, card) {
  clearOverlayLine(svg);

  // 범례 div (오른쪽 공간)
  const flex   = svg?.parentElement;
  const legend = flex?.querySelector("div");  // 첫 번째 div = 범례
  if (!flex || !legend) return;

  // 범례 내용을 팝업으로 교체 (범례 숨기고 같은 자리에 팝업)
  legend.style.visibility = "hidden";

  // 팝업을 범례 자리에 absolute로 올림
  const popup = document.createElement("div");
  popup.className = "donut-popup";
  popup.style.cssText = [
    "position:absolute",
    "background:#0f172a",
    "border:1px solid #6366f1",
    "border-radius:10px",
    "padding:12px 14px",
    "box-shadow:0 0 12px rgba(99,102,241,0.3)",
    "pointer-events:none",
  ].join(";");
  popup.innerHTML =
    '<div style="font-size:11px;color:#94a3b8;margin-bottom:4px">'+seg.dataset.label+'</div>'
    +'<div style="font-size:16px;font-weight:800;color:#e2e8f0">₩'+Number(seg.dataset.val).toLocaleString("ko-KR")+'</div>'
    +'<div style="font-size:14px;font-weight:700;color:#6366f1;margin-top:3px">'+seg.dataset.pct+'%</div>';

  // flex 컨테이너를 relative로 설정하고 팝업 삽입
  flex.style.position = "relative";
  // 범례 위치 기준으로 팝업 위치 계산
  const legendRect  = legend.getBoundingClientRect();
  const flexRect    = flex.getBoundingClientRect();
  popup.style.top   = (legendRect.top - flexRect.top) + "px";
  popup.style.left  = (legendRect.left - flexRect.left) + "px";
  popup.style.width = legendRect.width + "px";
  flex.appendChild(popup);

  clearTimeout(window._popTimer);
  window._popTimer = setTimeout(()=>{
    clearOverlayLine(svg);
    legend.style.visibility = "";
    flex.style.position = "";
    svg?.querySelectorAll(".donut-seg").forEach(s=>{ s.style.opacity="1"; delete s.dataset.active; });
    const ct=svg?.querySelector(".donut-ct"); if(ct) ct.textContent="탭하여";
    const cb=svg?.querySelector(".donut-cb"); if(cb) cb.textContent="확인";
  }, 3000);
}

// ─── 이벤트 ──────────────────────────────────────────────────
function getList(key) {
  return {us:ST.us,krx:ST.krx,pen:ST.pen,irp:ST.irp,isa:ST.isa,coins:ST.coins,cash:ST.cash}[key]||null;
}

function bindEvents() {
  document.getElementById("btn-refresh")?.addEventListener("click", fetchAll);
  document.getElementById("btn-backup")?.addEventListener("click", backupData);
  document.getElementById("inp-restore")?.addEventListener("change", e => restoreData(e.target.files[0]));
  document.getElementById("btn-edit")?.addEventListener("click", ()=>{ editMode=!editMode; render(); });

  // 탭 전환
  document.querySelectorAll("[data-tab]").forEach(b =>
    b.addEventListener("click", ()=>{ tab=b.dataset.tab; render(); })
  );

  // 탭 드래그
  if (editMode) {
    let dragKey = null;
    document.querySelectorAll("[data-drag]").forEach(b => {
      b.addEventListener("dragstart", e=>{ dragKey=b.dataset.drag; e.dataTransfer.effectAllowed="move"; b.style.opacity="0.4"; });
      b.addEventListener("dragend",   ()=>b.style.opacity="1");
      b.addEventListener("dragover",  e=>{ e.preventDefault(); b.style.background="#334155"; });
      b.addEventListener("dragleave", ()=>b.style.background=tab===b.dataset.drag?"#6366f1":"#1e293b");
      b.addEventListener("drop", e=>{
        e.preventDefault();
        const toKey=b.dataset.drag;
        if (dragKey&&toKey&&dragKey!==toKey) {
          const o=ST.tabOrder, fi=o.indexOf(dragKey), ti=o.indexOf(toKey);
          if (fi>-1&&ti>-1){o.splice(fi,1);o.splice(ti,0,dragKey);}
          saveData(); render();
        }
      });
    });
  }

  // 목표 추가
  document.getElementById("btn-add-goal")?.addEventListener("click", ()=>{
    ST.goals.push({id:"g"+Date.now(), year:new Date().getFullYear()+1, target:100000000, snapshot:null});
    render();
  });

  // 목표 삭제
  document.querySelectorAll("[data-gdel]").forEach(b=>
    b.addEventListener("click", ()=>{
      const i=ST.goals.findIndex(g=>g.id===b.dataset.gdel);
      if(i>-1) ST.goals.splice(i,1);
      render();
    })
  );

  // 목표 인풋
  document.querySelectorAll(".inp[data-gid]").forEach(inp=>{
    inp.addEventListener("input", e=>{
      const g=ST.goals.find(x=>x.id===inp.dataset.gid);
      if(!g) return;
      g[inp.dataset.gf] = Number(e.target.value)||0;
      saveData();
    });
  });

  // 종목 추가
  document.querySelectorAll("[data-add]").forEach(b =>
    b.addEventListener("click", ()=>{
      const k=b.dataset.add, id=k+Date.now();
      if (k==="cash") ST.cash.push({id,n:"새 항목",a:0});
      else getList(k)?.push({id,t:"",n:"",q:0,a:0});
      render();
    })
  );

  // 종목 삭제
  document.querySelectorAll("[data-del]").forEach(b =>
    b.addEventListener("click", ()=>{
      const list=getList(b.dataset.key);
      if (list){const i=list.findIndex(x=>x.id===b.dataset.del);if(i>-1)list.splice(i,1);}
      render();
    })
  );

  // 인풋 — 리렌더 없이 상태+셀만 업데이트
  document.querySelectorAll(".inp[data-id]").forEach(inp => {
    const id=inp.dataset.id, f=inp.dataset.f;
    const tr=inp.closest("tr");
    const key=tr?.dataset.key;
    const isUSD=tr?.dataset.usd==="true";
    const list=getList(key);
    const item=list?.find(x=>x.id===id);
    if (!item) return;
    inp.addEventListener("input", e=>{
      const v=e.target.value;
      if (f==="t") {
        const upper=v.toUpperCase();
        item.t=upper; e.target.value=upper;
        const db=key==="us"?US_DB:key==="krx"?KRX_STOCK_DB:key==="coins"?null:KRX_ETF_DB;
        const auto=db?.[upper];
        if (auto){item.n=auto;const ni=tr.querySelector('[data-f="n"]');if(ni)ni.value=auto;}
      } else if (f==="n") {
        item.n=v;
      } else {
        item[f]=Number(v)||0;
        if (key!=="cash") {
          const valFn=isUSD?usVal:krxVal;
          const gpFn =isUSD?usGp :krxGp;
          const vc=tr.querySelector("[data-calc='val']");
          const gc=tr.querySelector("[data-calc='gp']");
          if (vc) vc.textContent=won(valFn(item))||"₩0";
          if (gc){gc.textContent=fPct(gpFn(item));gc.className="r "+gCls(gpFn(item));}
        }
      }
      saveData();
    });
  });

  // 도넛 조각 클릭
  document.querySelectorAll(".donut-seg").forEach(seg => {
    seg.addEventListener("click", ()=>{
      const svg      = seg.closest("svg");
      const isOverview = svg?.id === 'overview-donut';
      const allSegs  = svg?.querySelectorAll(".donut-seg") || [];
      const isActive = seg.dataset.active === "1";

      // 토글: 이미 선택된 조각 클릭 시 해제
      if (isActive) {
        allSegs.forEach(s => { s.style.opacity="1"; delete s.dataset.active; });
        const ct=svg?.querySelector(".donut-ct"); if(ct) ct.textContent="탭하여";
        const cb=svg?.querySelector(".donut-cb"); if(cb) cb.textContent="확인";
        clearOverlayLine(svg);
        // 전체탭: 하이라이트 해제
        document.querySelectorAll(".legend-item").forEach(el=>el.style.opacity="1");
        return;
      }

      // 선택 처리
      allSegs.forEach(s => { s.style.opacity="0.25"; delete s.dataset.active; });
      seg.style.opacity="1"; seg.dataset.active="1";
      const ct=svg?.querySelector(".donut-ct"); if(ct) ct.textContent=seg.dataset.label;
      const cb=svg?.querySelector(".donut-cb"); if(cb) cb.textContent=seg.dataset.pct+"%";

      const card = svg?.closest(".card, .card-grad");
      if (isOverview) {
        // 전체탭: 오른쪽 범례 하이라이트
        document.querySelectorAll(".legend-item").forEach(el => {
          el.style.opacity = el.dataset.label === seg.dataset.label ? "1" : "0.2";
        });
        clearOverlayLine(svg);
      } else {
        // 각 섹션탭: 꺾은선 + 팝업
        document.querySelectorAll(".legend-item").forEach(el=>el.style.opacity="1");
        showDonutPopup(seg, svg, card);
      }
    });
  });
}

// ─── 백업 / 복원 ─────────────────────────────────────────────
function backupData() {
  const data = JSON.stringify(ST, null, 2);
  const blob = new Blob([data], {type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  const date = new Date().toISOString().slice(0,10).replace(/-/g,"");
  a.href     = url;
  a.download = "asset_backup_"+date+".json";
  a.click();
  URL.revokeObjectURL(url);
}

function restoreData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      // 필수 키 검증
      if (!d.us || !d.pen || !d.irp) throw new Error("올바른 백업 파일이 아니에요");
      Object.assign(ST, d);
      saveData();
      render();
      alert("✅ 복원 완료!");
    } catch(err) {
      alert("❌ 복원 실패: " + err.message);
    }
  };
  reader.readAsText(file);
}

// ─── 시작 ────────────────────────────────────────────────────
render();
fetchAll();
setInterval(fetchAll, 60000);
</script>
