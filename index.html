<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>자산 대시보드</title>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="자산현황"/>
  <meta name="theme-color" content="#000000"/>
  <style>
    :root {
      /* 토스증권 스타일 참고: 거의 순검정 배경 + 짙은 그레이 카드 + 토스 블루 포인트 */
      --bg:#000000; --card:#1c1c1e; --border:#2c2c2e;
      --text:#ffffff; --muted-1:#8e8e93; --muted-2:#636366; --muted-3:#aeaeb2;
      --accent:#3182f6;
      --up:#ef4444; --up-bg:#ef444420;
      --down:#3b82f6; --down-bg:#3b82f620;
      --danger-bg:#7f1d1d; --danger-text:#fca5a5;
      --white:#fff;
      --overlay:rgba(0,0,0,0.7); --overlay-strong:rgba(0,0,0,0.75);
      --shadow-modal:0 4px 20px rgba(0,0,0,0.5);
    }
    html { -webkit-text-size-adjust:100%; text-size-adjust:100%; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { background:var(--bg); color:var(--text); font-family:'Apple SD Gothic Neo','Pretendard',sans-serif; min-height:100vh; }
    input, button, select { outline:none; font-family:inherit; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
    ::-webkit-scrollbar { height:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    #app { max-width:600px; margin:0 auto; padding:16px 14px; }

    .loading-bar { height:3px; background:var(--card); border-radius:2px; margin-bottom:12px; overflow:hidden; }
    .loading-bar-inner { height:100%; background:linear-gradient(90deg,var(--accent),var(--down),var(--accent)); background-size:200% 100%; animation:shimmer 1.2s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .cell-loading { color:var(--muted-2); animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .hdr { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
    .hdr-title { font-size:20px; font-weight:800; letter-spacing:-0.5px; }
    .hdr-sub { font-size:11px; color:var(--muted-2); margin-top:3px; }
    .hdr-rate { font-size:12px; color:var(--muted-3); font-weight:600; margin-top:2px; }
    .hdr-btns { display:flex; gap:6px; flex-shrink:0; }
    .btn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:7px 13px; border-radius:999px; font-size:15px; cursor:pointer; }
    .btn.on { background:var(--accent); border-color:var(--accent); }
    .btn-row { display:flex; gap:6px; margin-bottom:12px; }
    .btn-sm { background:var(--card); border:1px solid var(--border); color:var(--muted-3); padding:6px 12px; border-radius:999px; font-size:12px; cursor:pointer; flex:1; text-align:center; }
    .data-menu-wrap { position:relative; }
    .data-menu-bg { position:fixed; inset:0; z-index:40; background:transparent; }
    .data-menu { position:absolute; top:calc(100% + 8px); right:0; background:var(--card); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow-modal); padding:6px; min-width:180px; z-index:41; display:flex; flex-direction:column; gap:2px; animation:menu-pop 0.15s ease-out; }
    .data-menu-item { display:flex; align-items:center; gap:8px; background:transparent; border:none; color:var(--text); font-size:13px; padding:9px 10px; border-radius:9px; cursor:pointer; text-align:left; width:100%; }
    .data-menu-item:active { background:var(--border); }
    @keyframes menu-pop { from { opacity:0; transform:translateY(-4px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }

    .tabs { display:flex; gap:4px; margin-bottom:14px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
    .tab { background:var(--card); border:none; color:var(--muted-1); padding:7px 12px; border-radius:999px; font-size:12px; font-weight:500; white-space:nowrap; cursor:pointer; flex-shrink:0; }
    .tab.on { color:var(--white); font-weight:700; background:#3a3a3c; }

    .card { background:var(--card); border-radius:16px; padding:14px; margin-bottom:12px; border:1px solid var(--border); }
    .card-grad { background:linear-gradient(135deg,var(--card),var(--bg)); border:1px solid var(--card); border-radius:16px; padding:18px 16px; margin-bottom:12px; }
    .card-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .card-title { font-weight:700; font-size:14px; }

    .tbl-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:12px; }
    th { padding:5px 6px; color:var(--muted-2); font-weight:600; font-size:10px; border-bottom:1px solid var(--border); white-space:nowrap; }
    td { padding:8px 6px; vertical-align:middle; border-bottom:1px solid var(--bg); }
    .r { text-align:right; }
    .ticker { font-weight:600; font-size:12px; }
    .subname { font-size:10px; color:var(--muted-1); margin-top:1px; }
    .price-na { color:var(--muted-2); font-size:10px; }

    .inp { background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:4px 6px; font-size:11px; width:100%; }
    .inp-r { text-align:right; }
    .inp-l { text-align:left; }
    .add-btn { margin-top:8px; background:transparent; border:1px dashed var(--border); color:var(--muted-2); padding:6px 12px; border-radius:8px; font-size:12px; width:100%; cursor:pointer; }
    .del-btn { background:var(--danger-bg); border:none; color:var(--danger-text); border-radius:6px; padding:4px 8px; font-size:11px; cursor:pointer; }

    .up { color:var(--up); font-weight:700; }
    .dn { color:var(--down); font-weight:700; }
    .na { color:var(--muted-3); }

    @keyframes sheet-slide-up { from { transform:translateY(100%); } to { transform:translateY(0); } }
    .modal-bg { position:fixed; inset:0; background:var(--overlay); z-index:100; display:flex; align-items:flex-end; justify-content:center; }
    .modal { background:var(--card); border-radius:20px 20px 0 0; padding:24px 20px; width:100%; max-width:600px; border:1px solid var(--border); animation:sheet-slide-up 0.25s ease-out; }
    .modal-title { font-size:16px; font-weight:700; margin-bottom:16px; }
    .type-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
    .type-btn { background:var(--bg); border:2px solid var(--border); border-radius:12px; padding:14px 10px; cursor:pointer; text-align:center; transition:border-color 0.15s; }
    .type-btn.sel { border-color:var(--accent); }
    .type-btn .icon { font-size:22px; margin-bottom:6px; }
    .type-btn .label { font-size:12px; font-weight:600; color:var(--text); }
    .type-btn .desc { font-size:10px; color:var(--muted-1); margin-top:2px; }
    .color-row { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .color-dot { width:28px; height:28px; border-radius:50%; cursor:pointer; border:3px solid transparent; }
    .color-dot.sel { border-color:var(--white); }
    #tip { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px 16px; font-size:13px; color:var(--text); z-index:999; text-align:center; min-width:180px; box-shadow:var(--shadow-modal); display:none; }
    .trade-modal-bg { position:fixed; inset:0; background:var(--overlay-strong); z-index:200; display:flex; align-items:flex-end; justify-content:center; }
    .trade-modal { background:var(--card); border-radius:20px 20px 0 0; padding:20px 18px 32px; width:100%; max-width:600px; border:1px solid var(--border); max-height:85vh; overflow-y:auto; animation:sheet-slide-up 0.25s ease-out; }
    .trade-tabs { display:flex; gap:6px; margin-bottom:16px; }
    .trade-tab { flex:1; padding:9px; border-radius:14px; font-size:13px; font-weight:700; border:none; cursor:pointer; }
    .trade-tab.buy  { background:var(--up-bg); color:var(--up); }
    .trade-tab.sell { background:var(--down-bg); color:var(--down); }
    .trade-tab.buy.on  { background:var(--up); color:var(--white); }
    .trade-tab.sell.on { background:var(--down); color:var(--white); }
    .trade-inp-group { margin-bottom:12px; }
    .trade-inp-label { font-size:11px; color:var(--muted-1); margin-bottom:4px; }
    .trade-inp { background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:10px 12px; font-size:14px; width:100%; }
    .trade-inp:focus { border-color:var(--accent); }
    .trade-result { background:var(--bg); border-radius:10px; padding:12px; margin-bottom:14px; font-size:12px; }
    .trade-result-row { display:flex; justify-content:space-between; margin-bottom:4px; }
    .trade-btn { width:100%; padding:13px; border-radius:12px; border:none; font-size:15px; font-weight:700; cursor:pointer; margin-top:4px; }
    .trade-btn.buy  { background:var(--up); color:var(--white); }
    .trade-btn.sell { background:var(--down); color:var(--white); }
    .history-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--bg); font-size:12px; }
    .history-badge { padding:2px 7px; border-radius:20px; font-size:10px; font-weight:700; }
    .badge-buy  { background:var(--up-bg); color:var(--up); }
    .badge-sell { background:var(--down-bg); color:var(--down); }
    .ticker-row { cursor:pointer; transition:background 0.1s; }
    .ticker-row:active { background:var(--border); }
  </style>
</head>

<div id="tip"></div>
<script>
// ─── 전역 에러 핸들러 (콘솔 없이도 화면에 에러 표시) ──────────
window.addEventListener('error', function(e) {
  const app = document.getElementById('app');
  if (app) {
    app.innerHTML = '<div style="padding:20px;color:#ef4444;font-size:13px;white-space:pre-wrap">'
      + '⚠️ 스크립트 오류\n\n' + (e.message||'') + '\n\n파일: ' + (e.filename||'') + '\n줄: ' + (e.lineno||'') + ':' + (e.colno||'')
      + (e.error && e.error.stack ? '\n\n' + e.error.stack : '')
      + '</div>';
  }
});
window.addEventListener('unhandledrejection', function(e) {
  const app = document.getElementById('app');
  if (app) {
    app.innerHTML = '<div style="padding:20px;color:#ef4444;font-size:13px;white-space:pre-wrap">'
      + '⚠️ 비동기 오류\n\n' + (e.reason && e.reason.message ? e.reason.message : String(e.reason))
      + (e.reason && e.reason.stack ? '\n\n' + e.reason.stack : '')
      + '</div>';
  }
});

// ─── 상수 ────────────────────────────────────────────────────
const WORKER = "https://asset-proxy.omyakryl0541.workers.dev";
const COLORS  = ["#3182f6","#f59e0b","#10b981","#3b82f6","#f43f5e","#a855f7","#06b6d4","#84cc16","#f97316","#ec4899"];
const SK      = "asset_v7";

// ─── 클라우드 UID + 종단간 암호화 키 ───────────────────────────
// uid: 서버(Worker/KV)에 그대로 전송되는 조회용 식별자
// encKey: 절대 서버로 전송되지 않는 암호화 전용 비밀키 — 이게 있어야만 클라우드에 저장된 내용을 복호화할 수 있음
//         (uid만 알아내도 서버 운영자를 포함해 아무도 평문 내용을 볼 수 없게 하기 위함)
function b64encode(bytes) { return btoa(String.fromCharCode(...new Uint8Array(bytes))); }
function b64decode(str) { return Uint8Array.from(atob(str), c=>c.charCodeAt(0)); }
function b64urlEncode(bytes) { return b64encode(bytes).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function b64urlDecode(str) { return b64decode(str.replace(/-/g,"+").replace(/_/g,"/").padEnd(str.length+(4-str.length%4)%4,"=")); }

function getOrCreateUid() {
  let uid = localStorage.getItem("asset_uid");
  if (!uid) {
    uid = "u_" + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
    localStorage.setItem("asset_uid", uid);
  }
  return uid;
}
function getOrCreateEncKey() {
  let key = localStorage.getItem("asset_enc_key");
  if (!key) {
    key = b64urlEncode(crypto.getRandomValues(new Uint8Array(32)));
    localStorage.setItem("asset_enc_key", key);
  }
  return key;
}
let CLOUD_UID = getOrCreateUid();
let CLOUD_ENC_KEY = getOrCreateEncKey();
function cloudToken() { return CLOUD_UID + "." + CLOUD_ENC_KEY; }
let cloudStatus = "";

async function importEncKey(encKeyB64url) {
  return crypto.subtle.importKey("raw", b64urlDecode(encKeyB64url), {name:"AES-GCM"}, false, ["encrypt","decrypt"]);
}
async function encryptForCloud(obj, encKeyB64url) {
  const key = await importEncKey(encKeyB64url);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const data = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, new TextEncoder().encode(JSON.stringify(obj)));
  return { v:1, iv:b64encode(iv), data:b64encode(data) };
}
async function decryptFromCloud(payload, encKeyB64url) {
  const key = await importEncKey(encKeyB64url);
  const plainBuf = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64decode(payload.iv)}, key, b64decode(payload.data));
  return JSON.parse(new TextDecoder().decode(plainBuf));
}

async function cloudSave(silent=false) {
  if (!silent) { cloudStatus = "saving"; render(); }
  try {
    ST._savedAt = Date.now();
    const encrypted = await encryptForCloud(ST, CLOUD_ENC_KEY);
    const r = await fetch(WORKER + "?type=kv-save&uid=" + CLOUD_UID, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(encrypted),
    });
    const d = await r.json();
    if (!silent) {
      cloudStatus = d.ok ? "saved" : "error";
      render();
      setTimeout(() => { cloudStatus = ""; render(); }, 3000);
    }
  } catch {
    if (!silent) { cloudStatus = "error"; render(); setTimeout(()=>{ cloudStatus=""; render(); }, 3000); }
  }
}

async function cloudLoad() {
  const token = prompt("복원할 백업 키를 입력하세요:\n(현재 내 키: " + cloudToken() + ")");
  if (!token) return;
  const trimmed = token.trim();
  const dotIdx = trimmed.indexOf(".");
  const uid = dotIdx === -1 ? trimmed : trimmed.slice(0, dotIdx);
  const encKey = dotIdx === -1 ? null : trimmed.slice(dotIdx+1);
  cloudStatus = "loading"; render();
  try {
    const r = await fetch(WORKER + "?type=kv-load&uid=" + uid);
    if (r.status === 404) { alert("해당 키로 저장된 데이터가 없어요"); cloudStatus = ""; render(); return; }
    const raw = await r.json();
    // raw.iv/raw.data가 있으면 암호화된 백업, 없으면 암호화 도입 전 저장된 평문 백업(하위호환)
    let d;
    if (raw.iv && raw.data) {
      if (!encKey) throw new Error("이 백업은 암호화되어 있어요. 전체 키(점 뒤 부분 포함)를 입력해주세요");
      d = await decryptFromCloud(raw, encKey);
    } else {
      d = raw;
    }
    if (!d.accounts) throw new Error("잘못된 데이터");
    // 로컬 데이터가 클라우드보다 최신이면 경고
    if (ST._savedAt && d._savedAt && ST._savedAt > d._savedAt) {
      const localTime = new Date(ST._savedAt).toLocaleString("ko-KR");
      const cloudTime = new Date(d._savedAt).toLocaleString("ko-KR");
      if (!confirm("⚠️ 현재 기기 데이터가 클라우드보다 최신이에요.\n\n기기: "+localTime+"\n클라우드: "+cloudTime+"\n\n클라우드 데이터로 덮어쓸까요?")) {
        cloudStatus = ""; render(); return;
      }
    }
    Object.assign(ST, d);
    localStorage.setItem("asset_uid", uid);
    CLOUD_UID = uid;
    if (encKey) { localStorage.setItem("asset_enc_key", encKey); CLOUD_ENC_KEY = encKey; }
    saveData(); cloudStatus = ""; render(); fetchAll();
    alert("✅ 복원 완료!");
  } catch(e) { alert("❌ 복원 실패: " + e.message); cloudStatus = ""; render(); }
}

function migrateOldData(old) {
  const accs = makeDefaultAccounts();
  const map = {us:"a_us",krx:"a_krx",pen:"a_pen",irp:"a_irp",isa:"a_isa",coins:"a_coin"};
  for (const [key,aid] of Object.entries(map)) {
    const items = key==="coins"?(old.coins||[]).map(x=>({id:x.id,t:x.t,n:x.n,q:x.q,a:x.a})):(old[key]||[]).map(x=>({id:x.id,t:x.t||"",n:x.n||"",q:x.q||0,a:x.a||0}));
    const acc = accs.find(a=>a.id===aid);
    if (acc && items.length) acc.items = items;
  }
  const cashAcc = accs.find(a=>a.id==="a_cash");
  if (cashAcc && Array.isArray(old.cash)) cashAcc.items = old.cash;
  return {accounts:accs, goals:old.goals||DEFAULT_DATA.goals};
}

// 아주 간단한 마크다운 → HTML 렌더러 (제목, 리스트, 굵게, 기울임, 링크 정도만)
function simpleMarkdownToHtml(md) {
  if (!md) return "";
  let html = md
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/^### (.*)$/gm, "<h4 style='margin:10px 0 4px;font-size:14px'>$1</h4>")
    .replace(/^## (.*)$/gm, "<h3 style='margin:12px 0 6px;font-size:15px'>$1</h3>")
    .replace(/^# (.*)$/gm, "<h2 style='margin:14px 0 8px;font-size:16px'>$1</h2>")
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.*?)\*/g, "<em>$1</em>")
    .replace(/\[(.*?)\]\((.*?)\)/g, "<a href='$2' target='_blank' style='color:#3182f6'>$1</a>")
    .replace(/^- (.*)$/gm, "<li style='margin-left:16px'>$1</li>")
    .replace(/\n\n/g, "</p><p style='margin:6px 0'>")
    .replace(/\n/g, "<br/>");
  return "<p style='margin:6px 0'>" + html + "</p>";
}

// ─── 계산 ────────────────────────────────────────────────────
// 종목 자체의 시장 구분(item.market)이 있으면 그걸 우선하고, 없으면(레거시 계좌) 계좌 타입을 그대로 씀 —
// 병합 계좌 도입 후에도 기존 호출부(acc.type 전달)를 하나도 안 건드려도 되게 하기 위함
function itemVal(item, type) {
  type = item.market || type;
  if (type==="cash") return Number(item.a)||0;
  const p = px[item.t]||item.a||0;
  return type==="us" ? p*item.q*(usdKrw||0) : p*item.q;
}
function itemValBest(item, type) {
  type = item.market || type;
  if (type==="cash") return Number(item.a)||0;
  const p = px[item.t]||item.a||0;
  return type==="us" ? p*item.q*(usdKrw||1) : p*item.q;
}
function itemCost(item, type) {
  type = item.market || type;
  if (!item.q||!item.a) return 0;
  return type==="us" ? item.a*item.q*(usdKrw||0) : item.a*item.q;
}
function itemGp(item, type) {
  const p=px[item.t]; if(!p||!item.a||!item.q) return null;
  return ((p-item.a)/item.a)*100;
}
function itemPriceKrw(item, type) {
  type = item.market || type;
  const p=px[item.t]; if(!p) return null;
  return type==="us" ? (usdKrw?p*usdKrw:null) : p;
}
// 종목이 국내/해외/코인 중 어디 시장인지: item.market 우선, 없으면 계좌 타입(레거시 계좌)
function itemMarket(item, accType) {
  return item.market || accType;
}
// 혼합계좌는 원화예수금/외화예수금이 분리돼 있고, 레거시 계좌는 acc.cash 하나뿐 —
// 이 두 헬퍼로 감싸서 나머지 코드는 계좌 종류를 신경 안 써도 되게 함
function getCash(acc, ccy) {
  if (acc.type === "mixed") return ccy === "usd" ? (acc.cashUsd||0) : (acc.cashKrw||0);
  return acc.cash||0;
}
function adjustCash(acc, ccy, delta) {
  if (acc.type === "mixed") {
    if (ccy === "usd") acc.cashUsd = (acc.cashUsd||0) + delta;
    else acc.cashKrw = (acc.cashKrw||0) + delta;
  } else {
    acc.cash = (acc.cash||0) + delta;
  }
}
// 계좌가 어떤 통화의 예수금을 가질 수 있는지 (환전 없는 이체만 지원하므로 이걸로 호환 여부를 판단)
function acctCcys(acc) {
  if (acc.type === "mixed") return ["krw","usd"];
  if (acc.type === "us") return ["usd"];
  return ["krw"]; // krx/coin/cash
}
function accTotal(acc) {
  const itemsVal = acc.items.reduce((s,x)=>s+itemVal(x,acc.type),0);
  if (acc.type==="cash") return itemsVal;
  // 예수금 포함 (us/혼합계좌 외화예수금은 usdKrw 곱해서 KRW로)
  const cashKrw = acc.type==="mixed" ? (acc.cashKrw||0) + (acc.cashUsd||0)*(usdKrw||0)
    : acc.type==="us" ? (acc.cash||0)*(usdKrw||0) : (acc.cash||0);
  return itemsVal + cashKrw;
}
// [핵심] 계좌 수익금 — cost 있는 종목만 합산
function accProfit(acc) {
  if (acc.type==="cash") return null;
  let cost=0, val=0;
  for (const item of acc.items) {
    const c = itemCost(item, acc.type);
    if (!c) continue;
    cost += c;
    val  += itemVal(item, acc.type);
  }
  return cost>0 ? val-cost : null;
}
function accGp(acc) {
  if (acc.type==="cash") return null;
  let cost=0, val=0;
  for (const item of acc.items) {
    const c=itemCost(item,acc.type); if(!c) continue;
    cost+=c; val+=itemVal(item,acc.type);
  }
  return cost>0 ? ((val-cost)/cost)*100 : null;
}
function grandTotal() { return ST.accounts.reduce((s,a)=>s+accTotal(a),0); }
function grandProfit() {

function sortItems(items, type) { return [...items].sort((a,b)=>itemValBest(b,type)-itemValBest(a,type)); }

// ─── 섹터 ────────────────────────────────────────────────────
function getSector(ticker, accType) {
  if (!ticker) return accType==="coin"?"암호화폐":accType==="cash"?"현금/예금":"기타";
  const t=ticker.toUpperCase();
  return sectorCache[t]||sectorCache[ticker]||SECTOR_DB[t]||SECTOR_DB[ticker]||(accType==="coin"?"암호화폐":"기타");
}
function calcSectorMap(accounts) {
  const map={};
  for (const acc of accounts) {
    if (acc.type==="cash") { const v=accTotal(acc); if(v>0) map["현금/예금"]=(map["현금/예금"]||0)+v; continue; }
    for (const item of acc.items) {
      if (!item.q) continue;
      const v=itemValBest(item,acc.type); if(!v) continue;
      const s=getSector(item.t,itemMarket(item,acc.type)); map[s]=(map[s]||0)+v;
    }
  }
  return map;
}
function sectorMapToItems(map) {
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).filter(([,v])=>v>0).map(([l,v])=>({l,v,c:SECTOR_COLORS[l]||"#2c2c2e"}));
}

// ─── API ─────────────────────────────────────────────────────
function fetchWithTimeout(url, ms=12000) {
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), ms);
  return fetch(url, {signal:controller.signal}).finally(()=>clearTimeout(timer));
}
async function fetchAll() {
  if (loading) return;
  loading=true; render();
  const isValidTicker = t => t && /^[A-Za-z0-9\-\.]+$/.test(t);
  // 계좌 단위가 아니라 종목(item) 단위로 시장을 판정 — 병합 계좌(원화+달러 혼합)에서도 정확히 분류됨
  const allItems = ST.accounts.flatMap(a=>a.items.map(it=>({it, market:itemMarket(it,a.type)})));
  const usTickers   = [...new Set(allItems.filter(x=>x.market==="us").map(x=>x.it.t).filter(isValidTicker))];
  const krxCodes    = [...new Set(allItems.filter(x=>x.market==="krx").map(x=>x.it.t).filter(isValidTicker))];
  const coinTickers = [...new Set(allItems.filter(x=>x.market==="coin").map(x=>x.it.t).filter(isValidTicker))];
  const coinIds     = coinTickers.map(t=>GECKO_ID[t.toUpperCase()]).filter(Boolean);
  try {
    const params=new URLSearchParams({type:"all",us:usTickers.join(","),krx:krxCodes.join(","),coins:coinIds.join(",")});
    const d=await fetchWithTimeout(WORKER+"?"+params).then(r=>r.json());
    if (d.fx) usdKrw=d.fx;
    Object.assign(px,d.us||{});
    Object.assign(px,d.krx||{});
    coinTickers.forEach(t=>{ const id=GECKO_ID[t.toUpperCase()]; if(id&&d.coins?.[id]?.krw) px[t]=d.coins[id].krw; });
    for (const [sym,sec] of Object.entries(d.sectors||{})) sectorCache[sym]=SECTOR_EN[sec]||sec;
    localStorage.setItem("sector_cache",JSON.stringify(sectorCache));
    // Worker에서 받은 종목명으로 자동 업데이트 (이름 없는 종목만, US/KRX 둘 다) — 종목 단위 market 기준
    for (const acc of ST.accounts) {
      for (const item of acc.items) {
        if (!item.t) continue;
        const market = itemMarket(item, acc.type);
        if (market !== "us" && market !== "krx") continue;
        const nameMap = market === "us" ? d.names : d.krxNames;
        const fetchedName = nameMap?.[item.t];
        if (fetchedName && !item.n) {
          item.n = fetchedName;
        }
      }
    }
    saveData();
    fetchError=false; lastUp=new Date();
  } catch { fetchError=true; }
  loading=false; render();
  fetchMissingSectors();
}
async function fetchMissingSectors() {
  const allTickers=ST.accounts.flatMap(a=>a.items.filter(it=>{const m=itemMarket(it,a.type); return m==="us"||m==="krx";}).map(x=>x.t).filter(Boolean));
  const missing=[...new Set(allTickers)].filter(t=>!sectorCache[t]&&!sectorCache[t.toUpperCase()]&&!SECTOR_DB[t]&&!SECTOR_DB[t.toUpperCase()]);
  if (!missing.length) return;
  try {
    const d=await fetchWithTimeout(WORKER+"?type=sector&symbols="+missing.join(",")).then(r=>r.json());
    for (const [sym,sec] of Object.entries(d)) sectorCache[sym.toUpperCase()]=sec;
    localStorage.setItem("sector_cache",JSON.stringify(sectorCache));
    render();
  } catch {}
}

function backupData() {

  const a=document.createElement("a");
  a.href=url; a.download="asset_backup_"+curProfile+"_"+new Date().toISOString().slice(0,10).replace(/-/g,"")+".json";

function restoreData(file) {
  if (!file) return;
  const reader=new FileReader();
  reader.onload=e=>{ try { const d=JSON.parse(e.target.result); if(!d.accounts) throw new Error("올바른 백업 파일이 아니에요"); Object.assign(ST,d); saveData(); render(); fetchAll(); alert("✅ 복원 완료!"); } catch(err){alert("❌ 복원 실패: "+err.message);} };
  reader.readAsText(file);
}

// ─── SVG 도넛 ────────────────────────────────────────────────
function buildDonutSVG(segs, total, cx, cy, R, r, interactive) {
  if (!segs.length||!total) return "";
  if (segs.length===1) {
    const col=segs[0].c||COLORS[0];
    const ex=interactive?` data-label="${segs[0].l}" data-pct="100.0" data-val="${Math.round(segs[0].v)}" class="donut-seg" style="cursor:pointer"`:"";
    return `<circle cx="${cx}" cy="${cy}" r="${(R+r)/2}" fill="none" stroke="${col}" stroke-width="${R-r}"${ex}/>`;
  }
  let ang=-Math.PI/2;
  return segs.map((seg,i)=>{
    const a=seg.v/total*Math.PI*2;
    const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang); ang+=a;
    const x2=cx+R*Math.cos(ang),y2=cy+R*Math.sin(ang);
    const xi1=cx+r*Math.cos(ang-a),yi1=cy+r*Math.sin(ang-a);
    const xi2=cx+r*Math.cos(ang),yi2=cy+r*Math.sin(ang);
    const lg=a>Math.PI?1:0, col=seg.c||COLORS[i%COLORS.length];
    const pct=(seg.v/total*100).toFixed(1);
    const ex=interactive?` data-label="${seg.l}" data-pct="${pct}" data-val="${Math.round(seg.v)}" class="donut-seg" style="cursor:pointer"`:"";
    return `<path d="M${xi1},${yi1}L${x1},${y1}A${R},${R} 0 ${lg},1 ${x2},${y2}L${xi2},${yi2}A${r},${r} 0 ${lg},0 ${xi1},${yi1}Z" fill="${col}" stroke="#000000" stroke-width="2"${ex}/>`;
  }).join("");
}
function buildDonutCard(items, title) {
  if (!items.length) return "";
  const total=items.reduce((s,x)=>s+x.v,0); if(!total) return "";
  const segs=items.map((x,i)=>({l:x.l,v:x.v,c:x.c||COLORS[i%COLORS.length]}));
  const paths=buildDonutSVG(segs,total,90,90,75,45,true);
  const isSector=title.includes("섹터");
  const legend=segs.map(seg=>
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    +'<div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:2px;background:'+seg.c+'"></div>'
    +'<span style="font-size:11px">'+seg.l+'</span></div>'
    +'<div><span style="font-size:11px;font-weight:700;color:#aeaeb2;margin-right:4px">'+(seg.v/total*100).toFixed(1)+'%</span>'
    +'<span style="font-size:11px;font-weight:600">'+won(seg.v)+'</span></div></div>'
  ).join("");
  return '<div class="card" style="margin-top:4px">'
    +'<div class="card-title" style="margin-bottom:12px">'+title+'</div>'
    +'<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">'
    +'<svg width="180" height="180" viewBox="0 0 180 180" style="flex-shrink:0"'+(isSector?' data-sector-donut="1"':'')+' data-donut-title="'+title+'">'
    +paths
    +'<text x="90" y="85" text-anchor="middle" fill="#aeaeb2" font-size="10" class="donut-ct">탭하여</text>'
    +'<text x="90" y="100" text-anchor="middle" fill="#aeaeb2" font-size="10" class="donut-cb">확인</text>'
    +'</svg>'
    +'<div style="flex:1;min-width:150px" class="donut-legend">'+legend+'</div>'
    +'</div></div>';
}

// ─── 계좌 전체 거래 히스토리 ─────────────────────────────────
let accHistoryExpanded = {}; // {accId: true/false}

let accHistoryFilter = {}; // {accId: {kind: "all"|"buy"|"sell"|"dividend"|"cash", search: ""}}

function buildAccountHistorySection(acc) {
  const isUS = acc.type === "us";
  const isCoin = acc.type === "coin";
  const isMixed = acc.type === "mixed";

  const events = [];
  for (const item of acc.items) {
    const evIsUS = itemMarket(item, acc.type) === "us";
    const evIsCoin = itemMarket(item, acc.type) === "coin";
    for (const tr of (item.trades||[])) {
      const krwVal = tr.type==="dividend" ? (evIsUS?(tr.amount||0)*(usdKrw||0):(tr.amount||0)) : (evIsUS?(tr.qty*tr.price||0)*(usdKrw||0):(tr.qty*tr.price||0));
      events.push({
        date: tr.date, kind: tr.type, ticker: item.t, qty: tr.qty, price: tr.price,
        pnl: tr.pnl, amount: tr.amount, memo: tr.memo, sortKey: tr.date + "_" + (tr.id||""),
        accId: acc.id, itemId: item.id, trId: tr.id, isUS: evIsUS, isCoin: evIsCoin, krwVal
      });
    }
  }
  for (const d of (acc.deposits||[])) {
    if (d.type === "cash-in" || d.type === "cash-out") {
      const dCcy = isMixed ? (d.ccy||"krw") : null;
      const krwVal = isMixed ? (dCcy==="usd" ? Math.abs(d.amount)*(usdKrw||0) : Math.abs(d.amount)) : Math.abs(d.amount);
      events.push({
        date: d.date||("연도:"+d.year), kind: d.type, amount: d.amount, memo: d.memo,
        id: d.id, accId: acc.id, usdAmount: d.usdAmount, ccy: dCcy, krwVal,
        sortKey: (d.date||d.year+"-01-01") + "_" + (d.id||"")
      });
    }
  }

  if (!events.length) return "";

  events.sort((a,b)=> a.sortKey < b.sortKey ? 1 : -1); // 최신순

  // 필터 적용
  const filter = accHistoryFilter[acc.id] || {kind:"all", search:"", year:"all"};
  let filteredEvents = events;
  if (filter.kind === "buy")      filteredEvents = filteredEvents.filter(e=>e.kind==="buy");
  else if (filter.kind === "sell")     filteredEvents = filteredEvents.filter(e=>e.kind==="sell");
  else if (filter.kind === "dividend") filteredEvents = filteredEvents.filter(e=>e.kind==="dividend");
  else if (filter.kind === "cash")     filteredEvents = filteredEvents.filter(e=>e.kind==="cash-in"||e.kind==="cash-out");
  if (filter.year && filter.year !== "all") {
    filteredEvents = filteredEvents.filter(e=> (e.date||"").slice(0,4) === filter.year);
  }
  if (filter.search) {
    const q = filter.search.toUpperCase();
    filteredEvents = filteredEvents.filter(e=> (e.ticker||"").toUpperCase().includes(q));
  }

  const showAll = accHistoryExpanded[acc.id] === true;
  const visibleEvents = showAll ? filteredEvents : filteredEvents.slice(0, 5);

  const filterTabs = ['all','buy','sell','dividend','cash'].map(k=>{
    const labels = {all:"전체", buy:"매수", sell:"매도", dividend:"배당", cash:"입출금"};
    const isOn = filter.kind === k;
    return '<button class="btn-sm" data-history-filter="'+acc.id+'" data-filter-kind="'+k+'" style="padding:4px 10px;font-size:11px;'+(isOn?'background:'+acc.color+';color:#fff;border-color:'+acc.color:'')+'">'+labels[k]+'</button>';
  }).join("");

  // 연도 필터 탭 (이벤트에서 실제 존재하는 연도만 추출)
  const availYears = [...new Set(events.map(e=>(e.date||"").slice(0,4)).filter(y=>/^\d{4}$/.test(y)))].sort((a,b)=>b-a);
  const yearTabs = availYears.length > 1 ? ['all', ...availYears].map(y=>{
    const isOn = (filter.year||"all") === y;
    const label = y === 'all' ? '전체연도' : y+'년';
    return '<button class="btn-sm" data-history-year="'+acc.id+'" data-filter-year="'+y+'" style="padding:4px 10px;font-size:11px;'+(isOn?'background:#2c2c2e;color:#fff;border-color:#8e8e93':'')+'">'+label+'</button>';
  }).join("") : "";

  // 필터링된 결과 합계 (배당/매도손익/입출금 등)
  let summaryHtml = "";
  // 혼합계좌는 종목마다 통화가 달라 합계를 낼 때 KRW로 환산해서 더함(단위를 섞어 더하지 않도록)

    const totalDiv = isMixed ? filteredEvents.reduce((s,e)=>s+(e.krwVal||0),0) : filteredEvents.reduce((s,e)=>s+(e.amount||0),0);

      +'<span style="font-size:13px;font-weight:700;color:#f59e0b">+'+(isMixed?won(totalDiv):fmtMoney(totalDiv))+'</span></div>';
  } else if (filter.kind === "sell" && filteredEvents.length) {
    const totalSell = isMixed ? filteredEvents.reduce((s,e)=>s+(e.krwVal||0),0) : filteredEvents.reduce((s,e)=>s+(e.qty*e.price||0),0);
    const totalPnl  = filteredEvents.reduce((s,e)=>s+(e.pnl||0),0);

      +'<span style="font-size:12px;font-weight:700;color:'+(totalPnl>=0?'#ef4444':'#3b82f6')+';margin-left:6px">'+(totalPnl>=0?'+':'')+(isMixed?won(totalPnl):fmtMoney(totalPnl))+' 손익</span></div></div>';
  } else if (filter.kind === "buy" && filteredEvents.length) {
    const totalBuy = isMixed ? filteredEvents.reduce((s,e)=>s+(e.krwVal||0),0) : filteredEvents.reduce((s,e)=>s+(e.qty*e.price||0),0);
    summaryHtml = '<div style="display:flex;justify-content:space-between;align-items:center;background:#000000;border-radius:8px;padding:8px 12px;margin-bottom:10px">'
      +'<span style="font-size:12px;color:#8e8e93">매수 합계 ('+filteredEvents.length+'건)</span>'
      +'<span style="font-size:13px;font-weight:700">'+(isMixed?won(totalBuy):fmtMoney(totalBuy))+'</span></div>';
  } else if (filter.kind === "cash" && filteredEvents.length) {
    const totalIn  = filteredEvents.filter(e=>e.kind==="cash-in").reduce((s,e)=>s+(isMixed?(e.krwVal||0):Math.abs(e.amount||0)),0);
    const totalOut = filteredEvents.filter(e=>e.kind==="cash-out").reduce((s,e)=>s+(isMixed?(e.krwVal||0):Math.abs(e.amount||0)),0);
    summaryHtml = '<div style="display:flex;justify-content:space-between;align-items:center;background:#000000;border-radius:8px;padding:8px 12px;margin-bottom:10px">'
      +'<span style="font-size:12px;color:#8e8e93">입금 '+won(totalIn)+' · 출금 '+won(totalOut)+'</span>'
      +'<span style="font-size:13px;font-weight:700">순 '+won(totalIn-totalOut)+'</span></div>';
  }

  const hasTickerSearch = acc.type !== "cash";

  return '<div class="card" style="margin-bottom:12px">'
    +'<div class="card-hdr"><span class="card-title">📜 전체 거래 히스토리</span><span style="font-size:11px;color:#636366">'+filteredEvents.length+'/'+events.length+'건</span></div>'
    +'<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">'+filterTabs+'</div>'
    +(yearTabs ? '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">'+yearTabs+'</div>' : "")
    +(hasTickerSearch ? '<input class="inp inp-l" data-history-search="'+acc.id+'" placeholder="🔍 종목 검색 (예: NVO)" value="'+(filter.search||"")+'" style="margin-bottom:10px"/>' : "")
    +summaryHtml
    +'<div>'+(filteredEvents.length ? eventsToHtml(visibleEvents, isUS, isCoin) : '<div style="font-size:12px;color:#636366;text-align:center;padding:12px 0">해당하는 내역이 없어요</div>')+'</div>'
    +(filteredEvents.length > 5
      ? '<button class="add-btn" data-history-toggle="'+acc.id+'" style="margin-top:8px">'+(showAll?"접기 ▲":"전체 "+filteredEvents.length+"건 보기 ▼")+'</button>'
      : "")
    +'</div>';
}

function buildDepositSection(deposits, accId) {
  // 연도별 합산
  const yearMap = {};
  for (const d of deposits) {
    const y = d.year;
    yearMap[y] = (yearMap[y]||0) + (Number(d.amount)||0);
  }
  const sorted = Object.entries(yearMap).map(([year,amount])=>({year:Number(year), amount})).sort((a,b)=>a.year-b.year);
  const total  = sorted.reduce((s,x)=>s+x.amount, 0);
  const acc    = ST.accounts.find(a=>a.id===accId);
  const ev     = acc ? accTotal(acc) : 0;
  const diff    = total > 0 ? ev - total : null;
  const diffPct = total > 0 ? ((ev - total) / total) * 100 : null;

  const viewRows = sorted.map(d=>
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    +'<span style="font-size:12px;color:#aeaeb2;width:48px">'+d.year+'년</span>'
    +'<span style="font-size:13px;font-weight:600">'+won(d.amount)+'</span>'
    +'</div>'
  ).join("");

  const summaryHtml = total > 0
    ? '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid #2c2c2e;margin-top:6px">'
      +'<span style="font-size:12px;color:#8e8e93">총 순입금</span>'
      +'<div style="text-align:right">'
      +'<span style="font-size:14px;font-weight:800">'+won(total)+'</span>'
      +(diff!=null?'<span style="font-size:12px;font-weight:700;color:'+(diff>=0?'#ef4444':'#3b82f6')+';margin-left:8px">'+(diff>=0?'+':'')+won(diff)+'</span>':"")
      +(diffPct!=null?'<span style="font-size:11px;font-weight:700;color:'+(diffPct>=0?'#ef4444':'#3b82f6')+';margin-left:4px">('+fPct(diffPct)+')</span>':"")
      +'</div></div>'
    : "";

  return '<div class="card" style="margin-bottom:12px">'
    +'<div class="card-hdr"><span class="card-title">💸 순입금 내역</span></div>'
    +(viewRows || '<div style="font-size:12px;color:#636366;text-align:center;padding:8px 0">입력된 내역이 없습니다</div>')
    +summaryHtml
    +'</div>';
}

// ─── 순입금 vs 평가금액 (전체 탭) ────────────────────────────
function buildOverviewDepositSection() {
  const ovRows = [];
  let totalDep = 0, totalEval = 0;
  for (const acc of ST.accounts) {
    let dep = 0;
    if (acc.type === "cash") {
      dep = acc.items.reduce((s,x)=>s+(Number(x.a)||0), 0);
    } else {
      dep = (acc.deposits||[]).reduce((s,d)=>s+(Number(d.amount)||0), 0);
    }
    const ev = accTotal(acc);
    if (dep === 0 && ev === 0) continue;
    ovRows.push({name: acc.name, color: acc.color, dep, ev});
    totalDep  += dep;
    totalEval += ev;
  }
  if (!ovRows.length) return "";
  const ovDiff    = totalDep > 0 ? totalEval - totalDep : null;
  const ovDiffPct = totalDep > 0 ? ((totalEval - totalDep) / totalDep) * 100 : null;
  const rowHtml = ovRows.map(r => {
    const diff    = r.dep > 0 ? r.ev - r.dep : null;
    const diffPct = r.dep > 0 ? ((r.ev - r.dep) / r.dep) * 100 : null;
    return '<tr>'
      +'<td><div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:2px;background:'+r.color+';flex-shrink:0"></div><span style="font-size:12px;font-weight:600">'+r.name+'</span></div></td>'
      +'<td class="r" style="font-size:12px">'+(r.dep>0?won(r.dep):'<span style="color:#636366">미입력</span>')+'</td>'
      +'<td class="r" style="font-size:12px;font-weight:600">'+won(r.ev)+'</td>'
      +'<td class="r"><span style="font-size:11px;font-weight:700;color:'+(diff==null?'#636366':diff>=0?'#ef4444':'#3b82f6')+'">'
      +(diff==null?'—':(diffPct>=0?'+':'')+diffPct.toFixed(1)+'%')+'</span></td>'
      +'</tr>';
  }).join("");
  return '<div class="card" style="margin-bottom:12px">'
    +'<div class="card-hdr" style="margin-bottom:10px"><span class="card-title">💸 순입금 vs 평가금액</span></div>'
    +'<div class="tbl-wrap"><table>'
    +'<thead><tr><th style="text-align:left">계좌</th><th class="r">순입금</th><th class="r">평가금액</th><th class="r">수익률</th></tr></thead>'
    +'<tbody>'+rowHtml+'</tbody>'
    +'</table></div>'
    +(totalDep>0
      ? '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid #2c2c2e;margin-top:6px">'
        +'<span style="font-size:12px;color:#8e8e93">전체 합계</span>'
        +'<div style="text-align:right">'
        +'<span style="font-size:12px;color:#aeaeb2">입금 '+won(totalDep)+'</span>'
        +'<span style="font-size:14px;font-weight:800;margin-left:8px">'+won(totalEval)+'</span>'
        +(ovDiff!=null?'<span style="font-size:12px;font-weight:700;color:'+(ovDiff>=0?'#ef4444':'#3b82f6')+';margin-left:6px">'+(ovDiff>=0?'+':'')+won(ovDiff)+'</span>':"")
        +(ovDiffPct!=null?'<span style="font-size:11px;font-weight:700;color:'+(ovDiffPct>=0?'#ef4444':'#3b82f6')+';margin-left:4px">('+fPct(ovDiffPct)+')</span>':"")
        +'</div></div>'
      : "")
    +'</div>';
}

// ─── 계좌 섹션 ───────────────────────────────────────────────

  const gp     = accGp(acc);       // 계좌 수익률
  const sorted = isCash ? [...acc.items].sort((a,b)=>(Number(b.a)||0)-(Number(a.a)||0)) : sortItems(acc.items,type);

  // 계좌 헤더 우측: 평가금액 / 수익금 / 수익률
  const depositBtnHtml = '<button class="btn-sm" style="flex:none;color:#10b981;border-color:#10b981;padding:6px 10px;font-size:12px;font-weight:700;white-space:nowrap" data-deposit-acc="'+acc.id+'">입출금</button>';
  const transferBtnHtml = ST.accounts.length>=2 ? '<button class="btn-sm" style="flex:none;color:#06b6d4;border-color:#06b6d4;padding:6px 10px;font-size:12px;font-weight:700;white-space:nowrap" data-transfer-acc="'+acc.id+'">🔁 이체</button>' : '';
  const rebalanceBtnHtml = isCash ? '' : '<button class="btn-sm" style="flex:none;color:#8b5cf6;border-color:#8b5cf6;padding:6px 10px;font-size:12px;font-weight:700;white-space:nowrap" data-rebalance-acc="'+acc.id+'">🎯 리밸런싱</button>';
  const buyBtn = isCash
    ? depositBtnHtml + transferBtnHtml
    : depositBtnHtml + transferBtnHtml + rebalanceBtnHtml
      +'<button class="btn-sm" style="flex:none;color:#ef4444;border-color:#ef4444;padding:6px 10px;font-size:12px;font-weight:700;white-space:nowrap" data-new-trade="'+acc.id+'">+ 신규매수</button>';
  const cashRow = isCash ? "" : isMixed
    ? (editMode
        ? '<div style="display:flex;flex-direction:column;gap:6px;background:#000000;border-radius:8px;padding:8px 12px;margin-bottom:10px">'
          +'<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#8e8e93">💵 원화예수금<span style="color:#636366">(기록 안 남음)</span></span><input class="inp inp-r" type="number" style="width:120px" data-cash-edit-krw="'+acc.id+'" value="'+(acc.cashKrw||0)+'"/></div>'
          +'<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#8e8e93">💵 외화(USD)예수금</span><input class="inp inp-r" type="number" step="0.01" style="width:120px" data-cash-edit-usd="'+acc.id+'" value="'+(acc.cashUsd||0)+'"/></div>'
          +'</div>'
        : '<div style="display:flex;flex-direction:column;gap:4px;background:#000000;border-radius:8px;padding:8px 12px;margin-bottom:10px">'
          +'<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#8e8e93">💵 원화예수금</span><span style="font-size:13px;font-weight:700">'+won(acc.cashKrw||0)+'</span></div>'
          +'<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#8e8e93">💵 외화예수금</span><span style="font-size:13px;font-weight:700">'+usd(acc.cashUsd||0)+'</span></div>'
          +'</div>')
    : (editMode
        ? '<div style="display:flex;justify-content:space-between;align-items:center;background:#000000;border-radius:8px;padding:8px 12px;margin-bottom:10px">'
          +'<span style="font-size:12px;color:#8e8e93">💵 예수금 직접 수정<span style="color:#636366">(기록 안 남음)</span></span>'
          +'<input class="inp inp-r" type="number" step="0.01" style="width:120px" data-cash-edit="'+acc.id+'" value="'+(acc.cash||0)+'" placeholder="'+(isUS?"USD":"KRW")+'"/>'
          +'</div>'
        : '<div style="display:flex;justify-content:space-between;align-items:center;background:#000000;border-radius:8px;padding:8px 12px;margin-bottom:10px">'
          +'<span style="font-size:12px;color:#8e8e93">💵 예수금</span>'
          +'<span style="font-size:13px;font-weight:700">'+(isUS?usd(acc.cash||0):won(acc.cash||0))+'</span>'
          +'</div>');
  // 처음 여는 계좌(예수금 0, 보유 종목 없음)에는 매수 전에 입출금부터 해야 한다는 걸 안내
  const cashEmpty = isMixed ? ((acc.cashKrw||0)+(acc.cashUsd||0)) <= 0 : (acc.cash||0) <= 0;
  const emptyCashHint = (!isCash && !editMode && cashEmpty && acc.items.length === 0)
    ? '<div style="font-size:11px;color:#93c5fd;background:#3182f61a;border:1px solid #3182f633;border-radius:8px;padding:8px 12px;margin-bottom:10px">💡 먼저 <b>입출금</b> 버튼으로 예수금을 채운 다음 <b>+ 신규매수</b>로 종목을 사보세요</div>'
    : '';
  const hdrRight = '<div style="text-align:right">'
    +'<div style="font-weight:800;font-size:17px;color:'+acc.color+'">'+(total?won(total):"₩0")+'</div>'
    +(profit!=null?'<div style="font-size:12px;font-weight:600;color:'+(profit>=0?'#ef4444':'#3b82f6')+'">'+fProfit(profit)+'</div>':"")
    +(gp!=null?'<div style="font-size:12px;font-weight:700;color:'+(gp>=0?'#ef4444':'#3b82f6')+'">'+fPct(gp)+'</div>':"")
    +'</div>';

  const accEdit = editMode
    ? '<div style="display:flex;gap:6px;margin-bottom:12px;align-items:center">'
      +'<input class="inp inp-l" style="flex:1;font-size:13px;font-weight:600" data-acc-name="'+acc.id+'" value="'+acc.name+'"/>'
      +'<div style="display:flex;gap:4px">'+COLORS.map(col=>'<div class="color-dot'+(acc.color===col?" sel":"")+'" style="background:'+col+';width:20px;height:20px" data-acc-color="'+acc.id+'" data-color="'+col+'"></div>').join("")+'</div>'
      +'<button class="del-btn" data-acc-del="'+acc.id+'">✕</button></div>'
    : "";

  const MARKET_LABEL = {krx:"🇰🇷국내", us:"🌎해외", coin:"🪙코인"};
  const marketPicker = item => '<div style="display:flex;gap:3px;margin-bottom:3px">'
    +['krx','us'].map(m=>'<button type="button" class="btn-sm" data-market-pick="'+item.id+'" data-market-val="'+m+'" data-acc="'+acc.id+'" style="padding:2px 6px;font-size:9px;flex:none;'+(itemMarket(item,type)===m?'background:'+acc.color+';color:#fff;border-color:'+acc.color:'')+'">'+MARKET_LABEL[m]+'</button>').join("")
    +'</div>';

  let rows="";
  if (isCash) {
    rows=sorted.map(item=>editMode
      ?'<tr><td><input class="inp inp-l" data-f="n" data-id="'+item.id+'" data-acc="'+acc.id+'" value="'+item.n+'"/></td>'
        +'<td class="r"><input class="inp inp-r" type="number" data-f="a" data-id="'+item.id+'" data-acc="'+acc.id+'" value="'+(item.a||"")+'"/></td>'
        +'<td><button class="del-btn" data-del="'+item.id+'" data-acc="'+acc.id+'">✕</button></td></tr>'
      :'<tr><td style="font-size:13px;font-weight:500">'+item.n+'</td><td class="r" style="font-size:13px;font-weight:600">'+(won(item.a)||"₩0")+'</td></tr>'
    ).join("");
  } else {
    const visibleSorted = editMode ? sorted : sorted.filter(item => item.q && item.q > 0);
    rows=visibleSorted.map(item=>{
      // 혼합계좌는 종목마다 시장(국내/해외/코인)이 다를 수 있어 행 단위로 통화를 판정
      const rowMarket=itemMarket(item,type), rowIsUS=rowMarket==="us", rowIsCoin=rowMarket==="coin";
      const priceKrw=itemPriceKrw(item,type), val=itemVal(item,type), gp=itemGp(item,type);
      const cost=itemCost(item,type);
      const profit=(val&&cost)?val-cost:null;
      const priceStr=rowIsUS
        ?(showUSD?(px[item.t]?usd(px[item.t]):(loading?'<span class="cell-loading">···</span>':'<span class="price-na">—</span>'))
                :(priceKrw?won(priceKrw):(loading?'<span class="cell-loading">···</span>':'<span class="price-na">—</span>')))
        :(priceKrw?won(priceKrw):(loading?'<span class="cell-loading">···</span>':'<span class="price-na">—</span>'));
      const hasTrades = item.trades && item.trades.length > 0;
      if (editMode) return '<tr data-id="'+item.id+'" data-acc="'+acc.id+'" data-usd="'+rowIsUS+'">'
        +'<td style="min-width:110px">'+(isMixed&&!hasTrades?marketPicker(item):'')
        +'<input class="inp inp-l" style="font-weight:600;font-size:12px;margin-bottom:3px" data-f="t" data-id="'+item.id+'" data-acc="'+acc.id+'" value="'+item.t+'"'+(hasTrades?' disabled':'')+'/>'
        +'<input class="inp inp-l" style="font-size:10px;color:#aeaeb2" data-f="n" data-id="'+item.id+'" data-acc="'+acc.id+'" value="'+(item.n||"")+'"/></td>'
        +(hasTrades
          ? '<td class="r" style="font-size:11px;color:#8e8e93">🔒 '+item.q+'</td>'
            +'<td class="r" style="font-size:11px;color:#8e8e93">🔒 '+(rowIsUS?usd(item.a):won(item.a))+'</td>'
          : '<td class="r"><input class="inp inp-r" type="number" '+(rowIsCoin?'step="0.0001" ':'')+' data-f="q" data-id="'+item.id+'" data-acc="'+acc.id+'" value="'+(item.q||"")+'"/></td>'
            +'<td class="r"><input class="inp inp-r" type="number" data-f="a" data-id="'+item.id+'" data-acc="'+acc.id+'" value="'+(item.a||"")+'" placeholder="'+(rowIsUS?"USD":"KRW")+'"/></td>')
        +'<td class="r">'+priceStr+'</td>'
        +'<td class="r" style="font-weight:600" data-calc="val">'+(rowIsUS?(val&&usdKrw?usd(val/usdKrw):"—"):(val?won(val):"₩0"))+'</td>'
        +'<td class="r '+gCls(profit)+'" data-calc="profit">'+(rowIsUS?(profit&&usdKrw?((profit>=0?"+":"")+"$"+Math.abs(profit/usdKrw).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})):"—"):fProfit(profit))+'</td>'
        +'<td class="r '+gCls(gp)+'" data-calc="gp">'+fPct(gp)+'</td>'
        +'<td><button class="del-btn" data-del="'+item.id+'" data-acc="'+acc.id+'">✕</button></td></tr>';
      const isGhost = (!item.q || item.q === 0);
      return '<tr class="ticker-row" data-trade-item="'+item.id+'" data-trade-acc="'+acc.id+'"'+(isGhost?' style="opacity:0.4"':'')+'>'
        +'<td style="min-width:110px"><div class="ticker">'+(isMixed?MARKET_LABEL[rowMarket]+' ':'')+item.t+(isGhost?' <span style="font-size:9px;color:#8e8e93">(보유 0)</span>':'')+'</div><div class="subname">'+(item.n||"")+'</div></td>'
        +'<td class="r">'+item.q+'</td>'
        +'<td class="r" style="color:#aeaeb2">'+(rowIsUS?usd(item.a):won(item.a))+'</td>'
        +'<td class="r">'+priceStr+'</td>'
        +'<td class="r" style="font-weight:600">'+(rowIsUS?(val&&usdKrw?usd(val/usdKrw):"—"):(val?won(val):"₩0"))+'</td>'
        +'<td class="r '+gCls(profit)+'" style="font-weight:600">'+(rowIsUS?(profit&&usdKrw?((profit>=0?"+":"")+"$"+Math.abs(profit/usdKrw).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})):"—"):fProfit(profit))+'</td>'
        +'<td class="r '+gCls(gp)+'" style="font-weight:700">'+fPct(gp)+'</td></tr>';
    }).join("");
  }

  const tradeHint = (!isCash && acc.items.length > 0 && !editMode)
    ? '<div style="font-size:11px;color:#636366;margin-bottom:6px;text-align:right">💡 종목 탭하면 매수/매도</div>'
    : '';
  const priceColLabel = isMixed
    ? '<th class="r"><span style="cursor:pointer;border-bottom:1px dashed #636366" id="btn-toggle-usd">현재가'+(showUSD?"(USD/원)▾":"(원)▾")+'</span></th>'
    : (isUS?'<th class="r"><span style="cursor:pointer;border-bottom:1px dashed #636366" id="btn-toggle-usd">'+(showUSD?"현재가(USD)▾":"현재가(원)▾")+'</span></th>':'<th class="r">현재가(원)</th>');
  const thead=isCash
    ?'<thead><tr><th style="text-align:left">항목</th><th class="r">금액</th>'+(editMode?'<th></th>':'')+'</tr></thead>'
    :'<thead><tr><th style="text-align:left">종목</th><th class="r">수량</th><th class="r">'+(isMixed?"평단":isUS?"평단(USD)":"평단(원)")+'</th>'
      +priceColLabel
      +'<th class="r">평가금액</th><th class="r">수익금</th><th class="r">수익률</th>'+(editMode?'<th></th>':'')+'</tr></thead>';

  if (!acc.deposits) acc.deposits=[];
  const valItems=sorted.filter(x=>isCash?Number(x.a)>0:x.q>0&&itemValBest(x,type)>0).map(x=>({l:isCash?x.n:(x.n||x.t),v:itemValBest(x,type)}));
  const secItems=sectorMapToItems(calcSectorMap([acc]));

  return '<div class="card" style="border-top:3px solid '+acc.color+'">'
    +'<div class="card-hdr" style="margin-bottom:10px"><span class="card-title">'+acc.name+'</span>'+hdrRight+'</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">'+buyBtn+'</div>'
    +cashRow
    +emptyCashHint
    +accEdit
    +tradeHint
    +'<div class="tbl-wrap"><table>'+thead+'<tbody>'+rows+'</tbody></table></div>'
    +(editMode?'<button class="add-btn" data-add-item="'+acc.id+'">+ 종목 추가</button>':"")
    +(acc.type!=="cash" ? buildDepositSection(acc.deposits, acc.id) : "")
    +buildAccountHistorySection(acc)
    +buildDonutCard(valItems,acc.name+" 비중")
    +buildDonutCard(secItems,acc.name+" 섹터")
    +'</div>';
}

// ─── 목표 추적 ───────────────────────────────────────────────
function buildGoals(tot) {
  const now=new Date(), curYear=now.getFullYear(), goals=ST.goals||[];
  if (!goals.length&&!editMode) return "";
  goals.forEach(g=>{ if(curYear>g.year&&g.snapshot===null){g.snapshot=tot;saveData();} });
  const rows=goals.map((g,i)=>{
    const isExpired=curYear>g.year, isCurrent=!isExpired&&(i===0||curYear>goals[i-1].year);
    const isAchieved=tot>=g.target||(isExpired&&(g.snapshot||0)>=g.target);
    const val=isExpired?(g.snapshot||0):tot, pct=Math.min(100,Math.round(val/g.target*100));
    const isFuture=!isExpired&&!isCurrent;
    let icon,col,bar;
    if(isAchieved){icon="✅";col="#10b981";bar="#10b981";}
    else if(isExpired){icon="⚠️";col="#f59e0b";bar="#f59e0b";}
    else if(isCurrent){icon="🎯";col="#3182f6";bar="#3182f6";}
    else{icon="";col="#636366";bar="#2c2c2e";}
    const ts=g.target>=1e8?(g.target/1e8).toFixed(g.target%1e8===0?0:1)+"억":(g.target/1e4).toFixed(0)+"만";
    if(isFuture) return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;opacity:0.4"><span style="font-size:11px;color:#636366;width:36px">'+g.year+'</span><span style="font-size:12px;color:#636366;width:52px">'+ts+'</span><div style="flex:1;height:4px;background:#1c1c1e;border-radius:2px"></div></div>';
    return '<div style="margin-bottom:12px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><span>'+icon+'</span><span style="font-size:12px;color:#aeaeb2;width:36px">'+g.year+'</span><span style="font-size:12px;font-weight:600;flex:1">'+ts+'</span><span style="font-size:12px;font-weight:700;color:'+col+'">'+pct+'%</span>'+(isExpired&&!isAchieved?'<span style="font-size:10px;color:#f59e0b">기간종료</span>':"")+'</div>'
      +'<div style="height:6px;background:#1c1c1e;border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+bar+';border-radius:3px;transition:width 0.5s"></div></div>'
      +(isCurrent||isExpired?'<div style="font-size:10px;color:#636366;margin-top:3px;text-align:right">'+(isExpired?'종료시 ':'현재 ')+won(val)+(isExpired&&!isAchieved?' · '+won(g.target-(g.snapshot||0))+" 미달":'')+'</div>':"")
      +'</div>';
  }).join("");
  const editRows=editMode?goals.map(g=>'<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center"><input class="inp inp-r" type="number" style="width:60px" data-gf="year" data-gid="'+g.id+'" value="'+g.year+'"/><input class="inp inp-r" type="number" style="flex:1" data-gf="target" data-gid="'+g.id+'" value="'+g.target+'"/><button class="del-btn" data-gdel="'+g.id+'">✕</button></div>').join("")+'<button class="add-btn" id="btn-add-goal">+ 목표 추가</button>':"";
  return '<div class="card" style="border-top:3px solid #3182f6;margin-bottom:12px"><div class="card-hdr"><span class="card-title">📈 목표 달성 현황</span></div>'+(editMode?editRows:rows)+'</div>';
}

// ─── 전체 현황 ───────────────────────────────────────────────
function buildOverview() {
  const tot=grandTotal(), profit=grandProfit(), gp=grandGp();
  const pp=v=>tot>0?(v/tot*100).toFixed(1):"0.0";
  const segs=ST.accounts.map(a=>({l:a.name,v:accTotal(a),c:a.color})).filter(s=>s.v>0);
  const paths=buildDonutSVG(segs,tot,80,80,65,38,true);
  const legend=segs.map(s=>'<div class="legend-item" data-label="'+s.l+'" style="display:flex;justify-content:space-between;margin-bottom:7px;align-items:center;transition:opacity 0.2s"><div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:2px;background:'+s.c+'"></div><span style="font-size:12px">'+s.l+'</span></div><div><span style="font-size:11px;font-weight:700;color:#aeaeb2;margin-right:4px">'+pp(s.v)+'%</span><span style="font-size:12px;font-weight:600">'+won(s.v)+'</span></div></div>').join("");
  const secItems=sectorMapToItems(calcSectorMap(ST.accounts));
  // 종목별 비중 헬퍼 — 계좌가 아니라 종목(item) 단위로 시장을 판정 (혼합계좌 대응)
  function buildTickerItems(marketFilterFn, colorFn) {
    const map={};
    for (const acc of ST.accounts) {
      for (const item of acc.items) {
        if (!item.q) continue; // 현금 항목(.q 없음)은 자연히 제외됨
        if (!marketFilterFn(itemMarket(item,acc.type))) continue;
        const v=itemValBest(item,acc.type); if(!v) continue;
        const key=item.t||"?";
        if (!map[key]) map[key]={v:0, label:item.n||item.t||key};
        map[key].v+=v;
      }
    }
    return Object.entries(map)
      .sort((a,b)=>b[1].v-a[1].v)
      .filter(([,x])=>x.v>0)
      .map(([t,x],i)=>({l:x.label, t, v:x.v, c:colorFn?colorFn(t,i):COLORS[i%COLORS.length]}));
  }
  const usItems  = buildTickerItems(m=>m==="us",  (l,i)=>SECTOR_COLORS[getSector(l,"us")]  ||COLORS[i%COLORS.length]);
  const krxItems = buildTickerItems(m=>m==="krx", (l,i)=>SECTOR_COLORS[getSector(l,"krx")] ||COLORS[i%COLORS.length]);
  const allItems = buildTickerItems(()=>true, (l,i)=>COLORS[i%COLORS.length]);

  // 각 투자계좌의 예수금을 "예수금" 항목으로 합산해서 종목별 비중에 추가
  let totalCashKrw = 0;
  for (const acc of ST.accounts) {
    if (acc.type === "cash") continue;
    if (acc.type === "mixed") { totalCashKrw += (acc.cashKrw||0) + (acc.cashUsd||0)*(usdKrw||0); continue; }
    if (!acc.cash) continue;
    totalCashKrw += acc.type === "us" ? (acc.cash * (usdKrw||0)) : acc.cash;
  }
  const allItemsWithCash = totalCashKrw > 0
    ? [...allItems, {l:"예수금", v: totalCashKrw, c: SECTOR_COLORS["현금/예금"]||"#636366"}].sort((a,b)=>b.v-a.v)
    : allItems;

  return buildGoals(tot)
    +'<div class="card-grad">'
    +'<div style="font-size:12px;color:#8e8e93;margin-bottom:6px">총 평가 자산</div>'
    +'<div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">'
    +'<div style="font-size:32px;font-weight:800;letter-spacing:-1px">'+(tot?won(tot):"₩0")+'</div>'
    +(gp!=null?'<div style="font-size:16px;font-weight:700;color:'+(gp>=0?'#ef4444':'#3b82f6')+'">'+fPct(gp)+'</div>':"")
    +'</div>'
    +(profit!=null?'<div style="font-size:13px;font-weight:600;color:'+(profit>=0?'#ef4444':'#3b82f6')+';margin-top:4px">'+fProfit(profit)+'</div>':"")
    +'<div style="margin-top:8px;display:flex;gap:14px;flex-wrap:wrap">'+segs.map(s=>'<span style="font-size:11px;color:#8e8e93">'+s.l+' <b style="color:#aeaeb2">'+pp(s.v)+'%</b></span>').join("")+'</div></div>'
    +buildOverviewDepositSection()
    +buildDonutCard(secItems,"섹터 비중")
    +'<div class="card"><div class="card-title" style="margin-bottom:12px">계좌별 비중</div>'
    +(segs.length
      ?'<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap"><svg id="overview-donut" width="160" height="160" viewBox="0 0 160 160" style="flex-shrink:0">'+paths+'<text x="80" y="75" text-anchor="middle" fill="#aeaeb2" font-size="9" class="donut-ct">탭하여</text><text x="80" y="88" text-anchor="middle" fill="#aeaeb2" font-size="9" class="donut-cb">확인</text></svg><div style="flex:1;min-width:140px">'+legend+'</div></div>'
      :'<div style="color:#636366;text-align:center;padding:16px;font-size:12px">자산을 입력해주세요</div>')
    +(allItemsWithCash.length >= 2 ? buildDonutCard(allItemsWithCash, '📦 전체 종목별 비중') : '');
}

// ─── 리밸런싱 계산기 모달 ────────────────────────────────────
function buildRebalanceModal() {
  if (!rebalanceModal) return "";
  const acc = ST.accounts.find(a=>a.id===rebalanceModal.accId);
  if (!acc) return "";
  const isUS = acc.type === "us"; // 레거시 단일통화 계좌용 (혼합계좌는 항상 KRW 기준으로 통일)
  const isMixed = acc.type === "mixed";
  const items = acc.items.filter(it=>it.t && (it.q||0) > 0); // 현재 보유 중인 종목만 (현금성/청산 종목 제외)
  const curTotal = items.reduce((s,it)=>s+itemVal(it, acc.type), 0); // KRW 환산 평가금액 합
  const defaultInvest = isMixed ? (acc.cashKrw||0) + (acc.cashUsd||0)*(usdKrw||0) : (acc.cash||0);
  const investRaw = rebalanceModal.investAmount != null ? rebalanceModal.investAmount : defaultInvest;
  const investKrw = isUS ? investRaw*(usdKrw||1) : investRaw; // 계산은 전부 KRW 기준으로 통일 (혼합계좌도 KRW로 입력)
  const futureTotal = curTotal + investKrw;

  const rows = items.map(it=>{
    const val = itemVal(it, acc.type);
    const curPct = curTotal>0 ? val/curTotal*100 : 0;
    const tp = Number(it.tp)||0;
    const targetVal = futureTotal * tp/100;
    const need = Math.max(0, targetVal - val);
    return {item:it, val, curPct, tp, need};
  });

  const totalNeed = rows.reduce((s,r)=>s+r.need,0);
  const scale = totalNeed > investKrw && totalNeed>0 ? investKrw/totalNeed : 1;

  const rowsHtml = rows.map(r=>{
    const rowMarket = itemMarket(r.item, acc.type);
    const rowIsUS = rowMarket === "us"; // 혼합계좌는 종목마다 통화가 다를 수 있어 행 단위로 판정
    const buyKrw = r.need*scale;
    const buyNative = rowIsUS ? buyKrw/(usdKrw||1) : buyKrw; // 매수 제안 금액을 종목 통화로 환산
    const price = px[r.item.t] || r.item.a || 0;
    const shares = price>0 ? Math.floor((buyNative/price)*10000)/10000 : 0;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1c1c1e">
      <div style="flex:1">
        <div style="font-weight:700;font-size:13px">${isMixed?({krx:"🇰🇷",us:"🌎",coin:"🪙"}[rowMarket]||"")+" ":""}${r.item.n||r.item.t}</div>
        <div style="font-size:10px;color:#8e8e93">목표 <input class="inp" data-rb-tp="${r.item.id}" type="number" step="0.1" min="0" max="100" style="width:48px;padding:2px 4px;font-size:10px" value="${r.tp}"/>% · 현재 ${r.curPct.toFixed(1)}%</div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:700;color:${buyNative>0.009?"#ef4444":"#636366"};font-size:13px">${buyNative>0.009?(rowIsUS?usd(buyNative):won(buyNative)):"—"}</div>
        <div style="font-size:10px;color:#8e8e93">${shares>0?shares+(rowMarket==="coin"?"":"주"):""}</div>
      </div>
    </div>`;
  }).join("");

  const tpSum = rows.reduce((s,r)=>s+r.tp,0);
  const warnHtml = Math.abs(tpSum-100) > 0.5
    ? `<div style="font-size:11px;color:#f59e0b;margin-bottom:8px">⚠ 목표비중 합계 ${tpSum.toFixed(1)}% (100%가 안 되면 남는 만큼은 계산에서 빠져요)</div>` : "";
  const scaleWarnHtml = scale < 1
    ? `<div style="font-size:11px;color:#8e8e93;margin-bottom:8px">필요 금액(${isUS?usd(totalNeed/(usdKrw||1)):won(totalNeed)})이 투자금보다 많아서 비율대로 나눴어요</div>` : "";

  return `<div class="trade-modal-bg" id="rebalance-modal-bg">
    <div class="trade-modal">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:16px;font-weight:800">🎯 ${acc.name} 리밸런싱</div>
        <button id="rb-close" style="background:transparent;border:none;color:#8e8e93;font-size:20px;cursor:pointer">✕</button>
      </div>
      <div class="trade-inp-group">
        <div class="trade-inp-label">이번에 투자할 금액 (${isUS?"USD":isMixed?"KRW, 원화+외화 예수금 합산":"KRW"}, 기본값=예수금)</div>
        <input class="trade-inp" id="rb-invest" type="number" step="0.01" value="${investRaw}"/>
      </div>
      ${warnHtml}${scaleWarnHtml}

    </div>
  </div>`;
}

// ─── 매수/매도 모달 ──────────────────────────────────────────
function buildTradeModal() {
  if (!tradeModal) return "";
  const {accId, itemId, mode} = tradeModal;
  const acc  = ST.accounts.find(a=>a.id===accId);
  const isNew = itemId === "__new__";
  const item = isNew ? null : acc?.items.find(x=>x.id===itemId);
  const isMixedAcc = acc?.type === "mixed";
  // 신규 매수인데 혼합계좌면 아직 시장을 안 골랐을 수 있으니 tradeModal.market(기본 krx)을 씀
  const market = isNew ? (isMixedAcc ? (tradeModal.market||"krx") : acc?.type) : itemMarket(item, acc?.type);
  const isUS = market === "us";
  const isCoin = market === "coin";
  const curPrice = item ? (px[item.t] || 0) : 0;
  const curPriceKrw = isUS ? (curPrice*(usdKrw||0)) : curPrice;

  // 신규 종목이면 매수 고정
  const isBuy = isNew ? true : mode === "buy";

  const marketPickerHtml = (isNew && isMixedAcc) ? `<div class="trade-inp-group">
        <div class="trade-inp-label">시장</div>

// ─── 팝업 ────────────────────────────────────────────────────
function clearOverlayLine(svg) {
  svg?.parentElement?.querySelector(".donut-popup")?.remove();
  const legend=svg?.parentElement?.querySelector(".donut-legend");
  if (legend) legend.style.visibility="";
  if (svg?.parentElement) svg.parentElement.style.position="";
}
function showDonutPopup(seg, svg) {
  clearOverlayLine(svg);
  const flex=svg?.parentElement, legend=flex?.querySelector(".donut-legend");
  if (!flex||!legend) return;
  legend.style.visibility="hidden"; flex.style.position="relative";
  const popup=document.createElement("div");
  popup.className="donut-popup";
  popup.style.cssText="position:absolute;background:#000000;border:1px solid #3182f6;border-radius:10px;padding:12px 14px;box-shadow:0 0 12px rgba(99,102,241,0.3);pointer-events:none";
  popup.innerHTML='<div style="font-size:11px;color:#aeaeb2;margin-bottom:4px">'+seg.dataset.label+'</div><div style="font-size:16px;font-weight:800">'+won(Number(seg.dataset.val))+'</div><div style="font-size:14px;font-weight:700;color:#3182f6;margin-top:3px">'+seg.dataset.pct+'%</div>';
  flex.style.position="relative";
  const lr=legend.getBoundingClientRect(), fr=flex.getBoundingClientRect();
  popup.style.top=(lr.top-fr.top)+"px"; popup.style.left=(lr.left-fr.left)+"px"; popup.style.width=lr.width+"px";
  flex.appendChild(popup);
  clearTimeout(window._popTimer);
  window._popTimer=setTimeout(()=>{ clearOverlayLine(svg); svg?.querySelectorAll(".donut-seg").forEach(s=>{s.style.opacity="1";delete s.dataset.active;}); const ct=svg?.querySelector(".donut-ct");if(ct)ct.textContent="탭하여"; const cb=svg?.querySelector(".donut-cb");if(cb)cb.textContent="확인"; },3000);
}
function showSectorPopup(seg, svg) {
  clearOverlayLine(svg);
  const sectorName=seg.dataset.label;
  const accs=tab==="overview"?ST.accounts:ST.accounts.filter(a=>a.id===tab);
  const items=[];
  for (const acc of accs) {
    if (acc.type==="cash") continue;
    for (const item of acc.items) {
      if (!item.q||getSector(item.t,itemMarket(item,acc.type))!==sectorName) continue;
      const v=itemValBest(item,acc.type); if(v>0) items.push({t:item.t,v});
    }
  }
  items.sort((a,b)=>b.v-a.v);
  const sectorTotal=items.reduce((s,x)=>s+x.v,0);
  const flex=svg?.parentElement, legend=flex?.querySelector(".donut-legend");
  if (!flex||!legend) return;
  legend.style.visibility="hidden"; flex.style.position="relative";
  const popup=document.createElement("div");
  popup.className="donut-popup";
  popup.style.cssText="position:absolute;background:#000000;border:1px solid #3182f6;border-radius:10px;padding:10px 12px;box-shadow:0 0 12px rgba(99,102,241,0.3);pointer-events:none;overflow-y:auto;max-height:160px";
  popup.innerHTML='<div style="font-size:11px;font-weight:700;color:#3182f6;margin-bottom:8px">'+sectorName+'</div>'
    +items.map(item=>'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;gap:8px"><span style="font-size:12px;font-weight:600;flex-shrink:0">'+item.t+'</span><span style="font-size:10px;color:#aeaeb2;flex-shrink:0">'+(sectorTotal?(item.v/sectorTotal*100).toFixed(1):"0.0")+'%</span><span style="font-size:11px;font-weight:600">'+won(item.v)+'</span></div>').join("")
    +(items.length===0?'<div style="font-size:11px;color:#636366">종목 없음</div>':"");
  const lr=legend.getBoundingClientRect(), fr=flex.getBoundingClientRect();
  popup.style.top=(lr.top-fr.top)+"px"; popup.style.left=(lr.left-fr.left)+"px"; popup.style.width=lr.width+"px";
  flex.appendChild(popup);
  clearTimeout(window._popTimer);
  window._popTimer=setTimeout(()=>{ clearOverlayLine(svg); svg?.querySelectorAll(".donut-seg").forEach(s=>{s.style.opacity="1";delete s.dataset.active;}); const ct=svg?.querySelector(".donut-ct");if(ct)ct.textContent="탭하여"; const cb=svg?.querySelector(".donut-cb");if(cb)cb.textContent="확인"; },4000);
}



// ─── 거래 히스토리 기반 재계산 (이동평균법) ─────────────────
// 매도 시 원가도 비례 차감하는 표준 이동평균법. 매수 단순평균이 아님.
function computeMovingAverage(trades) {
  const sorted = [...trades]
    .filter(t=>t.type==="buy"||t.type==="sell")
    .sort((a,b)=> a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  let qty = 0, cost = 0;
  for (const t of sorted) {
    if (t.type === "buy") {
      cost += t.qty * t.price;
      qty  += t.qty;
    } else if (t.type === "sell") {
      const avg = qty > 0 ? cost / qty : 0;
      cost -= avg * t.qty;
      qty  -= t.qty;
    }
  }
  return { qty, avg: qty > 0 ? cost / qty : 0 };
}

function recalcItemFromTrades(acc, item) {
  if (!item.trades) return;
  const { qty, avg } = computeMovingAverage(item.trades);
  item.q = qty;
  item.a = avg;
}

// 예수금 전체 재계산: 입출금 + 모든 거래를 처음부터 다시 합산
function recalcAccountCash(accId) {
  const acc = ST.accounts.find(a=>a.id===accId);
  if (!acc || acc.type === "cash") return;
  const isUS = acc.type === "us";
  const isMixed = acc.type === "mixed";

  if (isMixed) {
    // 혼합계좌: 원화/외화 예수금을 각각 그 통화의 입출금·거래만 모아서 재계산
    const recalcOne = ccy => {
      let cash = 0;
      for (const d of (acc.deposits||[])) {
        if ((d.ccy||"krw") !== ccy) continue;
        if (d.type === "cash-in") cash += d.amount;
        else if (d.type === "cash-out") cash -= Math.abs(d.amount);
      }
      for (const item of acc.items) {
        if ((itemMarket(item,acc.type)==="us"?"usd":"krw") !== ccy) continue;
        for (const tr of (item.trades||[])) {
          if (tr.type === "buy")       cash -= tr.qty * tr.price;
          else if (tr.type === "sell") cash += tr.qty * tr.price;
          else if (tr.type === "dividend") cash += tr.amount;
        }
      }
      return cash;
    };
    acc.cashKrw = recalcOne("krw");
    acc.cashUsd = recalcOne("usd");
    saveData();
    render();
    alert("예수금을 재계산했어요.\n" + acc.name + ": " + won(acc.cashKrw) + " / " + usd(acc.cashUsd));
    return;
  }

  let cash = acc.openingCash || 0; // IRP/연금저축처럼 거래내역서 없는 계좌는 기초 예수금부터 시작
  // 1) 입출금 내역 합산 (us는 저장된 KRW를 당시 환율 몰라서 amount/rate 저장 안했으므로 USD 환산분을 별도 추적 필요)
  //    cash-in/out의 amount는 KRW 기준으로 저장되어 있으므로, USD 계좌는 usdAmount 필드가 있으면 그걸 쓰고 없으면 현재환율로 근사
  for (const d of (acc.deposits||[])) {
    if (d.type === "cash-in") {
      cash += (d.usdAmount != null) ? d.usdAmount : (isUS ? (d.amount/(usdKrw||1350)) : d.amount);
    } else if (d.type === "cash-out") {
      cash -= Math.abs((d.usdAmount != null) ? d.usdAmount : (isUS ? (d.amount/(usdKrw||1350)) : d.amount));
    }
  }
  // 2) 모든 거래 반영
  for (const item of acc.items) {
    for (const tr of (item.trades||[])) {
      if (tr.type === "buy")       cash -= tr.qty * tr.price;
      else if (tr.type === "sell") cash += tr.qty * tr.price;
      else if (tr.type === "dividend") cash += tr.amount;
    }
  }
  acc.cash = cash;
  saveData();
  render();
  alert("예수금을 재계산했어요.\n" + acc.name + ": " + (isUS ? usd(cash) : won(cash))
    + (isUS ? "\n\n※ 과거 환전 시 환율 정보가 없는 입출금은 현재 환율로 근사 계산됐어요. 값이 다르면 입출금으로 보정해주세요." : ""));
}

function deleteTrade(accId, itemId, tradeId) {
  const acc  = ST.accounts.find(a=>a.id===accId);
  const item = acc?.items.find(x=>x.id===itemId);
  if (!acc || !item || !item.trades) return;
  const tr = item.trades.find(t=>t.id===tradeId);
  if (!tr) return;

  // 매수 삭제 검증: 삭제 후 총매수량 < 총매도량이 되면 차단
  if (tr.type === "buy") {
    const totalBuyAfter = item.trades.filter(t=>t.type==="buy" && t.id!==tradeId).reduce((s,t)=>s+t.qty,0);
    const totalSold     = item.trades.filter(t=>t.type==="sell").reduce((s,t)=>s+t.qty,0);
    if (totalBuyAfter < totalSold) {
      alert("이 매수를 삭제하면 매도 수량이 매수 수량보다 많아져요.\n연결된 매도 기록을 먼저 삭제해주세요.");
      return;
    }
  }

  // 예수금 역산: 매수 삭제 → 예수금 복구(+), 매도 삭제 → 예수금 차감(-), 배당 삭제 → 예수금 차감(-)
  const trCcy = itemMarket(item, acc.type) === "us" ? "usd" : "krw";
  if (tr.type === "buy") {
    adjustCash(acc, trCcy, tr.qty*tr.price);
  } else if (tr.type === "sell") {
    adjustCash(acc, trCcy, -tr.qty*tr.price);
  } else if (tr.type === "dividend") {
    adjustCash(acc, trCcy, -tr.amount);
  }

  item.trades = item.trades.filter(t=>t.id!==tradeId);
  recalcItemFromTrades(acc, item);

  // trades가 비고 수량도 0이면 종목 삭제 여부 확인
  if (!item.trades.length && item.q === 0) {
    if (confirm("거래 내역이 없어졌어요. 종목을 삭제할까요?")) {
      const idx = acc.items.findIndex(x=>x.id===itemId);
      if (idx>-1) acc.items.splice(idx,1);
      saveData();
      tradeModal = null;
      render();
      return;
    }
  }
  saveData();
  render();
}

// 환전/입출금 기록 삭제 (예수금 자동 역산)
function deleteDeposit(accId, depositId) {
  const acc = ST.accounts.find(a=>a.id===accId);
  if (!acc || !acc.deposits) return;
  const dep = acc.deposits.find(d=>d.id===depositId);
  if (!dep) return;

  if (acc.type === "mixed") {
    const ccy = dep.ccy || "krw";
    if (dep.type === "cash-in") adjustCash(acc, ccy, -Math.abs(dep.amount));
    else if (dep.type === "cash-out") adjustCash(acc, ccy, Math.abs(dep.amount));
  } else {
    const isUS = acc.type === "us";
    // 역산 기준: usdAmount 있으면 그걸로, 없으면 KRW amount를 현재 환율로 근사(USD 계좌만)
    const usdAmt = dep.usdAmount != null
      ? dep.usdAmount
      : (isUS ? dep.amount/(usdKrw||1350) : dep.amount);

    if (dep.type === "cash-in") {
      acc.cash = (acc.cash||0) - Math.abs(usdAmt);
    } else if (dep.type === "cash-out") {
      acc.cash = (acc.cash||0) + Math.abs(usdAmt);
    }
  }

  acc.deposits = acc.deposits.filter(d=>d.id!==depositId);
  saveData();
  render();
}

function bindMergeModalEvents() {
  if (!mergeModal) return;
  const $ = id => document.getElementById(id);
  $("merge-close")?.addEventListener("click",()=>{ mergeModal=null; render(); });
  $("merge-modal-bg")?.addEventListener("click",e=>{ if(e.target.id==="merge-modal-bg"){mergeModal=null;render();} });
  document.querySelectorAll("[data-merge-pick]").forEach(row=>row.addEventListener("click",()=>{
    const id = row.dataset.mergePick;
    const sel = mergeModal.selectedIds||(mergeModal.selectedIds=[]);
    const i = sel.indexOf(id);
    if (i>-1) sel.splice(i,1); else sel.push(id);
    render();
  }));
  $("merge-name")?.addEventListener("input", e=>{ mergeModal.name = e.target.value; });
  $("merge-confirm")?.addEventListener("click",()=>{
    const ids = mergeModal.selectedIds||[];
    if (ids.length<2) return;
    const name = ($("merge-name")?.value||"").trim() || "합쳐진 계좌";
    if (!confirm("'"+name+"'(으)로 "+ids.length+"개 계좌를 합칠까요?\n합치기 전에 지금 상태를 백업 파일로 자동 다운로드해요. 문제가 생기면 그 파일로 복원할 수 있어요.")) return;
    backupData(); // 되돌릴 수 있게 안전장치로 항상 먼저 백업
    mergeAccountsIntoMixed(ids, name);
    mergeModal = null;
  });
}

function markTutorialSeen() { try { localStorage.setItem(TUTORIAL_SEEN_KEY, "1"); } catch {} }
function bindTutorialEvents() {
  if (tutorialStep == null) return;
  const $ = id => document.getElementById(id);
  $("tutorial-quit")?.addEventListener("click",()=>{ tutorialStep=null; markTutorialSeen(); render(); });
  $("tutorial-modal-bg")?.addEventListener("click",e=>{ if(e.target.id==="tutorial-modal-bg"){tutorialStep=null;markTutorialSeen();render();} });
  $("tutorial-prev")?.addEventListener("click",()=>{ tutorialStep=Math.max(0,tutorialStep-1); render(); });
  $("tutorial-next")?.addEventListener("click",()=>{

// 여러 US/KRX/코인(또는 이미 혼합) 계좌를 하나의 혼합계좌로 합침 — 보유 종목/거래내역/예수금 그대로 이관
function mergeAccountsIntoMixed(accIds, name) {
  const srcAccs = accIds.map(id=>ST.accounts.find(a=>a.id===id)).filter(Boolean);
  if (srcAccs.length < 2) return;

  const merged = { id:"a"+Date.now(), name, type:"mixed", color:srcAccs[0].color, cashKrw:0, cashUsd:0, items:[], deposits:[] };

  for (const acc of srcAccs) {
    // 예수금 이관
    if (acc.type === "mixed") {
      merged.cashKrw += acc.cashKrw||0;
      merged.cashUsd += acc.cashUsd||0;
    } else if (acc.type === "us") {
      merged.cashUsd += acc.cash||0;
    } else {
      merged.cashKrw += acc.cash||0; // krx/coin
    }
    // 종목 이관 — 레거시 계좌 종목엔 market을 명시적으로 붙여줌
    for (const item of acc.items) {
      if (!item.market) item.market = itemMarket(item, acc.type);
      merged.items.push(item);
    }
    // 입출금 기록 이관 — 레거시 US 계좌는 usdAmount(또는 근사치)를 실제 USD 금액으로 변환해 ccy 태그를 붙임
    for (const d of (acc.deposits||[])) {
      if (acc.type === "mixed") {
        merged.deposits.push(d);
      } else if (acc.type === "us") {
        const usdAmt = d.usdAmount != null ? d.usdAmount : d.amount/(usdKrw||1350);
        merged.deposits.push({ ...d, amount: d.type==="cash-out" ? -Math.abs(usdAmt) : Math.abs(usdAmt), ccy:"usd", usdAmount: undefined });
      } else {
        merged.deposits.push({ ...d, ccy:"krw" });
      }
    }
  }

  ST.accounts = ST.accounts.filter(a=>!accIds.includes(a.id)).concat([merged]);
  tab = merged.id;
  saveData();
  render();
  alert("✅ '"+name+"' 계좌로 합쳤어요. 문제가 있으면 방금 다운로드된 백업 파일로 복원할 수 있어요.");
}
