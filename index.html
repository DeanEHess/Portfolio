<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>자산 대시보드</title>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="자산현황"/>
  <meta name="theme-color" content="#0f172a"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#0f172a;color:#e2e8f0;font-family:'Apple SD Gothic Neo','Pretendard',sans-serif;min-height:100vh;}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
    input,button{outline:none;font-family:inherit;}
    ::-webkit-scrollbar{height:4px;}
    ::-webkit-scrollbar-track{background:#0f172a;}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:2px;}
    #app{max-width:600px;margin:0 auto;padding:16px 14px;}
    .hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
    .hdr-title{font-size:20px;font-weight:800;letter-spacing:-0.5px;}
    .hdr-sub{font-size:11px;color:#475569;margin-top:3px;}
    .hdr-rate{font-size:12px;color:#94a3b8;font-weight:600;margin-top:2px;}
    .hdr-btns{display:flex;gap:6px;flex-shrink:0;}
    .btn{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:7px 13px;border-radius:8px;font-size:15px;cursor:pointer;}
    .btn.on{background:#6366f1;}
    .tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
    .tab{background:#1e293b;border:none;color:#64748b;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;flex-shrink:0;}
    .tab.on{background:#6366f1;color:#fff;font-weight:700;}
    .card{background:#1e293b;border-radius:16px;padding:14px;margin-bottom:12px;border:1px solid #334155;}
    .card-grad{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid #1e293b;border-radius:16px;padding:18px 16px;margin-bottom:12px;}
    .card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .tbl-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    th{padding:5px 6px;color:#475569;font-weight:600;font-size:10px;border-bottom:1px solid #334155;white-space:nowrap;}
    tr{border-bottom:1px solid #0f172a;}
    td{padding:8px 6px;vertical-align:middle;}
    .r{text-align:right;}
    .inp{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:4px 6px;font-size:11px;width:100%;}
    .add-btn{margin-top:8px;background:transparent;border:1px dashed #334155;color:#475569;padding:6px 12px;border-radius:8px;font-size:12px;width:100%;cursor:pointer;}
    .del-btn{background:#7f1d1d;border:none;color:#fca5a5;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;}
    .up{color:#ef4444;font-weight:700;}
    .dn{color:#3b82f6;font-weight:700;}
    .na{color:#94a3b8;}
    .dim{color:#475569;font-size:10px;}
    #tip{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #334155;border-radius:12px;padding:10px 16px;font-size:13px;color:#e2e8f0;z-index:999;text-align:center;min-width:180px;box-shadow:0 4px 20px rgba(0,0,0,0.5);display:none;}
  </style>
</head>
<body>
<div id="app"></div>
<div id="tip"></div>

<script>
// ─── 자동완성 DB ───────────────────────────────────────────────
const US_DB = {
  NVO:"Novo Nordisk", TQQQ:"ProShares UltraPro QQQ", JEPQ:"JPMorgan Nasdaq Eq Premium",
  QLD:"ProShares Ultra QQQ", SGOV:"iShares 0-3M Treasury", QQQ:"Invesco QQQ",
  SPY:"SPDR S&P500", VOO:"Vanguard S&P500", VTI:"Vanguard Total Market",
  NVDA:"NVIDIA", AAPL:"Apple", MSFT:"Microsoft", GOOGL:"Alphabet",
  AMZN:"Amazon", META:"Meta", TSLA:"Tesla", SOXL:"Direxion Semi 3X",
  UPRO:"ProShares UltraPro S&P500", TLT:"iShares 20Y Treasury",
  GLD:"SPDR Gold", PLTR:"Palantir", AMD:"AMD",
  JEPI:"JPMorgan Equity Premium", SCHD:"Schwab US Dividend", EQIX:"Equinix",
};
const KRX_ETF_DB = {
  "381170":"TIGER 미국테크TOP10 INDXX", "360750":"TIGER 미국S&P500",
  "381180":"TIGER 미국필라델피아반도체", "411060":"ACE KRX금현물",
  "367380":"ACE 미국나스닥100", "360200":"ACE 미국S&P500",
  "438080":"ACE 미국S&P500미국채혼합50액티브", "069500":"KODEX 200",
  "133690":"TIGER 미국나스닥100", "379800":"KODEX 미국S&P500",
  "448290":"KODEX 미국배당다우존스",
};
const KRX_STOCK_DB = {
  "005930":"삼성전자", "000660":"SK하이닉스", "035420":"NAVER",
  "035720":"카카오", "000270":"기아", "005380":"현대차",
  "051910":"LG화학", "006400":"삼성SDI", "207940":"삼성바이오로직스",
  "068270":"셀트리온", "105560":"KB금융", "055550":"신한지주",
  "003550":"LG", "066570":"LG전자", "017670":"SK텔레콤", "030200":"KT",
};

// ─── 색상 팔레트 ───────────────────────────────────────────────
const COLORS = ["#6366f1","#f59e0b","#10b981","#3b82f6","#f43f5e","#a855f7","#06b6d4","#84cc16","#f97316","#ec4899"];

// ─── 저장소 ───────────────────────────────────────────────────
const SK = "asset_v6";
const DEFAULT_TAB_ORDER = ["overview","us","krx","pen","irp","coins","cash"];
const DEFAULT_DATA = {
  us:    [{id:"us1",t:"NVO",n:"Novo Nordisk",q:0,a:0},{id:"us2",t:"TQQQ",n:"ProShares UltraPro QQQ",q:0,a:0},{id:"us3",t:"JEPQ",n:"JPMorgan Nasdaq Eq Premium",q:0,a:0},{id:"us4",t:"QLD",n:"ProShares Ultra QQQ",q:0,a:0}],
  krx:   [],
  pen:   [{id:"p1",t:"381170",n:"TIGER 미국테크TOP10 INDXX",q:68,a:0},{id:"p2",t:"360750",n:"TIGER 미국S&P500",q:73,a:0},{id:"p3",t:"381180",n:"TIGER 미국필라델피아반도체",q:29,a:0},{id:"p4",t:"411060",n:"ACE KRX금현물",q:14,a:0}],
  irp:   [{id:"i1",t:"367380",n:"ACE 미국나스닥100",q:0,a:0},{id:"i2",t:"411060",n:"ACE KRX금현물",q:0,a:0},{id:"i3",t:"360200",n:"ACE 미국S&P500",q:0,a:0},{id:"i4",t:"438080",n:"ACE 미국S&P500미국채혼합50액티브",q:0,a:0}],
  coins: [{id:"c1",t:"ETH",n:"이더리움",q:0,a:0}],
  cash:  [{id:"ca1",n:"현금",a:0}],
  tabOrder: [...DEFAULT_TAB_ORDER],
};

function loadData() {
  try {
    const raw = localStorage.getItem(SK);
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_DATA));
    const d = JSON.parse(raw);
    // 누락된 키 보완
    if (!d.krx)      d.krx = [];
    if (!d.coins)    d.coins = [{id:"c1",t:"ETH",n:"이더리움",q:0,a:0}];
    if (!Array.isArray(d.cash)) d.cash = [{id:"ca1",n:"현금",a:(typeof d.cash==="number"?d.cash:0)}];
    if (!d.tabOrder) d.tabOrder = [...DEFAULT_TAB_ORDER];
    return d;
  } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function saveData() { try { localStorage.setItem(SK, JSON.stringify(ST)); } catch {} }

// ─── 앱 상태 ──────────────────────────────────────────────────
const ST = loadData();
let usdKrw  = null;
let px      = {};   // 현재가: 미국=USD, KRX/코인=KRW
let loading = false;
let lastUp  = null;
let editMode = false;
let tab = "overview";

// ─── 포맷 ─────────────────────────────────────────────────────
const won = n => n ? "₩" + Math.round(n).toLocaleString("ko-KR") : "—";
const usd = n => n ? "$" + Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}) : "—";
const pct = n => n == null ? "—" : (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
const cls = n => n == null ? "na" : n >= 0 ? "up" : "dn";

// ─── 평가금액 / 수익률 계산 ────────────────────────────────────
function usVal(item) {
  const rate = usdKrw || 0;
  const price = px[item.t] || 0;
  if (price && rate) return price * item.q * rate;
  if (item.a && rate) return item.a * item.q * rate;
  return 0;
}
function krxVal(item) {
  const price = px[item.t] || 0;
  return price ? price * item.q : item.a * item.q;
}
function coinVal(item) {
  const price = px[item.t] || 0;
  return price ? price * item.q : item.a * item.q;
}
function usGp(item)  { const p=px[item.t]; if(!p||!item.a||!item.q) return null; return ((p-item.a)/item.a)*100; }
function krxGp(item) { const p=px[item.t]; if(!p||!item.a||!item.q) return null; return ((p-item.a)/item.a)*100; }
function usPriceKrw(item) { const p=px[item.t]; return (p&&usdKrw)?p*usdKrw:null; }

function totals() {
  const usT    = ST.us.reduce((s,x)=>s+usVal(x),0);
  const krxT   = ST.krx.reduce((s,x)=>s+krxVal(x),0);
  const penT   = ST.pen.reduce((s,x)=>s+krxVal(x),0);
  const irpT   = ST.irp.reduce((s,x)=>s+krxVal(x),0);
  const coinsT = ST.coins.reduce((s,x)=>s+coinVal(x),0);
  const cashT  = ST.cash.reduce((s,x)=>s+(Number(x.a)||0),0);
  const tot = usT+krxT+penT+irpT+coinsT+cashT;
  return {usT,krxT,penT,irpT,coinsT,cashT,tot};
}

// ─── API fetch ────────────────────────────────────────────────
async function fetchAll() {
  if (loading) return;
  loading = true;
  render();

  // 환율 - 네이버 금융 USD/KRW 실시간 (allorigins 프록시)
  try {
    const url = "https://m.stock.naver.com/api/forex/FX_USDKRW";
    const d = await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url)).then(r=>r.json());
    const p = Number((d?.closePrice||d?.currentPrice||"").toString().replace(/,/g,""));
    if (p > 100) { usdKrw = p; }
    else throw "retry";
  } catch {
    try {
      const d = await fetch("https://api.exchangerate-api.com/v4/latest/USD").then(r=>r.json());
      if (d.rates?.KRW) usdKrw = d.rates.KRW;
    } catch {}
  }

  // 미국주식 - Yahoo Finance (allorigins 프록시)
  for (const s of ST.us) {
    if (!s.t) continue;
    try {
      const url = "https://query1.finance.yahoo.com/v8/finance/chart/"+s.t+"?interval=1d&range=1d";
      const d = await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url)).then(r=>r.json());
      const p = d?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (p) px[s.t] = p;
    } catch {}
  }

  // KRX - 네이버 polling API (전 종목 한번에)
  const krxCodes = [...new Set([...ST.pen,...ST.irp,...ST.krx].map(e=>e.t).filter(Boolean))];
  if (krxCodes.length) {
    try {
      const query = krxCodes.map(c=>"SERVICE_ITEM:"+c).join("|");
      const url = "https://polling.finance.naver.com/api/realtime?query="+encodeURIComponent(query);
      const d = await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url)).then(r=>r.json());
      for (const item of (d?.result?.areas?.[0]?.datas||[])) {
        const p = Number(item.nv||item.cv||0);
        if (item.cd && p > 100) px[item.cd] = p;
      }
    } catch {}
    // 못받은 종목 개별 fallback
    for (const code of krxCodes.filter(c=>!px[c])) {
      try {
        const url = "https://m.stock.naver.com/api/stock/"+code+"/basic";
        const d = await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url)).then(r=>r.json());
        const p = Number((d?.closePrice||d?.currentPrice||"").toString().replace(/,/g,""));
        if (p > 100) px[code] = p;
      } catch {}
    }
  }

  // 코인 - Upbit (직접 → allorigins 프록시 순)
  const coinTickers = [...new Set(ST.coins.map(x=>x.t).filter(Boolean))];
  if (coinTickers.length) {
    const markets = coinTickers.map(t=>"KRW-"+t).join(",");
    const upbitUrl = "https://api.upbit.com/v1/ticker?markets="+markets;
    let coinDone = false;
    try {
      const d = await fetch(upbitUrl).then(r=>r.json());
      for (const item of d) { const t=item.market.replace("KRW-",""); if(item.trade_price) px[t]=item.trade_price; }
      coinDone = true;
    } catch {}
    if (!coinDone) {
      try {
        const d = await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(upbitUrl)).then(r=>r.json());
        for (const item of d) { const t=item.market.replace("KRW-",""); if(item.trade_price) px[t]=item.trade_price; }
      } catch {}
    }
  }

  loading = false;
  lastUp = new Date();
  render();
}

// ─── 렌더링 ───────────────────────────────────────────────────
function render() {
  try {
    document.getElementById("app").innerHTML = buildPage();
    bindAll();
    saveData();
  } catch(e) {
    document.getElementById("app").innerHTML =
      "<div style='padding:20px;color:#ef4444;font-size:13px'>오류: "+e.message+"<br><pre style='font-size:10px;color:#94a3b8;white-space:pre-wrap'>"+e.stack+"</pre></div>";
  }
}

function buildPage() {
  const {usT,krxT,penT,irpT,coinsT,cashT,tot} = totals();
  const pp = v => tot > 0 ? (v/tot*100).toFixed(1) : "0.0";
  const TAB_LABELS = {overview:"전체",us:"미국주식",krx:"한국주식",pen:"연금저축",irp:"IRP",coins:"코인",cash:"현금"};
  const tabs = (ST.tabOrder||DEFAULT_TAB_ORDER).map(k=>[k,TAB_LABELS[k]||k]);
  const subStr = loading ? "⟳ 갱신 중..." : (lastUp ? lastUp.toLocaleTimeString("ko-KR")+" 기준" : "—");
  const rateStr = usdKrw ? "USD/KRW ₩"+Math.round(usdKrw).toLocaleString() : "환율 로딩 중...";

  return [
    // 헤더
    '<div class="hdr">',
      '<div>',
        '<div class="hdr-title">📊 자산 대시보드</div>',
        '<div class="hdr-sub" id="hdr-sub">'+subStr+'</div>',
        '<div class="hdr-rate">'+rateStr+'</div>',
      '</div>',
      '<div class="hdr-btns">',
        '<button class="btn" id="btn-refresh">↻</button>',
        '<button class="btn'+(editMode?" on":"")+'" id="btn-edit">'+(editMode?"✓":"✏")+'</button>',
      '</div>',
    '</div>',
    // 탭
    '<div class="tabs">',
      tabs.map(([k,l]) => {
        const on = tab===k ? " on" : "";
        const drag = editMode ? ' draggable="true" data-drag="'+k+'" style="cursor:grab"' : "";
        const icon = editMode ? '<span style="font-size:9px;color:#64748b;margin-right:3px">⠿</span>' : "";
        return '<button class="tab'+on+'" data-tab="'+k+'"'+drag+'>'+icon+l+'</button>';
      }).join(""),
    '</div>',
    // 탭 내용
    tab==="overview" ? buildOverview(tot,usT,krxT,penT,irpT,coinsT,cashT,pp) : "",
    tab==="us"       ? buildSection("미국 주식","us",ST.us,"#6366f1",usT,true) : "",
    tab==="krx"      ? buildSection("한국 주식","krx",ST.krx,"#f43f5e",krxT,false) : "",
    tab==="pen"      ? buildSection("연금저축펀드","pen",ST.pen,"#f59e0b",penT,false) : "",
    tab==="irp"      ? buildSection("IRP","irp",ST.irp,"#10b981",irpT,false) : "",
    tab==="coins"    ? buildCoins(coinsT) : "",
    tab==="cash"     ? buildCash(cashT) : "",
    '<div style="height:32px"></div>',
  ].join("");
}

// ─── 전체 현황 ────────────────────────────────────────────────
function buildOverview(tot,usT,krxT,penT,irpT,coinsT,cashT,pp) {
  const segs = [{l:"미국주식",v:usT,c:"#6366f1"},{l:"한국주식",v:krxT,c:"#f43f5e"},{l:"연금저축",v:penT,c:"#f59e0b"},{l:"IRP",v:irpT,c:"#10b981"},{l:"코인",v:coinsT,c:"#3b82f6"},{l:"현금",v:cashT,c:"#475569"}].filter(s=>s.v>0);
  const lbl = tot>=1e8 ? (tot/1e8).toFixed(1)+"억" : (tot/1e4).toFixed(0)+"만";
  const donut = buildDonut(segs, tot, lbl);
  const legend = segs.map(s =>
    '<div style="display:flex;justify-content:space-between;margin-bottom:7px;align-items:center">'
    +'<div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:2px;background:'+s.c+'"></div><span style="font-size:12px">'+s.l+'</span></div>'
    +'<div><span style="font-size:12px;font-weight:600">'+won(s.v)+'</span><span style="font-size:10px;color:#475569;margin-left:4px">'+pp(s.v)+'%</span></div>'
    +'</div>'
  ).join("");
  const allocRow = [{l:"미국",v:usT},{l:"한국",v:krxT},{l:"연금",v:penT},{l:"IRP",v:irpT},{l:"코인",v:coinsT},{l:"현금",v:cashT}]
    .map(x=>'<span style="font-size:11px;color:#64748b">'+x.l+' <b style="color:#94a3b8">'+pp(x.v)+'%</b></span>').join("");

  return [
    '<div class="card-grad">',
      '<div style="font-size:12px;color:#64748b;margin-bottom:6px">총 평가 자산</div>',
      '<div style="font-size:32px;font-weight:800;letter-spacing:-1px">'+(tot?won(tot):"₩0")+'</div>',
      '<div style="margin-top:8px;display:flex;gap:14px;flex-wrap:wrap">'+allocRow+'</div>',
    '</div>',
    '<div class="card">',
      '<div style="font-weight:700;font-size:14px;margin-bottom:12px">자산 배분</div>',
      segs.length
        ? '<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">'+donut+'<div style="flex:1;min-width:140px">'+legend+'</div></div>'
        : '<div style="color:#475569;text-align:center;padding:16px;font-size:12px">자산을 입력해주세요</div>',
    '</div>',
  ].join("");
}

// ─── 도넛 차트 SVG 빌더 ───────────────────────────────────────
function buildDonut(segs, total, centerLabel) {
  if (!segs.length) return "";
  const cx=80,cy=80,R=65,r=38;
  let ang = -Math.PI/2;
  const paths = segs.map((seg,i) => {
    const a = seg.v/total*Math.PI*2;
    const x1=cx+R*Math.cos(ang), y1=cy+R*Math.sin(ang);
    ang += a;
    const x2=cx+R*Math.cos(ang), y2=cy+R*Math.sin(ang);
    const xi1=cx+r*Math.cos(ang-a), yi1=cy+r*Math.sin(ang-a);
    const xi2=cx+r*Math.cos(ang),   yi2=cy+r*Math.sin(ang);
    const lg = a > Math.PI ? 1 : 0;
    return '<path d="M'+xi1+','+yi1+'L'+x1+','+y1+'A'+R+','+R+' 0 '+lg+',1 '+x2+','+y2+'L'+xi2+','+yi2+'A'+r+','+r+' 0 '+lg+',0 '+xi1+','+yi1+'Z" fill="'+(seg.c||COLORS[i%COLORS.length])+'" stroke="#0f172a" stroke-width="2"/>';
  }).join("");
  return '<svg width="160" height="160" viewBox="0 0 160 160">'
    +paths
    +'<text x="'+cx+'" y="'+(cy-5)+'" text-anchor="middle" fill="#94a3b8" font-size="9">총자산</text>'
    +'<text x="'+cx+'" y="'+(cy+8)+'" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="bold">'+centerLabel+'</text>'
    +'</svg>';
}

// ─── 종목 비중 도넛 (클릭 인터랙션) ──────────────────────────
function buildSectionDonut(items, title) {
  if (!items.length) return "";
  const total = items.reduce((s,x)=>s+x.val,0);
  if (!total) return "";
  const cx=90,cy=90,R=75,r=45;
  let ang = -Math.PI/2;
  let paths = "";
  items.forEach((item,i) => {
    const a = item.val/total*Math.PI*2;
    const x1=cx+R*Math.cos(ang), y1=cy+R*Math.sin(ang);
    ang += a;
    const x2=cx+R*Math.cos(ang), y2=cy+R*Math.sin(ang);
    const xi1=cx+r*Math.cos(ang-a), yi1=cy+r*Math.sin(ang-a);
    const xi2=cx+r*Math.cos(ang),   yi2=cy+r*Math.sin(ang);
    const lg = a > Math.PI ? 1 : 0;
    const col = COLORS[i%COLORS.length];
    const p = (item.val/total*100).toFixed(1);
    paths += '<path d="M'+xi1+','+yi1+'L'+x1+','+y1+'A'+R+','+R+' 0 '+lg+',1 '+x2+','+y2+'L'+xi2+','+yi2+'A'+r+','+r+' 0 '+lg+',0 '+xi1+','+yi1+'Z"'
      +' fill="'+col+'" stroke="#0f172a" stroke-width="2"'
      +' data-label="'+item.label+'" data-name="'+item.name+'" data-pct="'+p+'" data-val="'+Math.round(item.val)+'"'
      +' class="donut-seg" style="cursor:pointer"/>';
  });
  const legend = items.map((item,i) => {
    const col = COLORS[i%COLORS.length];
    return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
      +'<div style="display:flex;align-items:center;gap:6px">'
      +'<div style="width:8px;height:8px;border-radius:2px;background:'+col+'"></div>'
      +'<span style="font-size:11px;color:#cbd5e1">'+item.label+'</span></div>'
      +'<div><span style="font-size:11px;font-weight:600">₩'+Math.round(item.val).toLocaleString("ko-KR")+'</span>'
      +'<span style="font-size:10px;color:#475569;margin-left:4px">'+(item.val/total*100).toFixed(1)+'%</span></div>'
      +'</div>';
  }).join("");
  return '<div class="card" style="margin-top:4px">'
    +'<div style="font-weight:700;font-size:14px;margin-bottom:12px">'+title+' 비중</div>'
    +'<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">'
    +'<svg width="180" height="180" viewBox="0 0 180 180" class="donut-chart">'
    +paths
    +'<text x="'+cx+'" y="'+(cy-5)+'" text-anchor="middle" fill="#94a3b8" font-size="10" class="donut-center-t">탭하여</text>'
    +'<text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" fill="#94a3b8" font-size="10" class="donut-center-b">확인</text>'
    +'</svg>'
    +'<div style="flex:1;min-width:150px">'+legend+'</div>'
    +'</div></div>';
}

// ─── 주식/ETF 섹션 ────────────────────────────────────────────
function buildSection(title, key, list, accent, total, isUSD) {
  const sorted = [...list].sort((a,b)=>{
    const va = isUSD ? usVal(a) : krxVal(a);
    const vb = isUSD ? usVal(b) : krxVal(b);
    if (va && vb) return vb-va;  // 둘 다 현재가 있으면 정렬
    if (va) return -1;            // a만 있으면 a 위로
    if (vb) return 1;             // b만 있으면 b 위로
    return 0;                     // 둘 다 없으면 순서 유지
  });
  const rows = sorted.map(item => {
    const priceKrw = isUSD ? usPriceKrw(item) : (px[item.t]||null);
    const val = isUSD ? usVal(item) : krxVal(item);
    const gp  = isUSD ? usGp(item)  : krxGp(item);
    const priceStr = priceKrw ? won(priceKrw) : '<span class="dim">—</span>';
    if (editMode) {
      return '<tr data-id="'+item.id+'" data-key="'+key+'" data-usd="'+isUSD+'">'
        +'<td style="min-width:110px;padding:8px 6px">'
        +'<input class="inp" style="text-align:left;font-weight:600;font-size:12px;margin-bottom:3px" data-f="t" data-id="'+item.id+'" value="'+item.t+'" placeholder="티커/코드"/>'
        +'<input class="inp" style="text-align:left;font-size:10px;color:#94a3b8" data-f="n" data-id="'+item.id+'" value="'+item.n+'" placeholder="종목명"/>'
        +'</td>'
        +'<td class="r" style="padding:8px 6px"><input class="inp" style="text-align:right" type="number" data-f="q" data-id="'+item.id+'" value="'+(item.q||"")+'" placeholder="0"/></td>'
        +'<td class="r" style="padding:8px 6px"><input class="inp" style="text-align:right" type="number" data-f="a" data-id="'+item.id+'" value="'+(item.a||"")+'" placeholder="'+(isUSD?"USD":"KRW")+'"/></td>'
        +'<td class="r" style="padding:8px 6px;font-size:12px">'+priceStr+'</td>'
        +'<td class="r" style="padding:8px 6px;font-weight:600;font-size:13px" data-calc="val">'+(val?won(val):"₩0")+'</td>'
        +'<td class="r '+cls(gp)+'" style="padding:8px 6px;font-size:13px" data-calc="gp">'+pct(gp)+'</td>'
        +'<td style="padding:8px 6px"><button class="del-btn" data-del="'+item.id+'" data-key="'+key+'">✕</button></td>'
        +'</tr>';
    }
    return '<tr>'
      +'<td style="min-width:110px;padding:8px 6px"><div style="font-weight:600;font-size:12px">'+item.t+'</div><div style="font-size:10px;color:#64748b;margin-top:1px">'+item.n+'</div></td>'
      +'<td class="r" style="padding:8px 6px;font-size:13px">'+item.q+'</td>'
      +'<td class="r" style="padding:8px 6px;font-size:12px;color:#94a3b8">'+(isUSD?usd(item.a):won(item.a))+'</td>'
      +'<td class="r" style="padding:8px 6px;font-size:12px">'+priceStr+'</td>'
      +'<td class="r" style="padding:8px 6px;font-weight:600;font-size:13px">'+(val?won(val):"₩0")+'</td>'
      +'<td class="r '+cls(gp)+'" style="padding:8px 6px;font-size:13px;font-weight:700">'+pct(gp)+'</td>'
      +'</tr>';
  }).join("");

  const donutItems = sorted.filter(x=>x.t&&x.q>0).map(item=>({label:item.t, name:item.n, val:isUSD?usVal(item):krxVal(item)})).filter(x=>x.val>0);

  return '<div class="card" style="border-top:3px solid '+accent+'">'
    +'<div class="card-hdr"><span style="font-weight:700;font-size:14px">'+title+'</span><span style="font-weight:800;font-size:17px;color:'+accent+'">'+(total?won(total):"₩0")+'</span></div>'
    +'<div class="tbl-wrap"><table>'
    +'<thead><tr>'
    +'<th style="text-align:left">종목</th><th class="r">수량</th><th class="r">'+(isUSD?"평단(USD)":"평단(원)")+'</th><th class="r">현재가(원)</th><th class="r">평가금액</th><th class="r">수익률</th>'
    +(editMode?'<th></th>':"")
    +'</tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'</table></div>'
    +(editMode?'<button class="add-btn" data-add="'+key+'">+ 종목 추가</button>':"")
    +buildSectionDonut(donutItems, title)
    +'</div>';
}

// ─── 코인 섹션 ────────────────────────────────────────────────
function buildCoins(coinsT) {
  const sortedCoins = [...ST.coins].sort((a,b)=>{
    const va=coinVal(a), vb=coinVal(b);
    if (va && vb) return vb-va;
    if (va) return -1;
    if (vb) return 1;
    return 0;
  });
  const rows = sortedCoins.map(item => {
    const p = px[item.t] || 0;
    const val = p ? p*item.q : item.a*item.q;
    const gp = (p&&item.a) ? ((p-item.a)/item.a)*100 : null;
    if (editMode) {
      return '<tr data-id="'+item.id+'" data-key="coins">'
        +'<td style="min-width:110px;padding:8px 6px">'
        +'<input class="inp" style="text-align:left;font-weight:600;font-size:12px;margin-bottom:3px" data-f="t" data-id="'+item.id+'" value="'+item.t+'" placeholder="ETH, BTC..."/>'
        +'<input class="inp" style="text-align:left;font-size:10px;color:#94a3b8" data-f="n" data-id="'+item.id+'" value="'+item.n+'" placeholder="코인명"/>'
        +'</td>'
        +'<td class="r" style="padding:8px 6px"><input class="inp" style="text-align:right" type="number" step="0.0001" data-f="q" data-id="'+item.id+'" value="'+(item.q||"")+'" placeholder="0"/></td>'
        +'<td class="r" style="padding:8px 6px"><input class="inp" style="text-align:right" type="number" data-f="a" data-id="'+item.id+'" value="'+(item.a||"")+'" placeholder="KRW"/></td>'
        +'<td class="r" style="padding:8px 6px;font-size:12px">'+(p?won(p):'<span class="dim">—</span>')+'</td>'
        +'<td class="r" style="padding:8px 6px;font-weight:600;font-size:13px" data-calc="val">'+(val?won(val):"₩0")+'</td>'
        +'<td class="r '+cls(gp)+'" style="padding:8px 6px;font-size:13px" data-calc="gp">'+pct(gp)+'</td>'
        +'<td style="padding:8px 6px"><button class="del-btn" data-del="'+item.id+'" data-key="coins">✕</button></td>'
        +'</tr>';
    }
    return '<tr>'
      +'<td style="min-width:110px;padding:8px 6px"><div style="font-weight:600;font-size:12px">'+item.t+'</div><div style="font-size:10px;color:#64748b">'+item.n+'</div></td>'
      +'<td class="r" style="padding:8px 6px;font-size:13px">'+item.q+'</td>'
      +'<td class="r" style="padding:8px 6px;font-size:12px;color:#94a3b8">'+won(item.a)+'</td>'
      +'<td class="r" style="padding:8px 6px;font-size:12px">'+(p?won(p):'<span class="dim">—</span>')+'</td>'
      +'<td class="r" style="padding:8px 6px;font-weight:600;font-size:13px">'+(val?won(val):"₩0")+'</td>'
      +'<td class="r '+cls(gp)+'" style="padding:8px 6px;font-size:13px;font-weight:700">'+pct(gp)+'</td>'
      +'</tr>';
  }).join("");
  const donutItems = sortedCoins.filter(x=>x.t&&x.q>0).map(x=>({label:x.t,name:x.n,val:coinVal(x)})).filter(x=>x.val>0);
  return '<div class="card" style="border-top:3px solid #3b82f6">'
    +'<div class="card-hdr"><span style="font-weight:700;font-size:14px">코인 (업비트)</span><span style="font-weight:800;font-size:17px;color:#3b82f6">'+(coinsT?won(coinsT):"₩0")+'</span></div>'
    +'<div class="tbl-wrap"><table>'
    +'<thead><tr><th style="text-align:left">코인</th><th class="r">수량</th><th class="r">평단(원)</th><th class="r">현재가(원)</th><th class="r">평가금액</th><th class="r">수익률</th>'+(editMode?'<th></th>':"")+'</tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>'
    +(editMode?'<button class="add-btn" data-add="coins">+ 코인 추가</button>':"")
    +buildSectionDonut(donutItems,"코인")
    +'</div>';
}

// ─── 현금 섹션 ────────────────────────────────────────────────
function buildCash(cashT) {
  const sortedCash = [...ST.cash].sort((a,b)=>(Number(b.a)||0)-(Number(a.a)||0));
  const rows = sortedCash.map(item => {
    if (editMode) {
      return '<tr data-id="'+item.id+'" data-key="cash">'
        +'<td style="padding:8px 6px"><input class="inp" style="text-align:left;font-size:13px" data-f="n" data-id="'+item.id+'" value="'+item.n+'" placeholder="예) 예금, 적금, 주택청약"/></td>'
        +'<td class="r" style="padding:8px 6px"><input class="inp" style="text-align:right" type="number" data-f="a" data-id="'+item.id+'" value="'+(item.a||"")+'" placeholder="0"/></td>'
        +'<td style="padding:8px 6px"><button class="del-btn" data-del="'+item.id+'" data-key="cash">✕</button></td>'
        +'</tr>';
    }
    return '<tr>'
      +'<td style="padding:8px 6px;font-size:13px;font-weight:500">'+item.n+'</td>'
      +'<td class="r" style="padding:8px 6px;font-size:13px;font-weight:600">'+(won(item.a)||"₩0")+'</td>'
      +'</tr>';
  }).join("");
  return '<div class="card" style="border-top:3px solid #64748b">'
    +'<div class="card-hdr"><span style="font-weight:700;font-size:14px">현금 / 예금</span><span style="font-weight:800;font-size:17px;color:#94a3b8">'+(cashT?won(cashT):"₩0")+'</span></div>'
    +'<div class="tbl-wrap"><table>'
    +'<thead><tr><th style="text-align:left">항목</th><th class="r">금액</th>'+(editMode?'<th></th>':"")+'</tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>'
    +(editMode?'<button class="add-btn" data-add="cash">+ 항목 추가</button>':"")
    +'</div>';
}

// ─── 이벤트 바인딩 ────────────────────────────────────────────
function getList(key) {
  return {us:ST.us, krx:ST.krx, pen:ST.pen, irp:ST.irp, coins:ST.coins, cash:ST.cash}[key] || null;
}

function bindAll() {
  // 새로고침 / 편집 토글
  document.getElementById("btn-refresh")?.addEventListener("click", async () => {
    await fetchAll();
    render();
  });
  document.getElementById("btn-edit")?.addEventListener("click", () => { editMode=!editMode; render(); });

  // 탭 전환
  document.querySelectorAll("[data-tab]").forEach(b =>
    b.addEventListener("click", () => { tab=b.dataset.tab; render(); })
  );

  // 탭 드래그 순서 변경 (편집모드)
  if (editMode) {
    let dragKey = null;
    document.querySelectorAll("[data-drag]").forEach(b => {
      b.addEventListener("dragstart", e => { dragKey=b.dataset.drag; e.dataTransfer.effectAllowed="move"; b.style.opacity="0.4"; });
      b.addEventListener("dragend",   () => { b.style.opacity="1"; });
      b.addEventListener("dragover",  e => { e.preventDefault(); b.style.background="#334155"; });
      b.addEventListener("dragleave", () => { b.style.background=tab===b.dataset.drag?"#6366f1":"#1e293b"; });
      b.addEventListener("drop", e => {
        e.preventDefault();
        const toKey = b.dataset.drag;
        if (dragKey && toKey && dragKey !== toKey) {
          const order = ST.tabOrder;
          const fi = order.indexOf(dragKey), ti = order.indexOf(toKey);
          if (fi>-1 && ti>-1) { order.splice(fi,1); order.splice(ti,0,dragKey); }
          saveData(); render();
        }
      });
    });
  }

  // 종목 추가
  document.querySelectorAll("[data-add]").forEach(b =>
    b.addEventListener("click", () => {
      const k = b.dataset.add, id = k+Date.now();
      if (k==="cash") ST.cash.push({id,n:"새 항목",a:0});
      else getList(k)?.push({id,t:"",n:"",q:0,a:0});
      render();
    })
  );

  // 종목 삭제
  document.querySelectorAll("[data-del]").forEach(b =>
    b.addEventListener("click", () => {
      const list = getList(b.dataset.key);
      if (list) { const i=list.findIndex(x=>x.id===b.dataset.del); if(i>-1) list.splice(i,1); }
      render();
    })
  );

  // 인풋 — 리렌더 없이 상태+셀만 업데이트 (커서 유지 핵심)
  document.querySelectorAll(".inp[data-id]").forEach(inp => {
    const id=inp.dataset.id, f=inp.dataset.f;
    const tr=inp.closest("tr");
    const key=tr?.dataset.key;
    const isUSD=tr?.dataset.usd==="true";
    const list=getList(key);
    const item=list?.find(x=>x.id===id);
    if (!item) return;

    inp.addEventListener("input", e => {
      const v = e.target.value;
      if (f==="t") {
        const upper = v.toUpperCase();
        item.t = upper; e.target.value = upper;
        const db = isUSD ? US_DB : (key==="krx" ? KRX_STOCK_DB : key==="coins" ? null : KRX_ETF_DB);
        const auto = db ? db[upper] : null;
        if (auto) { item.n=auto; const ni=tr.querySelector('[data-f="n"]'); if(ni) ni.value=auto; }
      } else if (f==="n") {
        item.n = v;
      } else {
        item[f] = Number(v) || 0;
        const val = key==="us" ? usVal(item) : key==="coins" ? coinVal(item) : key==="cash" ? item.a : krxVal(item);
        const gp  = key==="us" ? usGp(item)  : key==="coins" ? ((px[item.t]&&item.a)?((px[item.t]-item.a)/item.a)*100:null) : key==="cash" ? null : krxGp(item);
        const vc=tr.querySelector("[data-calc='val']"); if(vc) vc.textContent=val?won(val):"₩0";
        const gc=tr.querySelector("[data-calc='gp']");  if(gc) { gc.textContent=pct(gp); gc.className="r "+cls(gp); }
      }
      saveData();
    });
  });

  // 도넛 차트 조각 클릭
  document.querySelectorAll(".donut-seg").forEach(seg => {
    seg.addEventListener("click", () => {
      document.querySelectorAll(".donut-seg").forEach(s => s.style.opacity="0.3");
      seg.style.opacity="1";
      const svg = seg.closest("svg");
      const ct = svg?.querySelector(".donut-center-t");
      const cb = svg?.querySelector(".donut-center-b");
      if (ct) ct.textContent = seg.dataset.label;
      if (cb) cb.textContent = seg.dataset.pct+"%";
      const tip = document.getElementById("tip");
      tip.innerHTML = '<div style="font-weight:700;font-size:15px">'+seg.dataset.label+'</div>'
        +'<div style="color:#94a3b8;font-size:11px;margin-top:2px">'+seg.dataset.name+'</div>'
        +'<div style="font-size:18px;font-weight:800;margin-top:6px">₩'+Number(seg.dataset.val).toLocaleString("ko-KR")+'</div>'
        +'<div style="color:#6366f1;font-weight:700;font-size:14px">'+seg.dataset.pct+'%</div>';
      tip.style.display = "block";
      clearTimeout(window._tipTimer);
      window._tipTimer = setTimeout(() => {
        tip.style.display = "none";
        document.querySelectorAll(".donut-seg").forEach(s=>s.style.opacity="1");
        if(ct) ct.textContent="탭하여"; if(cb) cb.textContent="확인";
      }, 3000);
    });
  });
}

// ─── 시작 ─────────────────────────────────────────────────────
render();
fetchAll();
setInterval(fetchAll, 60000);
</script>
</body>
