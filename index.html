function migrateOldData(old) {
  // v6 → v7 마이그레이션
  const accs = makeDefaultAccounts();
  const map = { us:"a_us", krx:"a_krx", pen:"a_pen", irp:"a_irp", isa:"a_isa", coins:"a_coin" };
  for (const [key, aid] of Object.entries(map)) {
    const src = old[key] || old.usStocks || old.pensionEtfs || old.irpEtfs || [];
    const items = key==="coins"
      ? (old.coins||[]).map(x=>({id:x.id,t:x.t,n:x.n,q:x.q,a:x.a}))

    const acc = accs.find(a=>a.id===aid);
    if (acc && items.length) acc.items = items;
  }
  // 현금
  const cashAcc = accs.find(a=>a.id==="a_cash");
  if (cashAcc && Array.isArray(old.cash)) cashAcc.items = old.cash;
  return {
    accounts: accs,
    goals: old.goals || DEFAULT_DATA.goals,
  };
}

    const oldRaw = localStorage.getItem("asset_v6") || localStorage.getItem("asset_v5");
    if (oldRaw) {
      const migrated = migrateOldData(JSON.parse(oldRaw));
      localStorage.setItem(SK, JSON.stringify(migrated));
      return migrated;
    }
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }

function itemVal(item, type) {
  const p = px[item.t] || 0;
  if (type === "us") return ((p || item.a || 0)) * item.q * (usdKrw||0);
  if (type === "cash") return Number(item.a) || 0;
  return ((p || item.a || 0)) * item.q;
}
function itemGp(item, type) {
  const p = px[item.t];
  if (!p || !item.a || !item.q) return null;
  if (type === "us") return ((p - item.a) / item.a) * 100;
  return ((p - item.a) / item.a) * 100;
}
function itemPriceKrw(item, type) {
  const p = px[item.t];
  if (!p) return null;
  return type === "us" ? (usdKrw ? p * usdKrw : null) : p;
}
function accTotal(acc) {
  return acc.items.reduce((s,x) => s + itemVal(x, acc.type), 0);
}
function grandTotal() {
  return ST.accounts.reduce((s,a) => s + accTotal(a), 0);
}

// 평가금액 내림차순 정렬
function sortItems(items, type) {
  return [...items].sort((a,b) => itemVal(b,type) - itemVal(a,type));
}

// 계좌 전체 수익률 = (현재평가금액 - 총매입금액) / 총매입금액
function accGp(acc) {
  if (acc.type === "cash") return null;
  let totalCost = 0, totalVal = 0;
  for (const item of acc.items) {
    if (!item.q || !item.a) continue;
    const val = itemVal(item, acc.type);
    const cost = acc.type === "us"
      ? item.a * item.q * (usdKrw||0)
      : item.a * item.q;
    if (cost > 0) { totalCost += cost; totalVal += val; }
  }
  if (!totalCost) return null;
  return ((totalVal - totalCost) / totalCost) * 100;
}

// 전체 수익률
function totalGp() {
  let totalCost = 0, totalVal = 0;
  for (const acc of ST.accounts) {
    if (acc.type === "cash") continue;
    for (const item of acc.items) {
      if (!item.q || !item.a) continue;
      const val  = itemVal(item, acc.type);
      const cost = acc.type === "us"
        ? item.a * item.q * (usdKrw||0)
        : item.a * item.q;
      if (cost > 0) { totalCost += cost; totalVal += val; }
    }
  }
  if (!totalCost) return null;
  return ((totalVal - totalCost) / totalCost) * 100;
}

// ─── API fetch ───────────────────────────────────────────────
async function fetchAll() {
  if (loading) return;
  loading = true;
  render();

  // 타입별 티커 수집
  const usTickers  = [...new Set(ST.accounts.filter(a=>a.type==="us").flatMap(a=>a.items.map(x=>x.t).filter(Boolean)))];
  const krxCodes   = [...new Set(ST.accounts.filter(a=>a.type==="krx").flatMap(a=>a.items.map(x=>x.t).filter(Boolean)))];
  const coinTickers= [...new Set(ST.accounts.filter(a=>a.type==="coin").flatMap(a=>a.items.map(x=>x.t).filter(Boolean)))];
  const coinIds    = coinTickers.map(t=>GECKO_ID[t.toUpperCase()]).filter(Boolean);

  try {
    const params = new URLSearchParams({
      type:"all", us:usTickers.join(","), krx:krxCodes.join(","), coins:coinIds.join(",")
    });
    const d = await fetch(WORKER+"?"+params).then(r=>r.json());
    if (d.fx) usdKrw = d.fx;
    Object.assign(px, d.us||{});
    // 섹터 캐시 업데이트 (영어→한국어 변환)
    const sectorMap_en = {
      "Healthcare":"헬스케어", "Technology":"IT", "Communication Services":"커뮤니케이션",
      "Consumer Cyclical":"경기소비재", "Consumer Defensive":"필수소비재",
      "Financial Services":"금융", "Industrials":"산업재", "Energy":"에너지",
      "Basic Materials":"소재", "Utilities":"유틸리티", "Real Estate":"부동산",
    };
    for (const [sym, sec] of Object.entries(d.sectors||{})) {
      sectorCache[sym] = sectorMap_en[sec] || sec;
    }
    localStorage.setItem('sector_cache', JSON.stringify(sectorCache));
    Object.assign(px, d.krx||{});
    coinTickers.forEach(t => {
      const id = GECKO_ID[t.toUpperCase()];
      if (id && d.coins?.[id]?.krw) px[t] = d.coins[id].krw;
    });
  } catch {}

  loading = false;
  lastUp  = new Date();
  render();
}

// ─── 백업/복원 ───────────────────────────────────────────────
function backupData() {
  const blob = new Blob([JSON.stringify(ST,null,2)], {type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = "asset_backup_"+curProfile+"_"+new Date().toISOString().slice(0,10).replace(/-/g,"")+".json";
  a.click();
  URL.revokeObjectURL(url);
}
function restoreData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d.accounts) throw new Error("올바른 백업 파일이 아니에요");
      Object.assign(ST, d);
      saveData(); render();
      alert("✅ 복원 완료!");
    } catch(err) { alert("❌ 복원 실패: "+err.message); }
  };
  reader.readAsText(file);
}

// ─── SVG 도넛 ────────────────────────────────────────────────
function buildDonutSVG(segs, total, cx, cy, R, r, interactive) {
  if (!segs.length || !total) return "";
  if (segs.length === 1) {
    const col = segs[0].c || COLORS[0];
    const ex = interactive ? ` data-label="${segs[0].l}" data-pct="100.0" data-val="${Math.round(segs[0].v)}" class="donut-seg" style="cursor:pointer"` : "";
    return `<circle cx="${cx}" cy="${cy}" r="${(R+r)/2}" fill="none" stroke="${col}" stroke-width="${R-r}"${ex}/>`;
  }
  let ang = -Math.PI/2;
  return segs.map((seg,i) => {
    const a = seg.v/total*Math.PI*2;
    const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang); ang+=a;
    const x2=cx+R*Math.cos(ang),y2=cy+R*Math.sin(ang);
    const xi1=cx+r*Math.cos(ang-a),yi1=cy+r*Math.sin(ang-a);
    const xi2=cx+r*Math.cos(ang),yi2=cy+r*Math.sin(ang);
    const lg=a>Math.PI?1:0;
    const col=seg.c||COLORS[i%COLORS.length];
    const pct=(seg.v/total*100).toFixed(1);
    const ex=interactive?` data-label="${seg.l}" data-pct="${pct}" data-val="${Math.round(seg.v)}" class="donut-seg" style="cursor:pointer"` : "";
    return `<path d="M${xi1},${yi1}L${x1},${y1}A${R},${R} 0 ${lg},1 ${x2},${y2}L${xi2},${yi2}A${r},${r} 0 ${lg},0 ${xi1},${yi1}Z" fill="${col}" stroke="#0f172a" stroke-width="2"${ex}/>`;
  }).join("");
}

function buildDonutCard(items, title) {
  if (!items.length) return "";
  const total = items.reduce((s,x)=>s+x.v,0);
  if (!total) return "";
  const segs = items.map((x,i)=>({l:x.l,v:x.v,c:COLORS[i%COLORS.length]}));
  const paths = buildDonutSVG(segs, total, 90, 90, 75, 45, true);
  const legend = segs.map(seg =>
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<div style="width:8px;height:8px;border-radius:2px;background:'+seg.c+'"></div>'
    +'<span style="font-size:11px">'+seg.l+'</span></div>'
    +'<div><span style="font-size:11px;font-weight:700;color:#94a3b8;margin-right:4px">'+(seg.v/total*100).toFixed(1)+'%</span>'
    +'<span style="font-size:11px;font-weight:600">'+won(seg.v)+'</span></div>'
    +'</div>'
  ).join("");
  return '<div class="card" style="margin-top:4px">'
    +'<div class="card-title" style="margin-bottom:12px">'+title+' 비중</div>'
    +'<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">'
    +'<svg width="180" height="180" viewBox="0 0 180 180" style="flex-shrink:0">'
    +paths
    +'<text x="90" y="85" text-anchor="middle" fill="#94a3b8" font-size="10" class="donut-ct">탭하여</text>'
    +'<text x="90" y="100" text-anchor="middle" fill="#94a3b8" font-size="10" class="donut-cb">확인</text>'
    +'</svg>'
    +'<div style="flex:1;min-width:150px">'+legend+'</div>'

}

// ─── 계좌별 섹터 도넛 ───────────────────────────────────────
function buildAccountSectorDonut(acc) {
  if (acc.type === "cash") return "";
  const sectorMap = {};
  for (const item of acc.items) {
    if (!item.q) continue;
    const p = px[item.t];
    let val = 0;
    if (acc.type === "us") {
      val = p ? p*item.q*(usdKrw||1) : item.a*item.q*(usdKrw||1);
    } else {
      val = p ? p*item.q : item.a*item.q;
    }
    if (!val) continue;
    const sector = getSector(item.t, acc.type);
    sectorMap[sector] = (sectorMap[sector]||0) + val;
  }
  const entries = Object.entries(sectorMap).sort((a,b)=>b[1]-a[1]).filter(([,v])=>v>0);
  if (!entries.length) return "";
  const total = entries.reduce((s,[,v])=>s+v, 0);
  const segs  = entries.map(([l,v])=>({l,v,c:SECTOR_COLORS[l]||"#334155"}));
  const paths = buildDonutSVG(segs, total, 90, 90, 75, 45, true);
  const legend = segs.map(seg=>
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<div style="width:8px;height:8px;border-radius:2px;background:'+seg.c+'"></div>'
    +'<span style="font-size:11px">'+seg.l+'</span></div>'
    +'<div><span style="font-size:11px;font-weight:700;color:#94a3b8;margin-right:4px">'+(seg.v/total*100).toFixed(1)+'%</span>'
    +'<span style="font-size:11px;font-weight:600">'+won(seg.v)+'</span></div>'
    +'</div>'
  ).join("");
  return '<div class="card" style="margin-top:4px">'
    +'<div class="card-title" style="margin-bottom:12px">'+acc.name+' 섹터</div>'
    +'<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">'
    +'<svg width="180" height="180" viewBox="0 0 180 180" style="flex-shrink:0">'
    +paths
    +'<text x="90" y="85" text-anchor="middle" fill="#94a3b8" font-size="10" class="donut-ct">탭하여</text>'
    +'<text x="90" y="100" text-anchor="middle" fill="#94a3b8" font-size="10" class="donut-cb">확인</text>'
    +'</svg>'
    +'<div style="flex:1;min-width:150px">'+legend+'</div>'
    +'</div></div>';
}

// ─── 목표 추적 ───────────────────────────────────────────────
function buildGoals(tot) {
  const now=new Date(), curYear=now.getFullYear();
  const goals=ST.goals||[];
  if (!goals.length) return "";
  goals.forEach(g => {
    if (curYear>g.year && g.snapshot===null) { g.snapshot=tot; saveData(); }
  });
  const rows = goals.map((g,i) => {
    const isExpired  = curYear>g.year;
    const isCurrent  = !isExpired && (i===0||curYear>goals[i-1].year);
    const isAchieved = tot>=g.target||(isExpired&&(g.snapshot||0)>=g.target);
    const val        = isExpired?(g.snapshot||0):tot;
    const pct        = Math.min(100,Math.round(val/g.target*100));
    const isFuture   = !isExpired&&!isCurrent;
    let statusIcon,statusColor,barColor;
    if (isAchieved)     {statusIcon="✅";statusColor="#10b981";barColor="#10b981";}
    else if (isExpired) {statusIcon="⚠️";statusColor="#f59e0b";barColor="#f59e0b";}
    else if (isCurrent) {statusIcon="🎯";statusColor="#6366f1";barColor="#6366f1";}
    else                {statusIcon="";  statusColor="#475569";barColor="#334155";}
    const targetStr=g.target>=1e8?(g.target/1e8).toFixed(g.target%1e8===0?0:1)+"억":(g.target/1e4).toFixed(0)+"만";
    if (isFuture) return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;opacity:0.4">'
      +'<span style="font-size:11px;color:#475569;width:36px">'+g.year+'</span>'
      +'<span style="font-size:12px;color:#475569;width:52px">'+targetStr+'</span>'
      +'<div style="flex:1;height:4px;background:#1e293b;border-radius:2px"></div>'
      +'</div>';
    return '<div style="margin-bottom:12px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'
      +'<span style="font-size:12px">'+statusIcon+'</span>'
      +'<span style="font-size:12px;color:#94a3b8;width:36px">'+g.year+'</span>'
      +'<span style="font-size:12px;font-weight:600;flex:1">'+targetStr+'</span>'
      +'<span style="font-size:12px;font-weight:700;color:'+statusColor+'">'+pct+'%</span>'
      +(isExpired&&!isAchieved?'<span style="font-size:10px;color:#f59e0b;margin-left:4px">기간종료</span>':"")
      +'</div>'
      +'<div style="height:6px;background:#1e293b;border-radius:3px;overflow:hidden">'
      +'<div style="height:100%;width:'+pct+'%;background:'+barColor+';border-radius:3px;transition:width 0.5s"></div>'
      +'</div>'
      +(isCurrent||isExpired?'<div style="font-size:10px;color:#475569;margin-top:3px;text-align:right">'
        +(isExpired?'종료시 ':'현재 ')+won(val)
        +(isExpired&&!isAchieved?' · '+won(g.target-(g.snapshot||0))+" 미달":'')+'</div>':"")
      +'</div>';
  }).join("");
  const editRows=editMode?goals.map(g=>
    '<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">'
    +'<input class="inp inp-r" type="number" style="width:60px" data-gf="year" data-gid="'+g.id+'" value="'+g.year+'"/>'
    +'<input class="inp inp-r" type="number" style="flex:1" data-gf="target" data-gid="'+g.id+'" value="'+g.target+'" placeholder="목표금액(원)"/>'
    +'<button class="del-btn" data-gdel="'+g.id+'">✕</button>'
    +'</div>'
  ).join("")+'<button class="add-btn" id="btn-add-goal">+ 목표 추가</button>':"";
  return '<div class="card" style="border-top:3px solid #6366f1;margin-bottom:12px">'
    +'<div class="card-hdr"><span class="card-title">📈 목표 달성 현황</span></div>'
    +(editMode?editRows:rows)+'</div>';
}

// ─── 섹터 비중 도넛 ──────────────────────────────────────────
function buildSectorDonut() {
  // 전체 계좌에서 섹터별 합산
  const sectorMap = {};
  for (const acc of ST.accounts) {
    if (acc.type === "cash") {
      const val = accTotal(acc);
      if (val > 0) sectorMap["현금/예금"] = (sectorMap["현금/예금"]||0) + val;
      continue;
    }
    for (const item of acc.items) {
      if (!item.q) continue;
      // 현재가 있으면 현재가, 없으면 평단으로 계산
      const p = px[item.t];
      let val = 0;
      if (acc.type === "us") {
        val = p ? p * item.q * (usdKrw||1) : item.a * item.q * (usdKrw||1);
      } else {
        val = p ? p * item.q : item.a * item.q;
      }
      if (!val) continue;
      const sector = getSector(item.t, acc.type);
      sectorMap[sector] = (sectorMap[sector]||0) + val;
    }
  }

  const entries = Object.entries(sectorMap)
    .sort((a,b) => b[1]-a[1])
    .filter(([,v]) => v > 0);

  if (!entries.length) return "";

  const total = entries.reduce((s,[,v])=>s+v, 0);
  const segs  = entries.map(([l,v]) => ({l, v, c: SECTOR_COLORS[l]||"#334155"}));

  const paths = buildDonutSVG(segs, total, 90, 90, 75, 45, true);
  const legend = segs.map(seg =>
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<div style="width:8px;height:8px;border-radius:2px;background:'+seg.c+'"></div>'
    +'<span style="font-size:11px">'+seg.l+'</span></div>'
    +'<div><span style="font-size:11px;font-weight:700;color:#94a3b8;margin-right:4px">'+(seg.v/total*100).toFixed(1)+'%</span>'
    +'<span style="font-size:11px;font-weight:600">'+won(seg.v)+'</span></div>'
    +'</div>'
  ).join("");

  return '<div class="card">'
    +'<div class="card-title" style="margin-bottom:12px">섹터 비중</div>'
    +'<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">'
    +'<svg width="180" height="180" viewBox="0 0 180 180" style="flex-shrink:0">'
    +paths
    +'<text x="90" y="85" text-anchor="middle" fill="#94a3b8" font-size="10" class="donut-ct">탭하여</text>'
    +'<text x="90" y="100" text-anchor="middle" fill="#94a3b8" font-size="10" class="donut-cb">확인</text>'
    +'</svg>'
    +'<div style="flex:1;min-width:150px">'+legend+'</div>'
    +'</div></div>';
}

// ─── 전체 현황 ───────────────────────────────────────────────
function buildOverview() {
  const tot = grandTotal();
  const pp  = v => tot>0?(v/tot*100).toFixed(1):"0.0";
  const segs = ST.accounts
    .map(a => ({l:a.name, v:accTotal(a), c:a.color}))
    .filter(s=>s.v>0);
  const lbl = tot>=1e8?(tot/1e8).toFixed(1)+"억":(tot/1e4).toFixed(0)+"만";
  const paths = buildDonutSVG(segs, tot, 80, 80, 65, 38, true);
  const legend = segs.map(s=>
    '<div class="legend-item" data-label="'+s.l+'" style="display:flex;justify-content:space-between;margin-bottom:7px;align-items:center;transition:opacity 0.2s">'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<div style="width:8px;height:8px;border-radius:2px;background:'+s.c+'"></div>'
    +'<span style="font-size:12px">'+s.l+'</span></div>'
    +'<div><span style="font-size:11px;font-weight:700;color:#94a3b8;margin-right:4px">'+pp(s.v)+'%</span>'
    +'<span style="font-size:12px;font-weight:600">'+won(s.v)+'</span></div>'
    +'</div>'
  ).join("");
  return buildGoals(tot)
    +'<div class="card-grad">'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:6px">총 평가 자산</div>'
    +'<div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">'
    +'<div style="font-size:32px;font-weight:800;letter-spacing:-1px">'+(tot?won(tot):"₩0")+'</div>'
    +(()=>{const gp=totalGp();return gp!=null?'<div style="font-size:16px;font-weight:700;'+( gp>=0?'color:#ef4444':'color:#3b82f6')+'">'+fPct(gp)+'</div>':''})()
    +'</div>'
    +'<div style="margin-top:8px;display:flex;gap:14px;flex-wrap:wrap">'
    +segs.map(s=>'<span style="font-size:11px;color:#64748b">'+s.l+' <b style="color:#94a3b8">'+pp(s.v)+'%</b></span>').join("")
    +'</div></div>'
    +buildSectorDonut()
    +'<div class="card">'
    +'<div class="card-title" style="margin-bottom:12px">계좌별 비중</div>'
    +(segs.length
      ?'<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">'
        +'<svg id="overview-donut" width="160" height="160" viewBox="0 0 160 160" style="flex-shrink:0">'
        +paths
        +'<text x="80" y="75" text-anchor="middle" fill="#94a3b8" font-size="9" class="donut-ct">탭하여</text>'
        +'<text x="80" y="88" text-anchor="middle" fill="#94a3b8" font-size="9" class="donut-cb">확인</text>'
        +'</svg>'
        +'<div style="flex:1;min-width:140px">'+legend+'</div>'
        +'</div>'
      :'<div style="color:#475569;text-align:center;padding:16px;font-size:12px">자산을 입력해주세요</div>')
    +'</div>';
}

// ─── 계좌 추가 모달 ──────────────────────────────────────────
function buildModal() {
  if (!showModal) return "";
  const typeButtons = Object.entries(ACCOUNT_TYPES).map(([k,v])=>
    '<div class="type-btn'+(modalType===k?" sel":"")+'" data-modal-type="'+k+'">'
    +'<div class="icon">'+v.icon+'</div>'
    +'<div class="label">'+v.label+'</div>'
    +'<div class="desc">'+v.desc+'</div>'
    +'</div>'
  ).join("");
  const colorDots = COLORS.map(col=>
    '<div class="color-dot'+(modalColor===col?" sel":"")+'" style="background:'+col+'" data-modal-color="'+col+'"></div>'
  ).join("");
  return '<div class="modal-bg" id="modal-bg">'
    +'<div class="modal">'
    +'<div class="modal-title">➕ 계좌 추가</div>'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:8px">어떤 자산을 관리할 계좌인가요?</div>'
    +'<div class="type-grid">'+typeButtons+'</div>'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:8px">계좌 색상</div>'
    +'<div class="color-row">'+colorDots+'</div>'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:6px">계좌 이름</div>'
    +'<input class="inp inp-l" id="modal-name" style="font-size:13px;margin-bottom:16px" placeholder="예) 토스증권, 미래에셋 ISA"/>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn" id="modal-cancel" style="flex:1">취소</button>'
    +'<button class="btn on" id="modal-confirm" style="flex:1">추가</button>'
    +'</div>'
    +'</div></div>';
}

// ─── 페이지 빌드 ─────────────────────────────────────────────
function buildPage() {
  const subStr  = loading?"⟳ 갱신 중...":(lastUp?lastUp.toLocaleTimeString("ko-KR")+" 기준":"—");
  const rateStr = usdKrw?"USD/KRW ₩"+Math.round(usdKrw).toLocaleString():"환율 로딩 중...";

  // 탭: overview + 계좌들
  const tabHtml = ['<button class="tab'+(tab==="overview"?" on":"")+'" data-tab="overview"'+(editMode?' draggable="true" data-drag="overview" style="cursor:grab"':'')+'>'+( editMode?'<span style="font-size:9px;color:#64748b;margin-right:3px">⠿</span>':'')+' 전체</button>']
    .concat(ST.accounts.map(a =>
      '<button class="tab'+(tab===a.id?" on":"")+'" data-tab="'+a.id+'" style="'+(tab===a.id?"background:"+a.color:"")+';"'
      +(editMode?' draggable="true" data-drag="'+a.id+'" style="cursor:grab;'+(tab===a.id?"background:"+a.color:"")+';"':'')+'>'
      +(editMode?'<span style="font-size:9px;color:#64748b;margin-right:3px">⠿</span>':'')+a.name+'</button>'
    )).join("");

  const activeAcc = ST.accounts.find(a=>a.id===tab);

  return (loading?'<div class="loading-bar"><div class="loading-bar-inner"></div></div>':"")
    +'<div class="hdr">'
    +'<div><div class="hdr-title">📊 자산 대시보드</div>'
    +'<div class="hdr-sub">'+subStr+'</div>'
    +'<div class="hdr-rate">'+rateStr+'</div></div>'
    +'<div class="hdr-btns">'
    +'<button class="btn" id="btn-refresh">↻</button>'
    +'<button class="btn'+(editMode?" on":"")+'" id="btn-edit">'+(editMode?"✓":"✏")+'</button>'
    +'</div></div>'
    +(true  // 항상 프로필 탭 표시
      ? '<div style="display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px">'
        +getProfiles().map(p=>
          '<button style="background:'+(curProfile===p?'#6366f1':'#0f172a')+';border:1px solid '+(curProfile===p?'#6366f1':'#334155')+';color:'+(curProfile===p?'#fff':'#94a3b8')+';padding:5px 12px;border-radius:20px;font-size:12px;font-weight:'+(curProfile===p?'700':'400')+';white-space:nowrap;cursor:pointer;flex-shrink:0" data-profile="'+p+'">👤 '+p+'</button>'
        ).join("")
        +'<button style="background:transparent;border:1px dashed #334155;color:#6366f1;padding:5px 10px;border-radius:20px;font-size:12px;cursor:pointer;flex-shrink:0" id="btn-add-profile">+</button>'
        +'</div>'
      : "")
    +'<div class="btn-row">'
    +'<button class="btn-sm" id="btn-backup">💾 백업</button>'
    +'<label class="btn-sm">📂 복원<input type="file" accept=".json" id="inp-restore" style="display:none"/></label>'
    +(editMode?'<button class="btn-sm" id="btn-add-acc" style="color:#6366f1;border-color:#6366f1">➕ 계좌 추가</button>':"")
    +'</div>'
    +'<div class="tabs">'+tabHtml+'</div>'
    +(tab==="overview"?buildOverview():"")
    +(activeAcc?buildAccountSection(activeAcc):"")
    +'<div style="height:32px"></div>'
    +buildModal();
}

// ─── 팝업 ────────────────────────────────────────────────────
function clearOverlayLine(svg) {
  svg?.parentElement?.querySelector(".donut-popup")?.remove();
  const legend=svg?.parentElement?.querySelector("div");
  if (legend) legend.style.visibility="";
  if (svg?.parentElement) svg.parentElement.style.position="";
}

function showDonutPopup(seg, svg) {
  clearOverlayLine(svg);
  const flex=svg?.parentElement;
  const legend=flex?.querySelector("div");
  if (!flex||!legend) return;
  legend.style.visibility="hidden";
  const popup=document.createElement("div");
  popup.className="donut-popup";
  popup.style.cssText="position:absolute;background:#0f172a;border:1px solid #6366f1;border-radius:10px;padding:12px 14px;box-shadow:0 0 12px rgba(99,102,241,0.3);pointer-events:none";
  popup.innerHTML='<div style="font-size:11px;color:#94a3b8;margin-bottom:4px">'+seg.dataset.label+'</div>'
    +'<div style="font-size:16px;font-weight:800">₩'+Number(seg.dataset.val).toLocaleString("ko-KR")+'</div>'
    +'<div style="font-size:14px;font-weight:700;color:#6366f1;margin-top:3px">'+seg.dataset.pct+'%</div>';
  flex.style.position="relative";
  const lr=legend.getBoundingClientRect(), fr=flex.getBoundingClientRect();
  popup.style.top=(lr.top-fr.top)+"px";
  popup.style.left=(lr.left-fr.left)+"px";
  popup.style.width=lr.width+"px";
  flex.appendChild(popup);
  clearTimeout(window._popTimer);
  window._popTimer=setTimeout(()=>{
    clearOverlayLine(svg);
    svg?.querySelectorAll(".donut-seg").forEach(s=>{s.style.opacity="1";delete s.dataset.active;});
    const ct=svg?.querySelector(".donut-ct");if(ct)ct.textContent="탭하여";
    const cb=svg?.querySelector(".donut-cb");if(cb)cb.textContent="확인";
  },3000);
}

// ─── 렌더 ────────────────────────────────────────────────────
function render() {
  try {
    document.getElementById("app").innerHTML = buildPage();
    bindEvents();
    saveData();
  } catch(e) {
    document.getElementById("app").innerHTML=
      '<div style="padding:20px;color:#ef4444;font-size:13px">오류: '+e.message+'<br><pre style="font-size:10px;color:#94a3b8;white-space:pre-wrap">'+e.stack+'</pre></div>';
  }
}

// ─── 이벤트 ──────────────────────────────────────────────────
function bindEvents() {
  document.getElementById("btn-refresh")?.addEventListener("click", fetchAll);

  // 프로필 전환
  document.querySelectorAll("[data-profile]").forEach(b=>
    b.addEventListener("click", e=>{
      if (e.detail===2 && editMode) {
        // 더블탭: 프로필 삭제/이름변경 메뉴
        const list = getProfiles();
        if (list.length <= 1) { alert("마지막 프로필은 삭제할 수 없어요"); return; }
        if (confirm("'" + b.dataset.profile + "' 프로필을 삭제할까요? (저장된 데이터도 삭제됩니다)")) {
          deleteProfile(b.dataset.profile);
        }
        return;
      }
      switchProfile(b.dataset.profile);
    })
  );

  // 프로필 추가
  document.getElementById("btn-add-profile")?.addEventListener("click", ()=>{
    const name = prompt("새 프로필 이름:");
    if (!name?.trim()) return;
    const list = getProfiles();
    if (list.includes(name.trim())) { alert("이미 있는 이름이에요"); return; }
    list.push(name.trim());
    saveProfiles(list);
    switchProfile(name.trim());
  });
  document.getElementById("btn-edit")?.addEventListener("click", ()=>{editMode=!editMode;render();});
  document.getElementById("btn-backup")?.addEventListener("click", backupData);
  document.getElementById("inp-restore")?.addEventListener("change", e=>restoreData(e.target.files[0]));

  // 계좌 추가 버튼
  document.getElementById("btn-add-acc")?.addEventListener("click", ()=>{
    showModal=true; modalType="us"; modalColor=COLORS[ST.accounts.length%COLORS.length];
    render();
  });

  // 모달 이벤트
  document.querySelectorAll("[data-modal-type]").forEach(b=>
    b.addEventListener("click", ()=>{ modalType=b.dataset.modalType; render(); })
  );
  document.querySelectorAll("[data-modal-color]").forEach(b=>
    b.addEventListener("click", ()=>{ modalColor=b.dataset.modalColor; render(); })
  );
  document.getElementById("modal-cancel")?.addEventListener("click", ()=>{showModal=false;render();});
  document.getElementById("modal-bg")?.addEventListener("click", e=>{if(e.target.id==="modal-bg"){showModal=false;render();}});
  document.getElementById("modal-confirm")?.addEventListener("click", ()=>{
    const name=(document.getElementById("modal-name")?.value||"").trim()
      || ACCOUNT_TYPES[modalType].label;
    const newAcc={
      id:"a"+Date.now(), name, type:modalType, color:modalColor,
      items: modalType==="cash"?[{id:"ca"+Date.now(),n:"현금",a:0}]:[],
    };
    ST.accounts.push(newAcc);
    tab=newAcc.id;
    showModal=false;
    render();
  });

  // 탭 전환
  document.querySelectorAll("[data-tab]").forEach(b=>
    b.addEventListener("click", ()=>{tab=b.dataset.tab;render();})
  );

  // 탭 드래그
  if (editMode) {
    let dragId=null;
    document.querySelectorAll("[data-drag]").forEach(b=>{
      b.addEventListener("dragstart", e=>{dragId=b.dataset.drag;e.dataTransfer.effectAllowed="move";b.style.opacity="0.4";});
      b.addEventListener("dragend",   ()=>b.style.opacity="1");
      b.addEventListener("dragover",  e=>{e.preventDefault();});
      b.addEventListener("drop", e=>{
        e.preventDefault();
        const toId=b.dataset.drag;
        if (!dragId||!toId||dragId===toId) return;
        // overview는 항상 첫 번째
        if (dragId==="overview"||toId==="overview") return;
        const fi=ST.accounts.findIndex(a=>a.id===dragId);
        const ti=ST.accounts.findIndex(a=>a.id===toId);
        if (fi>-1&&ti>-1){const [a]=ST.accounts.splice(fi,1);ST.accounts.splice(ti,0,a);}
        saveData();render();
      });
    });
  }

  // 계좌 삭제
  document.querySelectorAll("[data-acc-del]").forEach(b=>
    b.addEventListener("click", ()=>{
      if (!confirm("'"+ST.accounts.find(a=>a.id===b.dataset.accDel)?.name+"' 계좌를 삭제할까요?")) return;
      const i=ST.accounts.findIndex(a=>a.id===b.dataset.accDel);
      if (i>-1) ST.accounts.splice(i,1);
      tab="overview";
      render();
    })
  );

  // 계좌명 편집
  document.querySelectorAll("[data-acc-name]").forEach(inp=>{
    inp.addEventListener("input", e=>{
      const acc=ST.accounts.find(a=>a.id===inp.dataset.accName);
      if (acc) acc.name=e.target.value;
      saveData();
    });
  });

  // 계좌 색상 편집
  document.querySelectorAll("[data-acc-color]").forEach(dot=>{
    dot.addEventListener("click", ()=>{
      const acc=ST.accounts.find(a=>a.id===dot.dataset.accColor);
      if (acc) acc.color=dot.dataset.color;
      saveData();render();
    });
  });

  // 종목 추가
  document.querySelectorAll("[data-add-item]").forEach(b=>
    b.addEventListener("click", ()=>{
      const acc=ST.accounts.find(a=>a.id===b.dataset.addItem);
      if (!acc) return;
      const id="i"+Date.now();
      if (acc.type==="cash") acc.items.push({id,n:"새 항목",a:0});
      else acc.items.push({id,t:"",n:"",q:0,a:0});
      render();
    })
  );

  // 종목 삭제
  document.querySelectorAll("[data-del][data-acc]").forEach(b=>
    b.addEventListener("click", ()=>{
      const acc=ST.accounts.find(a=>a.id===b.dataset.acc);
      if (!acc) return;
      const i=acc.items.findIndex(x=>x.id===b.dataset.del);
      if (i>-1) acc.items.splice(i,1);
      render();
    })
  );

  // 종목 인풋 (리렌더 없이)
  document.querySelectorAll(".inp[data-id][data-acc]").forEach(inp=>{
    const id=inp.dataset.id, f=inp.dataset.f, accId=inp.dataset.acc;
    const acc=ST.accounts.find(a=>a.id===accId);
    const item=acc?.items.find(x=>x.id===id);
    if (!item||!acc) return;
    const tr=inp.closest("tr");
    const isUS=tr?.dataset.usd==="true";
    inp.addEventListener("input", e=>{
      const v=e.target.value;
      if (f==="t") {
        const upper=v.toUpperCase(); item.t=upper; e.target.value=upper;
        const db=isUS?US_DB:acc.type==="coin"?null:KRX_DB;
        const auto=db?.[upper];
        if (auto){item.n=auto;const ni=tr?.querySelector('[data-f="n"]');if(ni)ni.value=auto;}
      } else if (f==="n") {
        item.n=v;
      } else {
        item[f]=Number(v)||0;
        if (acc.type!=="cash") {
          const val=itemVal(item,acc.type);
          const gp=itemGp(item,acc.type);
          const vc=tr?.querySelector("[data-calc='val']");
          const gc=tr?.querySelector("[data-calc='gp']");
          if(vc)vc.textContent=won(val)||"₩0";
          if(gc){gc.textContent=fPct(gp);gc.className="r "+gCls(gp);}
        }
      }
      saveData();
    });
  });

  // 목표 추가
  document.getElementById("btn-add-goal")?.addEventListener("click", ()=>{
    ST.goals.push({id:"g"+Date.now(),year:new Date().getFullYear()+1,target:100000000,snapshot:null});
    render();
  });

  // 목표 삭제
  document.querySelectorAll("[data-gdel]").forEach(b=>
    b.addEventListener("click", ()=>{
      const i=ST.goals.findIndex(g=>g.id===b.dataset.gdel);
      if(i>-1)ST.goals.splice(i,1);
      render();
    })
  );

  // 목표 인풋
  document.querySelectorAll(".inp[data-gid]").forEach(inp=>{
    inp.addEventListener("input", e=>{
      const g=ST.goals.find(x=>x.id===inp.dataset.gid);
      if(g){g[inp.dataset.gf]=Number(e.target.value)||0;saveData();}
    });
  });

  // 도넛 클릭
  document.querySelectorAll(".donut-seg").forEach(seg=>{
    seg.addEventListener("click", ()=>{
      const svg=seg.closest("svg");
      const allSegs=svg?.querySelectorAll(".donut-seg")||[];
      const isActive=seg.dataset.active==="1";
      if (isActive) {
        allSegs.forEach(s=>{s.style.opacity="1";delete s.dataset.active;});
        const ct=svg?.querySelector(".donut-ct");if(ct)ct.textContent="탭하여";
        const cb=svg?.querySelector(".donut-cb");if(cb)cb.textContent="확인";
        clearOverlayLine(svg);
        document.querySelectorAll(".legend-item").forEach(el=>el.style.opacity="1");
        return;
      }
      allSegs.forEach(s=>{s.style.opacity="0.25";delete s.dataset.active;});
      seg.style.opacity="1";seg.dataset.active="1";
      const ct=svg?.querySelector(".donut-ct");if(ct)ct.textContent=seg.dataset.label;
      const cb=svg?.querySelector(".donut-cb");if(cb)cb.textContent=seg.dataset.pct+"%";
      if (svg?.id==="overview-donut") {
        document.querySelectorAll(".legend-item").forEach(el=>{
          el.style.opacity=el.dataset.label===seg.dataset.label?"1":"0.2";
        });
      } else {
        document.querySelectorAll(".legend-item").forEach(el=>el.style.opacity="1");
        showDonutPopup(seg, svg);
      }
    });
  });
}

// ─── 시작 ────────────────────────────────────────────────────
render();
fetchAll();
setInterval(fetchAll, 60000);
</script>
