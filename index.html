}

function makeTransferDepositRecord(acc, ccy, signedAmount, date, memo) {
  const type = signedAmount >= 0 ? "cash-in" : "cash-out";
  const id = "d"+Date.now()+Math.random().toString(36).slice(2,6);
  if (acc.type === "mixed") return { id, year:new Date(date).getFullYear(), amount:signedAmount, ccy, memo, type, date };
  if (acc.type === "us") return { id, year:new Date(date).getFullYear(), amount:Math.round(signedAmount*(usdKrw||1350)), usdAmount:Math.abs(signedAmount), memo, type, date };
  return { id, year:new Date(date).getFullYear(), amount:signedAmount, memo, type, date };
}

function bindTransferModalEvents() {
  if (!transferModal) return;
  const $ = id => document.getElementById(id);
  $("transfer-close")?.addEventListener("click",()=>{ transferModal=null; render(); });
  $("transfer-modal-bg")?.addEventListener("click",e=>{ if(e.target.id==="transfer-modal-bg"){transferModal=null;render();} });

  $("tr-from")?.addEventListener("change",e=>{ transferModal.fromId=e.target.value; transferModal.fromItemId=null; transferModal.ccy=null; if(transferModal.toId===transferModal.fromId) transferModal.toId=null; render(); });
  $("tr-from-item")?.addEventListener("change",e=>{ transferModal.fromItemId=e.target.value; render(); });
  $("tr-to")?.addEventListener("change",e=>{ transferModal.toId=e.target.value; transferModal.toItemId=null; render(); });
  $("tr-to-item")?.addEventListener("change",e=>{ transferModal.toItemId=e.target.value; render(); });
  $("tr-ccy-krw")?.addEventListener("click",()=>{ transferModal.ccy="krw"; render(); });
  $("tr-ccy-usd")?.addEventListener("click",()=>{ transferModal.ccy="usd"; render(); });

  $("tr-confirm")?.addEventListener("click",()=>{
    const fromAcc = ST.accounts.find(a=>a.id===transferModal.fromId);
    const toAcc = ST.accounts.find(a=>a.id===transferModal.toId);
    const ccy = transferModal.ccy;
    const amount = parseFloat($("tr-amount")?.value) || 0;
    const date = $("tr-date")?.value || new Date().toISOString().slice(0,10);
    const memo = $("tr-memo")?.value || "";
    if (!fromAcc || !toAcc || fromAcc.id===toAcc.id) { alert("계좌를 다시 선택해주세요"); return; }
    if (!acctCcys(toAcc).includes(ccy)) { alert("환전이 필요한 이체는 지원하지 않아요"); return; }
    if (!amount || amount<=0) { alert("금액을 입력해주세요"); return; }

    // 보내는 쪽 차감
    if (fromAcc.type === "cash") {
      const item = fromAcc.items.find(i=>i.id===transferModal.fromItemId);
      if (!item) { alert("보내는 항목을 선택해주세요"); return; }
      if ((Number(item.a)||0) < amount) { alert(item.n+" 잔액이 부족해요"); return; }
      item.a = (Number(item.a)||0) - amount;
    } else {
      if (getCash(fromAcc, ccy) < amount) { alert("예수금이 부족해요"); return; }
      adjustCash(fromAcc, ccy, -amount);
      if (!fromAcc.deposits) fromAcc.deposits=[];
      fromAcc.deposits.push(makeTransferDepositRecord(fromAcc, ccy, -amount, date, "이체 → "+toAcc.name+(memo?" · "+memo:"")));
    }

    // 받는 쪽 증가
    if (toAcc.type === "cash") {
      let item;
      if (transferModal.toItemId === "__new__") {
        const name = ($("tr-to-new-name")?.value||"").trim();
        if (!name) { alert("새 항목 이름을 입력해주세요"); return; }
        item = { id:"ca"+Date.now(), n:name, a:0 };
        toAcc.items.push(item);
      } else {
        item = toAcc.items.find(i=>i.id===transferModal.toItemId);
      }
      if (!item) { alert("받는 항목을 선택해주세요"); return; }
      item.a = (Number(item.a)||0) + amount;
    } else {
      adjustCash(toAcc, ccy, amount);
      if (!toAcc.deposits) toAcc.deposits=[];
      toAcc.deposits.push(makeTransferDepositRecord(toAcc, ccy, amount, date, "이체 ← "+fromAcc.name+(memo?" · "+memo:"")));
    }

    saveData();
    transferModal = null;
    render();
    alert("✅ 이체 완료: "+fromAcc.name+" → "+toAcc.name);
  });
}

// ─── 입금/출금 모달 이벤트 ───────────────────────────────────
function bindDepositModalEvents() {
  if (!depositModal) return;
  const {accId, mode} = depositModal;
  const $ = id => document.getElementById(id);

  // 닫기는 acc를 못 찾아도 항상 동작하게 (먼저 바인딩)
  $("dm-close")?.addEventListener("click",()=>{ depositModal=null; render(); });
  $("deposit-modal-bg")?.addEventListener("click",e=>{ if(e.target.id==="deposit-modal-bg"){depositModal=null;render();} });

  const acc  = ST.accounts.find(a=>a.id===accId);
  if (!acc) {
    console.warn("[예수금 관리] 계좌를 찾을 수 없어요. accId:", accId);
    alert("계좌 정보를 불러오지 못했어요. 창을 닫고 다시 열어주세요.");
    return;
  }
  const isMixed = acc.type === "mixed";
  const ccy = isMixed ? (depositModal.ccy || "krw") : null;
  const isUS = isMixed ? ccy==="usd" : acc.type === "us";
  const isCashAcc = acc.type === "cash";

  // 예수금 재계산
  $("dm-recalc")?.addEventListener("click",()=>{
    if(!confirm("모든 입출금·거래 내역을 기반으로 예수금을 처음부터 다시 계산할까요?\n(기초 예수금이 설정돼있으면 그 값부터 시작해서 계산해요)")) return;
    depositModal = null;
    recalcAccountCash(accId);
  });

  if (!isMixed) {
    // 기초 예수금 설정 (IRP/연금저축 등 거래내역서 없는 계좌용 - 순입금엔 반영 안 됨)
    $("dm-set-opening")?.addEventListener("click",()=>{
      const cur = acc.openingCash || 0;
      const input = prompt("기초 예수금을 입력하세요 (연도별 순입금엔 안 잡혀요, 재계산 시 이 값부터 시작해요):", cur);
      if (input === null) return;
      const v = parseFloat(input.replace(/,/g,""));
      if (isNaN(v) || v < 0) { alert("올바른 숫자를 입력해주세요"); return; }
      acc.openingCash = v;
      saveData();
      render();
    });

    // 예수금 직접 수정 (재계산 없이 값만 덮어씀 - 환전 등으로 재계산이 부정확한 계좌용)
    $("dm-set-cash")?.addEventListener("click",()=>{
      const cur = acc.cash || 0;
      const input = prompt("예수금을 거래내역서 기준 값으로 직접 입력하세요 (재계산 없이 이 값으로 바로 덮어써요):", cur);
      if (input === null) return;
      const v = parseFloat(input.replace(/,/g,""));
      if (isNaN(v)) { alert("올바른 숫자를 입력해주세요"); return; }
      acc.cash = v;
      saveData();
      render();
    });
  }

  // 혼합계좌: 원화/외화 예수금 중 어디에 적용할지 선택
  $("dm-ccy-krw")?.addEventListener("click",()=>{ depositModal.ccy="krw"; render(); });
  $("dm-ccy-usd")?.addEventListener("click",()=>{ depositModal.ccy="usd"; render(); });

  // 탭 전환
  $("dm-in-tab")?.addEventListener("click",()=>{ depositModal.mode="in"; render(); });
  $("dm-out-tab")?.addEventListener("click",()=>{ depositModal.mode="out"; render(); });

  // 현금계좌: 항목 선택 드롭다운
  if (isCashAcc) {
    $("dm-item-select")?.addEventListener("change", e=>{
      depositModal.itemId = e.target.value;
      const newGroup = $("dm-new-item-name-group");
      if (newGroup) newGroup.style.display = (e.target.value === "__new__") ? "block" : "none";
    });
  }

  // USD 환전 계산 미리보기 (현금계좌 제외)
  if (isUS && !isCashAcc) {
    const updateUsdPreview = () => {
      const krw  = parseFloat($("dm-krw")?.value) || 0;
      const rate = parseFloat($("dm-rate")?.value) || 0;
      const res  = $("dm-result"), usdEl = $("dm-usd-result");
      if (krw > 0 && rate > 0 && res && usdEl) {
        res.style.display = "block";
        usdEl.textContent = usd(krw / rate);
      } else if (res) { res.style.display = "none"; }
    };
    $("dm-krw")?.addEventListener("input", updateUsdPreview);
    $("dm-rate")?.addEventListener("input", updateUsdPreview);
  }

  // 확정
  $("dm-confirm")?.addEventListener("click", ()=>{
    const isIn  = depositModal.mode === "in";
    const krw   = parseFloat($("dm-krw")?.value) || 0;
    const rate  = (isUS && !isCashAcc) ? (parseFloat($("dm-rate")?.value) || usdKrw || 1350) : 1;
    const date  = $("dm-date")?.value || new Date().toISOString().slice(0,10);
    const memo  = $("dm-memo")?.value || "";

    if (!krw || krw <= 0) { alert("금액을 입력해주세요"); return; }

    // ─ 현금/예금 계좌: 선택한 항목의 잔액을 직접 증감 ─
    if (isCashAcc) {
      let itemId = $("dm-item-select")?.value;
      let item;

      if (itemId === "__new__") {
        const newName = $("dm-new-item-name")?.value.trim();
        if (!newName) { alert("새 항목 이름을 입력해주세요"); return; }
        item = { id:"ca"+Date.now(), n:newName, a:0 };
        acc.items.push(item);
      } else {
        item = acc.items.find(x=>x.id===itemId);
      }
      if (!item) { alert("항목을 선택해주세요"); return; }

      if (isIn) {
        item.a = (Number(item.a)||0) + krw;
      } else {
        if (krw > (Number(item.a)||0)) { alert(item.n+" 잔액보다 많이 출금할 수 없어요"); return; }
        item.a = (Number(item.a)||0) - krw;
      }

      saveData();
      depositModal = null;
      render();
      return;
    }

    // ─ 투자 계좌(us/krx/coin/혼합): 예수금 증감 ─
    const amount = (isUS) ? krw / rate : krw; // USD 또는 KRW
    const depCcy = isMixed ? ccy : (isUS ? "usd" : "krw");

    if (!acc.deposits) acc.deposits = [];

    if (isIn) {
      adjustCash(acc, depCcy, amount);
      acc.deposits.push({ id:"d"+Date.now(), year:new Date(date).getFullYear(), amount: isMixed ? amount : krw, usdAmount: (!isMixed && isUS) ? amount : undefined, ccy: isMixed ? ccy : undefined, memo, type:"cash-in", date });
    } else {
      if (amount > getCash(acc, depCcy)) { alert("예수금보다 많이 출금할 수 없어요"); return; }
      adjustCash(acc, depCcy, -amount);
      acc.deposits.push({ id:"d"+Date.now(), year:new Date(date).getFullYear(), amount: isMixed ? -amount : -krw, usdAmount: (!isMixed && isUS) ? amount : undefined, ccy: isMixed ? ccy : undefined, memo, type:"cash-out", date });
    }

    saveData();
    depositModal = null;
    render();
  });
}

// ─── 리밸런싱 모달 이벤트 ───────────────────────────────────

  $("rb-close")?.addEventListener("click",()=>{ rebalanceModal=null; render(); });

function bindTradeModalEvents() {
  if (!tradeModal) return;
  const {accId, itemId} = tradeModal;
  const acc   = ST.accounts.find(a=>a.id===accId);
  const isNew = itemId === "__new__";
  const isMixedAcc = acc?.type === "mixed";
  const item0 = isNew ? null : acc?.items.find(x=>x.id===itemId);
  const market = isNew ? (isMixedAcc ? (tradeModal.market||"krx") : acc?.type) : itemMarket(item0, acc?.type);
  const isUS  = market === "us";
  const isCoin= market === "coin";

  const $  = id => document.getElementById(id);
  const qEl = $("tm-qty"), pEl = $("tm-price"), totEl = $("tm-total-amount"), resEl = $("tm-result");
  totEl?.addEventListener("input", updateResult);

  // 닫기
  $("tm-close")?.addEventListener("click",()=>{ tradeModal=null; render(); });

  // 거래 삭제
  document.querySelectorAll("[data-trade-del]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    if(!confirm("이 거래를 삭제할까요?\n평단·수량·예수금이 자동으로 되돌려져요.")) return;
    deleteTrade(accId, itemId, b.dataset.tradeDel);
  }));

  // 근거 보기
  document.querySelectorAll("[data-thesis-view]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    const item = acc?.items.find(x=>x.id===itemId);
    const tr = item?.trades?.find(t=>t.id===b.dataset.thesisView);
    if (tr?.thesis) {
      thesisViewModal = { text: tr.thesis };
      render();
    }
  }));

  // .md 파일 업로드 → 텍스트영역에 채우기
  $("tm-thesis-upload")?.addEventListener("change", e=>{
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const text = ev.target.result;
      const el = $("tm-thesis");
      if (el) el.value = text;
      const nameEl = $("tm-thesis-filename");
      if (nameEl) nameEl.textContent = "✓ " + file.name;
    };
    reader.readAsText(file, "utf-8");
  });

  $("trade-modal-bg")?.addEventListener("click",e=>{ if(e.target.id==="trade-modal-bg"){tradeModal=null;render();} });

  // 매수/매도 탭 전환
  // 이월 잔고 체크박스 → 확정 버튼 텍스트 실시간 변경
  $("tm-carryover")?.addEventListener("change", e=>{
    const btn = $("tm-confirm");
    if (btn) btn.textContent = e.target.checked ? "잔고 등록" : "매수 확정";
  });

  $("tm-buy-tab")?.addEventListener("click",()=>{ tradeModal.mode="buy"; render(); });
  $("tm-sell-tab")?.addEventListener("click",()=>{ tradeModal.mode="sell"; render(); });
  $("tm-dividend-tab")?.addEventListener("click",()=>{ tradeModal.mode="dividend"; render(); });

  // 혼합계좌 신규매수: 시장(국내/해외/코인) 선택
  document.querySelectorAll("[data-tm-market]").forEach(b=>b.addEventListener("click",()=>{ tradeModal.market=b.dataset.tmMarket; render(); }));

  // 티커 자동완성 (신규 매수)
  if (isNew) {
    let nameTimer;
    $("tm-ticker")?.addEventListener("input", e=>{
      const t = e.target.value.toUpperCase().trim();
      clearTimeout(nameTimer);
      if (!t) { const el=$("tm-name-preview"); if(el) el.textContent=""; return; }
      // KRX DB 먼저
      const krxName = KRX_DB[t];
      if (krxName) { previewNameCache[t]=krxName; const el=$("tm-name-preview"); if(el) el.textContent="✓ "+krxName; return; }
      const usName = US_DB[t];
      if (usName) { previewNameCache[t]=usName; const el=$("tm-name-preview"); if(el) el.textContent="✓ "+usName; return; }
      // Yahoo/네이버에서 실시간 조회 (하드코딩 DB에 없는 임의 종목 대응)
      nameTimer = setTimeout(async()=>{
        try {
          const isKrxCode = /^\d{6}$/.test(t); // 6자리 숫자 = 국내 종목코드 패턴
          if (isKrxCode) {
            const r = await fetch(WORKER+"?type=krx&codes="+t);
            const d = await r.json();
            const el=$("tm-name-preview");
            const nm = d?.names?.[t];
            const price = d?.prices?.[t];
            if (nm) previewNameCache[t]=nm;
            if (el) {
              if (nm) el.textContent = "✓ "+nm+(price?" ("+won(price)+")":"");
              else if (price) el.textContent = "✓ 종목 확인됨 (현재가 "+won(price)+")";
              else el.textContent = "⚠ 종목을 찾을 수 없어요";
            }
          } else {
            const r = await fetch(WORKER+"?type=us&symbols="+t);
            const d = await r.json();
            const el=$("tm-name-preview");
            const nm = d.names?.[t];
            if (nm) previewNameCache[t]=nm;
            if(el) el.textContent = d.prices?.[t] ? "✓ 종목 확인됨" : "⚠ 종목을 찾을 수 없어요";
          }
        } catch {}
      }, 600);
    });
  }

  // 수량/단가 입력 시 예상 결과 계산
  function updateResult() {
    const qty   = parseFloat(qEl?.value) || 0;
    const rawPrice = parseFloat(pEl?.value) || 0;
    const totalInput = parseFloat(totEl?.value) || 0;
    if (!qty || (!rawPrice && !totalInput) || !resEl) { resEl.style.display="none"; return; }

    const item  = isNew ? null : acc?.items.find(x=>x.id===itemId);
    const isBuy = tradeModal.mode === "buy";
    const price = totalInput > 0 ? totalInput / qty : rawPrice; // 체결총액 있으면 역산, 없으면 단가 그대로

    resEl.style.display = "block";

    if (isBuy) {
      const curQty   = item?.q  || 0;
      const curAvg   = item?.a  || 0;
      const newQty   = curQty + qty;
      const newAvg   = curQty > 0 ? (curQty*curAvg + qty*price) / newQty : price;
      const total    = qty * price;
      resEl.innerHTML =
        '<div class="trade-result-row"><span style="color:#8e8e93">매수 금액</span><span style="font-weight:700">'+(isUS?usd(total):won(total))+'</span></div>'
        +(item?'<div class="trade-result-row"><span style="color:#8e8e93">변경 후 수량</span><span style="font-weight:700">'+newQty+(isCoin?"":"주")+'</span></div>'
             +'<div class="trade-result-row"><span style="color:#8e8e93">변경 후 평단</span><span style="font-weight:700">'+(isUS?usd(newAvg):won(newAvg))+'</span></div>':"");
    } else {
      const item  = acc?.items.find(x=>x.id===itemId);
      const avg   = item?.a || 0;
      const pnl   = (price - avg) * qty;
      const pnlPct= avg > 0 ? ((price-avg)/avg)*100 : 0;
      resEl.innerHTML =
        '<div class="trade-result-row"><span style="color:#8e8e93">매도 금액</span><span style="font-weight:700">'+(isUS?usd(qty*price):won(qty*price))+'</span></div>'
        +'<div class="trade-result-row"><span style="color:#8e8e93">실현 손익</span><span style="font-weight:700;color:'+(pnl>=0?"#ef4444":"#3b82f6")+'">'+(pnl>=0?"+":"")+(isUS?usd(pnl):won(pnl))+" ("+fPct(pnlPct)+")"+'</span></div>'
        +'<div class="trade-result-row"><span style="color:#8e8e93">변경 후 수량</span><span style="font-weight:700">'+((item?.q||0)-qty)+(isCoin?"":"주")+'</span></div>';
    }
  }
  qEl?.addEventListener("input", updateResult);
  pEl?.addEventListener("input", updateResult);

  // 확정 버튼
  $("tm-confirm")?.addEventListener("click", ()=>{
    const isDiv = tradeModal.mode === "dividend";
    const qty   = parseFloat(qEl?.value) || 0;
    const rawPrice = parseFloat(pEl?.value) || 0;
    const totalInput = parseFloat(totEl?.value) || 0;
    const isBuy = tradeModal.mode === "buy";
    const price = isDiv ? rawPrice : (totalInput > 0 && qty > 0 ? totalInput / qty : rawPrice);
    const divAmount = parseFloat($("tm-dividend-amount")?.value) || 0;
    const date  = $("tm-date")?.value || new Date().toISOString().slice(0,10);
    const memoBase  = $("tm-memo")?.value || "";
    const memo = (!isDiv && totalInput > 0) ? (memoBase ? memoBase+" · " : "")+"체결총액 "+totalInput+" 기준(단가 입력값 "+rawPrice+")" : memoBase;
    const thesis = $("tm-thesis")?.value.trim() || "";

    // 배당 처리 (신규 종목에서는 배당 불가)
    if (isDiv) {
      if (isNew) { alert("배당은 기존 종목에서만 입력할 수 있어요"); return; }
      if (!divAmount || divAmount <= 0) { alert("배당금을 입력해주세요"); return; }
      const item = acc.items.find(x=>x.id===itemId);
      if (!item) return;
      if (!item.trades) item.trades=[];
      item.trades.push({id:"tr"+Date.now(), type:"dividend", date, amount:divAmount, memo, thesis});
      // 예수금 증가
      adjustCash(acc, isUS?"usd":"krw", divAmount);
      saveData();
      tradeModal = null;
      render();
      return;
    }

    if (!qty || qty <= 0) { alert("수량을 입력해주세요"); return; }
    if (!price || price <= 0) { alert("단가를 입력해주세요"); return; }

    if (isNew) {
      const ticker = $("tm-ticker")?.value.toUpperCase().trim();
      if (!ticker) { alert("티커를 입력해주세요"); return; }
      const isCarryover = $("tm-carryover")?.checked;

      let item = acc.items.find(x=>x.t===ticker);

      if (isCarryover) {
        // 이월 잔고: 거래 이력 없이 수량/평단만 등록, 예수금 영향 없음
        if (!item) {
          item = {id:"i"+Date.now(), t:ticker, n:US_DB[ticker]||KRX_DB[ticker]||previewNameCache[ticker]||"", q:0, a:0, trades:[]};
          acc.items.push(item);
        }
        if (item.trades && item.trades.length) {
          alert("이미 거래 기록이 있는 종목이에요. 이월 잔고 등록 대신 신규 매수를 이용해주세요.");
          return;
        }
        item.q = qty;
        item.a = price;
        item.isCarryover = true;
      } else {
        const cost = qty*price;
        if (cost > getCash(acc, isUS?"usd":"krw")) {
          alert("예수금이 부족해요.\n필요 금액: "+(isUS?usd(cost):won(cost))+"\n현재 예수금: "+(isUS?usd(getCash(acc,"usd")):won(getCash(acc,"krw"))));
          return;
        }
        if (!item) {
          item = {id:"i"+Date.now(), t:ticker, n:US_DB[ticker]||KRX_DB[ticker]||previewNameCache[ticker]||"", q:0, a:0, trades:[]};
          if (isMixedAcc) item.market = market;
          acc.items.push(item);
        }
        if (!item.trades) item.trades=[];
        item.trades.push({id:"tr"+Date.now(), type:"buy", date, qty, price, memo, thesis});
        // 이동평균법 재계산
        const { qty: newQty, avg: newAvg } = computeMovingAverage(item.trades);
        item.q = newQty;
        item.a = newAvg;
        // 예수금 차감
        adjustCash(acc, isUS?"usd":"krw", -cost);
      }
    } else {
      const item = acc.items.find(x=>x.id===itemId);
      if (!item) return;
      if (!item.trades) item.trades=[];

      if (isBuy) {
        const cost = qty*price;
        if (cost > getCash(acc, isUS?"usd":"krw")) {
          alert("예수금이 부족해요.\n필요 금액: "+(isUS?usd(cost):won(cost))+"\n현재 예수금: "+(isUS?usd(getCash(acc,"usd")):won(getCash(acc,"krw"))));
          return;
        }
        item.trades.push({id:"tr"+Date.now(), type:"buy", date, qty, price, memo, thesis});
        // 이동평균법 재계산
        const { qty: newQty, avg: newAvg } = computeMovingAverage(item.trades);
        item.q = newQty;
        item.a = newAvg;
        // 예수금 차감
        adjustCash(acc, isUS?"usd":"krw", -cost);
      } else {
        // 부동소수점 허용 오차: 잔량의 99.999% 이상이면 전량 매도로 처리
        let sellQty = qty;
        if (qty > item.q) {
          if (qty <= item.q * 1.00001 + 0.00001) { sellQty = item.q; }
          else { alert("보유 수량보다 많이 매도할 수 없어요"); return; }
        } else if (qty >= item.q * 0.99999) {
          sellQty = item.q; // 사실상 전량 매도
        }
        const pnl = (price - item.a) * sellQty;
        item.trades.push({id:"tr"+Date.now(), type:"sell", date, qty: sellQty, price, memo, pnl, thesis});
        item.q -= sellQty;
        // 예수금 증가
        adjustCash(acc, isUS?"usd":"krw", sellQty*price);
        if (item.q <= 0.00001) {
          if (confirm("보유 수량이 0이 됐어요. 종목을 삭제할까요?")) {
            const idx = acc.items.findIndex(x=>x.id===itemId);
            if (idx>-1) acc.items.splice(idx,1);
          } else { item.q = 0; }
        }
      }
    }

    saveData();
    tradeModal = null;
    render();
    fetchAll();
  });
}

  try { document.getElementById("app").innerHTML=buildPage(); bindEvents(); }

}

  document.querySelectorAll(".donut-seg").forEach(seg=>{ seg.addEventListener("click",()=>{ const svg=seg.closest("svg"), allSegs=svg?.querySelectorAll(".donut-seg")||[]; const isActive=seg.dataset.active==="1"; if(isActive){allSegs.forEach(s=>{s.style.opacity="1";delete s.dataset.active;});const ct=svg?.querySelector(".donut-ct");if(ct)ct.textContent="탭하여";const cb=svg?.querySelector(".donut-cb");if(cb)cb.textContent="확인";clearOverlayLine(svg);document.querySelectorAll(".legend-item").forEach(el=>el.style.opacity="1");return;} allSegs.forEach(s=>{s.style.opacity="0.25";delete s.dataset.active;});seg.style.opacity="1";seg.dataset.active="1";const ct=svg?.querySelector(".donut-ct");if(ct)ct.textContent=seg.dataset.label;const cb=svg?.querySelector(".donut-cb");if(cb)cb.textContent=seg.dataset.pct+"%"; if(svg?.id==="overview-donut"){document.querySelectorAll(".legend-item").forEach(el=>{el.style.opacity=el.dataset.label===seg.dataset.label?"1":"0.2";});}else if(svg?.dataset.sectorDonut==="1"){showSectorPopup(seg,svg);}else{document.querySelectorAll(".legend-item").forEach(el=>el.style.opacity="1");showDonutPopup(seg,svg);} }); });

  // 모달은 자동 새로고침(60초 주기) 등으로 화면이 다시 그려질 때마다
  // 새로 생긴 DOM에 맞춰 매번 다시 바인딩해야 닫기 버튼 등이 계속 동작함
  if (rebalanceModal) bindRebalanceModalEvents();
  if (depositModal) bindDepositModalEvents();
  if (tradeModal) bindTradeModalEvents();
  if (mergeModal) bindMergeModalEvents();
  if (tutorialStep != null) bindTutorialEvents();
  if (transferModal) bindTransferModalEvents();
}

// ─── 모달 ESC 닫기 ───────────────────────────────────────────
document.addEventListener("keydown", e=>{
  if (e.key !== "Escape") return;
  if (rebalanceModal) { rebalanceModal=null; render(); }
  else if (tradeModal) { tradeModal=null; render(); }
  else if (depositModal) { depositModal=null; render(); }
  else if (mergeModal) { mergeModal=null; render(); }
  else if (transferModal) { transferModal=null; render(); }
  else if (thesisViewModal) { thesisViewModal=null; render(); }
  else if (showModal) { showModal=false; render(); }
  else if (tutorialStep != null) { tutorialStep=null; markTutorialSeen(); render(); }
  else if (dataMenuOpen) { dataMenuOpen=false; render(); }
});

// ─── 시작 ────────────────────────────────────────────────────
try { if (!localStorage.getItem(TUTORIAL_SEEN_KEY)) tutorialStep = 0; } catch {}
render();
fetchAll();
setInterval(fetchAll,60000);
// 모바일에서 백그라운드로 갔다가 돌아왔을 때, 직전 시세 갱신이 실패/미완료 상태였다면 자동 재시도
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && !loading && (fetchError || !usdKrw)) fetchAll();
});
// 암호화 도입 전 평문으로 저장됐을 수 있는 기존 클라우드 백업을 암호화본으로 즉시 교체
cloudSave(true);
</script>
</body>
</html>
