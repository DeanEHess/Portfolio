// ─── 클라우드 UID ─────────────────────────────────────────────
function getOrCreateUid() {
  let uid = localStorage.getItem("asset_uid");
  if (!uid) {
    uid = "u_" + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
    localStorage.setItem("asset_uid", uid);
  }
  return uid;
}
const CLOUD_UID = getOrCreateUid();
let cloudStatus = "";

async function cloudSave(silent=false) {
  if (!silent) { cloudStatus = "saving"; render(); }
  try {
    const r = await fetch(WORKER + "?type=kv-save&uid=" + CLOUD_UID, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(ST),
    });
    const d = await r.json();
    if (!silent) {
      cloudStatus = d.ok ? "saved" : "error";
      render();
      setTimeout(() => { cloudStatus = ""; render(); }, 3000);
    }
  } catch {
    if (!silent) { cloudStatus = "error"; render(); setTimeout(()=>{ cloudStatus=""; render(); }, 3000); }
  }
}

async function cloudLoad() {
  const uid = prompt("복원할 백업 키를 입력하세요:\n(현재 내 키: " + CLOUD_UID + ")");
  if (!uid) return;
  cloudStatus = "loading"; render();
  try {
    const r = await fetch(WORKER + "?type=kv-load&uid=" + uid.trim());
    if (r.status === 404) { alert("해당 키로 저장된 데이터가 없어요"); cloudStatus = ""; render(); return; }
    const d = await r.json();
    if (!d.accounts) throw new Error("잘못된 데이터");
    Object.assign(ST, d);
    localStorage.setItem("asset_uid", uid.trim());
    saveData(); cloudStatus = ""; render(); fetchAll();
    alert("✅ 복원 완료!");

// ─── 프로필 ──────────────────────────────────────────────────
const PROFILE_LIST_KEY = "asset_profiles";
const PROFILE_CUR_KEY  = "asset_cur_profile";
function profileKey(name) { return "asset_v7_" + name; }
function getProfiles() { try { return JSON.parse(localStorage.getItem(PROFILE_LIST_KEY)) || ["기본"]; } catch { return ["기본"]; } }
function saveProfiles(list) { localStorage.setItem(PROFILE_LIST_KEY, JSON.stringify(list)); }
let curProfile = localStorage.getItem(PROFILE_CUR_KEY) || getProfiles()[0];
function switchProfile(name) {
  curProfile = name;
  localStorage.setItem(PROFILE_CUR_KEY, name);
  try { Object.assign(ST, JSON.parse(localStorage.getItem(profileKey(name)) || JSON.stringify(DEFAULT_DATA))); }
  catch { Object.assign(ST, JSON.parse(JSON.stringify(DEFAULT_DATA))); }

  if (!list.length) list.push("기본");
  saveProfiles(list); localStorage.removeItem(profileKey(name)); switchProfile(list[0]);
}

  ];
}
const DEFAULT_DATA = {
  accounts: makeDefaultAccounts(),
  goals: [{id:"g1",year:2027,target:50000000,snapshot:null},{id:"g2",year:2028,target:100000000,snapshot:null},{id:"g3",year:2030,target:300000000,snapshot:null},{id:"g4",year:2033,target:500000000,snapshot:null}],
  deposits: [],
};
function migrateOldData(old) {
  const accs = makeDefaultAccounts();
  const map = {us:"a_us",krx:"a_krx",pen:"a_pen",irp:"a_irp",isa:"a_isa",coins:"a_coin"};
  for (const [key,aid] of Object.entries(map)) {
    const items = key==="coins"?(old.coins||[]).map(x=>({id:x.id,t:x.t,n:x.n,q:x.q,a:x.a})):(old[key]||[]).map(x=>({id:x.id,t:x.t||"",n:x.n||"",q:x.q||0,a:x.a||0}));
    const acc = accs.find(a=>a.id===aid);
    if (acc && items.length) acc.items = items;
  }
  const cashAcc = accs.find(a=>a.id==="a_cash");
  if (cashAcc && Array.isArray(old.cash)) cashAcc.items = old.cash;
  return {accounts:accs, goals:old.goals||DEFAULT_DATA.goals};
}
function loadData() {
  try {
    const raw = localStorage.getItem(profileKey(curProfile)) || localStorage.getItem(SK);
    if (raw) { const d=JSON.parse(raw); if(!d.goals) d.goals=JSON.parse(JSON.stringify(DEFAULT_DATA.goals)); if(!d.deposits) d.deposits=[]; d.accounts.forEach(a=>{if(!a.deposits)a.deposits=[];if(a.cash==null)a.cash=0;}); return d; }
    const oldRaw = localStorage.getItem("asset_v6") || localStorage.getItem("asset_v5");
    if (oldRaw) { const m=migrateOldData(JSON.parse(oldRaw)); localStorage.setItem(profileKey(curProfile),JSON.stringify(m)); return m; }
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
let _autoSaveTimer = null;
function saveData() {
  try { localStorage.setItem(SK,JSON.stringify(ST)); localStorage.setItem(profileKey(curProfile),JSON.stringify(ST)); } catch {}
  // 자동 클라우드 저장 (5초 디바운스)
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(()=>{ cloudSave(true); }, 5000);
}

// ─── 포맷 ────────────────────────────────────────────────────
const won   = n => n!=null ? "₩"+Math.round(n).toLocaleString("ko-KR") : "—";
const usd   = n => n ? "$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}) : "—";
const fPct  = n => n==null ? "—" : (n>=0?"+":"")+n.toFixed(2)+"%";
const gCls  = n => n==null ? "na" : n>=0 ? "up" : "dn";
// 수익금 포맷 — 부호 포함
const fProfit = n => n==null ? "—" : (n>=0?"+":"-")+"₩"+Math.round(Math.abs(n)).toLocaleString("ko-KR");

// ─── 계산 ────────────────────────────────────────────────────
function itemVal(item, type) {
  if (type==="cash") return Number(item.a)||0;
  const p = px[item.t]||item.a||0;
  return type==="us" ? p*item.q*(usdKrw||0) : p*item.q;
}
function itemValBest(item, type) {
  if (type==="cash") return Number(item.a)||0;
  const p = px[item.t]||item.a||0;
  return type==="us" ? p*item.q*(usdKrw||1) : p*item.q;
}
function itemCost(item, type) {
  if (!item.q||!item.a) return 0;
  return type==="us" ? item.a*item.q*(usdKrw||0) : item.a*item.q;
}
function itemGp(item, type) {
  const p=px[item.t]; if(!p||!item.a||!item.q) return null;
  return ((p-item.a)/item.a)*100;
}
function itemPriceKrw(item, type) {
  const p=px[item.t]; if(!p) return null;
  return type==="us" ? (usdKrw?p*usdKrw:null) : p;
}
function accTotal(acc) {
  const itemsVal = acc.items.reduce((s,x)=>s+itemVal(x,acc.type),0);
  if (acc.type==="cash") return itemsVal;
  // 예수금 포함 (us는 usdKrw 곱해서 KRW로)
  const cashKrw = acc.type==="us" ? (acc.cash||0)*(usdKrw||0) : (acc.cash||0);
  return itemsVal + cashKrw;
}
// [핵심] 계좌 수익금 — cost 있는 종목만 합산
function accProfit(acc) {
  if (acc.type==="cash") return null;
  let cost=0, val=0;
  for (const item of acc.items) {
    const c = itemCost(item, acc.type);
    if (!c) continue;
    cost += c;
    val  += itemVal(item, acc.type);
  }
  return cost>0 ? val-cost : null;
}
function accGp(acc) {
  if (acc.type==="cash") return null;
  let cost=0, val=0;
  for (const item of acc.items) {
    const c=itemCost(item,acc.type); if(!c) continue;
    cost+=c; val+=itemVal(item,acc.type);
  }
  return cost>0 ? ((val-cost)/cost)*100 : null;
}
function grandTotal() { return ST.accounts.reduce((s,a)=>s+accTotal(a),0); }
function grandProfit() {
  let cost=0, val=0;
  for (const acc of ST.accounts) {
    if (acc.type==="cash") continue;
    for (const item of acc.items) {
      const c=itemCost(item,acc.type); if(!c) continue;
      cost+=c; val+=itemVal(item,acc.type);
    }
  }
  return cost>0 ? val-cost : null;
}
function grandGp() {
  let cost=0, val=0;
  for (const acc of ST.accounts) {
    if (acc.type==="cash") continue;
    for (const item of acc.items) {
      const c=itemCost(item,acc.type); if(!c) continue;
      cost+=c; val+=itemVal(item,acc.type);
    }
  }
  return cost>0 ? ((val-cost)/cost)*100 : null;
}
function sortItems(items, type) { return [...items].sort((a,b)=>itemValBest(b,type)-itemValBest(a,type)); }

// ─── 섹터 ────────────────────────────────────────────────────
function getSector(ticker, accType) {
  if (!ticker) return accType==="coin"?"암호화폐":accType==="cash"?"현금/예금":"기타";
  const t=ticker.toUpperCase();
  return sectorCache[t]||sectorCache[ticker]||SECTOR_DB[t]||SECTOR_DB[ticker]||(accType==="coin"?"암호화폐":"기타");
}
function calcSectorMap(accounts) {
  const map={};
  for (const acc of accounts) {
    if (acc.type==="cash") { const v=accTotal(acc); if(v>0) map["현금/예금"]=(map["현금/예금"]||0)+v; continue; }
    for (const item of acc.items) {
      if (!item.q) continue;
      const v=itemValBest(item,acc.type); if(!v) continue;
      const s=getSector(item.t,acc.type); map[s]=(map[s]||0)+v;
    }
  }
  return map;
}
function sectorMapToItems(map) {
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).filter(([,v])=>v>0).map(([l,v])=>({l,v,c:SECTOR_COLORS[l]||"#334155"}));
}

// ─── API ─────────────────────────────────────────────────────
async function fetchAll() {
  if (loading) return;
  loading=true; render();
  const isValidTicker = t => t && /^[A-Za-z0-9\-\.]+$/.test(t);
  const usTickers   = [...new Set(ST.accounts.filter(a=>a.type==="us").flatMap(a=>a.items.map(x=>x.t).filter(isValidTicker)))];
  const krxCodes    = [...new Set(ST.accounts.filter(a=>a.type==="krx").flatMap(a=>a.items.map(x=>x.t).filter(isValidTicker)))];
  const coinTickers = [...new Set(ST.accounts.filter(a=>a.type==="coin").flatMap(a=>a.items.map(x=>x.t).filter(isValidTicker)))];
  const coinIds     = coinTickers.map(t=>GECKO_ID[t.toUpperCase()]).filter(Boolean);
  try {
    const params=new URLSearchParams({type:"all",us:usTickers.join(","),krx:krxCodes.join(","),coins:coinIds.join(",")});
    const d=await fetch(WORKER+"?"+params).then(r=>r.json());
    if (d.fx) usdKrw=d.fx;
    Object.assign(px,d.us||{});
    Object.assign(px,d.krx||{});
    coinTickers.forEach(t=>{ const id=GECKO_ID[t.toUpperCase()]; if(id&&d.coins?.[id]?.krw) px[t]=d.coins[id].krw; });
    for (const [sym,sec] of Object.entries(d.sectors||{})) sectorCache[sym]=SECTOR_EN[sec]||sec;
    localStorage.setItem("sector_cache",JSON.stringify(sectorCache));
    // Worker에서 받은 종목명으로 자동 업데이트 (이름 없는 종목만)
    for (const acc of ST.accounts) {
      if (acc.type !== "us") continue;
      for (const item of acc.items) {
        if (!item.t) continue;
        const fetchedName = d.names?.[item.t];
        if (fetchedName && !item.n) {
          item.n = fetchedName;
        }
      }
    }
    saveData();
  } catch {}
  loading=false; lastUp=new Date(); render();
  fetchMissingSectors();
}
async function fetchMissingSectors() {
  const allTickers=ST.accounts.filter(a=>a.type==="us"||a.type==="krx").flatMap(a=>a.items.map(x=>x.t).filter(Boolean));
  const missing=[...new Set(allTickers)].filter(t=>!sectorCache[t]&&!sectorCache[t.toUpperCase()]&&!SECTOR_DB[t]&&!SECTOR_DB[t.toUpperCase()]);
  if (!missing.length) return;
  try {
    const d=await fetch(WORKER+"?type=sector&symbols="+missing.join(",")).then(r=>r.json());
    for (const [sym,sec] of Object.entries(d)) sectorCache[sym.toUpperCase()]=sec;
    localStorage.setItem("sector_cache",JSON.stringify(sectorCache));
    render();
  } catch {}
}

// ─── 백업/복원 ───────────────────────────────────────────────
function backupData() {
  const blob=new Blob([JSON.stringify(ST,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="asset_backup_"+curProfile+"_"+new Date().toISOString().slice(0,10).replace(/-/g,"")+".json";
  a.click(); URL.revokeObjectURL(url);
}
function restoreData(file) {
  if (!file) return;
  new FileReader().onload=e=>{
    try { const d=JSON.parse(e.target.result); if(!d.accounts) throw new Error("올바른 백업 파일이 아니에요"); Object.assign(ST,d); saveData(); render(); alert("✅ 복원 완료!"); }
    catch(err) { alert("❌ 복원 실패: "+err.message); }
  };
  // 위 방식은 onload 할당 안됨 — 수정
  const reader=new FileReader();
  reader.onload=e=>{ try { const d=JSON.parse(e.target.result); if(!d.accounts) throw new Error("올바른 백업 파일이 아니에요"); Object.assign(ST,d); saveData(); render(); alert("✅ 복원 완료!"); } catch(err){alert("❌ 복원 실패: "+err.message);} };
  reader.readAsText(file);
}

// ─── SVG 도넛 ────────────────────────────────────────────────
function buildDonutSVG(segs, total, cx, cy, R, r, interactive) {
  if (!segs.length||!total) return "";
  if (segs.length===1) {
    const col=segs[0].c||COLORS[0];
    const ex=interactive?` data-label="${segs[0].l}" data-pct="100.0" data-val="${Math.round(segs[0].v)}" class="donut-seg" style="cursor:pointer"`:"";
    return `<circle cx="${cx}" cy="${cy}" r="${(R+r)/2}" fill="none" stroke="${col}" stroke-width="${R-r}"${ex}/>`;
  }
  let ang=-Math.PI/2;
  return segs.map((seg,i)=>{
    const a=seg.v/total*Math.PI*2;
    const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang); ang+=a;
    const x2=cx+R*Math.cos(ang),y2=cy+R*Math.sin(ang);
    const xi1=cx+r*Math.cos(ang-a),yi1=cy+r*Math.sin(ang-a);
    const xi2=cx+r*Math.cos(ang),yi2=cy+r*Math.sin(ang);
    const lg=a>Math.PI?1:0, col=seg.c||COLORS[i%COLORS.length];
    const pct=(seg.v/total*100).toFixed(1);
    const ex=interactive?` data-label="${seg.l}" data-pct="${pct}" data-val="${Math.round(seg.v)}" class="donut-seg" style="cursor:pointer"`:"";
    return `<path d="M${xi1},${yi1}L${x1},${y1}A${R},${R} 0 ${lg},1 ${x2},${y2}L${xi2},${yi2}A${r},${r} 0 ${lg},0 ${xi1},${yi1}Z" fill="${col}" stroke="#0f172a" stroke-width="2"${ex}/>`;
  }).join("");
}
function buildDonutCard(items, title) {
  if (!items.length) return "";
  const total=items.reduce((s,x)=>s+x.v,0); if(!total) return "";
  const segs=items.map((x,i)=>({l:x.l,v:x.v,c:x.c||COLORS[i%COLORS.length]}));
  const paths=buildDonutSVG(segs,total,90,90,75,45,true);
  const isSector=title.includes("섹터");
  const legend=segs.map(seg=>
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    +'<div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:2px;background:'+seg.c+'"></div>'
    +'<span style="font-size:11px">'+seg.l+'</span></div>'
    +'<div><span style="font-size:11px;font-weight:700;color:#94a3b8;margin-right:4px">'+(seg.v/total*100).toFixed(1)+'%</span>'
    +'<span style="font-size:11px;font-weight:600">'+won(seg.v)+'</span></div></div>'
  ).join("");
  return '<div class="card" style="margin-top:4px">'
    +'<div class="card-title" style="margin-bottom:12px">'+title+'</div>'
    +'<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">'
    +'<svg width="180" height="180" viewBox="0 0 180 180" style="flex-shrink:0"'+(isSector?' data-sector-donut="1"':'')+' data-donut-title="'+title+'">'
    +paths
    +'<text x="90" y="85" text-anchor="middle" fill="#94a3b8" font-size="10" class="donut-ct">탭하여</text>'
    +'<text x="90" y="100" text-anchor="middle" fill="#94a3b8" font-size="10" class="donut-cb">확인</text>'
    +'</svg>'
    +'<div style="flex:1;min-width:150px" class="donut-legend">'+legend+'</div>'
    +'</div></div>';
}

// ─── 순입금 섹션 (계좌별) ────────────────────────────────────
function buildDepositSection(deposits, accId) {
  const sorted = [...deposits].sort((a,b)=>a.year-b.year);
  const total  = sorted.reduce((s,x)=>s+(Number(x.amount)||0), 0);
  const acc    = ST.accounts.find(a=>a.id===accId);
  const ev     = acc ? accTotal(acc) : 0;
  const diff    = total > 0 ? ev - total : null;
  const diffPct = total > 0 ? ((ev - total) / total) * 100 : null;

  const editRows = sorted.map(d=>
    '<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">'
    +'<input class="inp inp-r" type="number" style="width:68px" data-df="year" data-did="'+d.id+'" data-dscope="'+accId+'" value="'+d.year+'" placeholder="연도"/>'
    +'<input class="inp inp-r" type="number" style="flex:1" data-df="amount" data-did="'+d.id+'" data-dscope="'+accId+'" value="'+(d.amount||'')+'" placeholder="금액(원)"/>'
    +'<button class="del-btn" data-ddel="'+d.id+'" data-dscope="'+accId+'">✕</button></div>'
  ).join("");

  const viewRows = sorted.map(d=>
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    +'<span style="font-size:12px;color:#94a3b8;width:48px">'+d.year+'년</span>'
    +'<span style="font-size:13px;font-weight:600">'+won(Number(d.amount)||0)+'</span>'
    +'</div>'
  ).join("");

  const summaryHtml = total > 0
    ? '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid #334155;margin-top:6px">'
      +'<span style="font-size:12px;color:#64748b">총 순입금</span>'
      +'<div style="text-align:right">'
      +'<span style="font-size:14px;font-weight:800">'+won(total)+'</span>'
      +(diff!=null?'<span style="font-size:12px;font-weight:700;color:'+(diff>=0?'#ef4444':'#3b82f6')+';margin-left:8px">'+(diff>=0?'+':'')+won(diff)+'</span>':"")
      +(diffPct!=null?'<span style="font-size:11px;font-weight:700;color:'+(diffPct>=0?'#ef4444':'#3b82f6')+';margin-left:4px">('+fPct(diffPct)+')</span>':"")
      +'</div></div>'
    : "";

  return '<div class="card" style="margin-bottom:12px">'
    +'<div class="card-hdr"><span class="card-title">💸 순입금 내역</span></div>'
    +(editMode ? editRows : (viewRows || '<div style="font-size:12px;color:#475569;text-align:center;padding:8px 0">입력된 내역이 없습니다</div>'))
    +(editMode
      ? '<button class="add-btn" data-dadd="'+accId+'">+ 연도 추가</button>'
      : summaryHtml)
    +'</div>';
}

// ─── 순입금 vs 평가금액 (전체 탭) ────────────────────────────
function buildOverviewDepositSection() {
  const ovRows = [];
  let totalDep = 0, totalEval = 0;
  for (const acc of ST.accounts) {
    let dep = 0;
    if (acc.type === "cash") {
      dep = acc.items.reduce((s,x)=>s+(Number(x.a)||0), 0);
    } else {
      dep = (acc.deposits||[]).reduce((s,d)=>s+(Number(d.amount)||0), 0);
    }
    const ev = accTotal(acc);
    if (dep === 0 && ev === 0) continue;
    ovRows.push({name: acc.name, color: acc.color, dep, ev});
    totalDep  += dep;
    totalEval += ev;
  }
  if (!ovRows.length) return "";
  const ovDiff    = totalDep > 0 ? totalEval - totalDep : null;
  const ovDiffPct = totalDep > 0 ? ((totalEval - totalDep) / totalDep) * 100 : null;
  const rowHtml = ovRows.map(r => {
    const diff    = r.dep > 0 ? r.ev - r.dep : null;
    const diffPct = r.dep > 0 ? ((r.ev - r.dep) / r.dep) * 100 : null;
    return '<tr>'
      +'<td><div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:2px;background:'+r.color+';flex-shrink:0"></div><span style="font-size:12px;font-weight:600">'+r.name+'</span></div></td>'
      +'<td class="r" style="font-size:12px">'+(r.dep>0?won(r.dep):'<span style="color:#475569">미입력</span>')+'</td>'
      +'<td class="r" style="font-size:12px;font-weight:600">'+won(r.ev)+'</td>'
      +'<td class="r"><span style="font-size:11px;font-weight:700;color:'+(diff==null?'#475569':diff>=0?'#ef4444':'#3b82f6')+'">'
      +(diff==null?'—':(diffPct>=0?'+':'')+diffPct.toFixed(1)+'%')+'</span></td>'
      +'</tr>';
  }).join("");
  return '<div class="card" style="margin-bottom:12px">'
    +'<div class="card-hdr" style="margin-bottom:10px"><span class="card-title">💸 순입금 vs 평가금액</span></div>'
    +'<div class="tbl-wrap"><table>'
    +'<thead><tr><th style="text-align:left">계좌</th><th class="r">순입금</th><th class="r">평가금액</th><th class="r">수익률</th></tr></thead>'
    +'<tbody>'+rowHtml+'</tbody>'
    +'</table></div>'
    +(totalDep>0
      ? '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid #334155;margin-top:6px">'
        +'<span style="font-size:12px;color:#64748b">전체 합계</span>'
        +'<div style="text-align:right">'
        +'<span style="font-size:12px;color:#94a3b8">입금 '+won(totalDep)+'</span>'
        +'<span style="font-size:14px;font-weight:800;margin-left:8px">'+won(totalEval)+'</span>'
        +(ovDiff!=null?'<span style="font-size:12px;font-weight:700;color:'+(ovDiff>=0?'#ef4444':'#3b82f6')+';margin-left:6px">'+(ovDiff>=0?'+':'')+won(ovDiff)+'</span>':"")
        +(ovDiffPct!=null?'<span style="font-size:11px;font-weight:700;color:'+(ovDiffPct>=0?'#ef4444':'#3b82f6')+';margin-left:4px">('+fPct(ovDiffPct)+')</span>':"")
        +'</div></div>'
      : "")
    +'</div>';
}

// ─── 계좌 섹션 ───────────────────────────────────────────────

  const profit = accProfit(acc);   // 계좌 수익금

    +(gp!=null?'<div style="font-size:12px;font-weight:700;color:'+(gp>=0?'#ef4444':'#3b82f6')+'">'+fPct(gp)+'</div>':"")
    +'</div>';

  const accEdit = editMode
    ? '<div style="display:flex;gap:6px;margin-bottom:12px;align-items:center">'
      +'<input class="inp inp-l" style="flex:1;font-size:13px;font-weight:600" data-acc-name="'+acc.id+'" value="'+acc.name+'"/>'

    rows=sorted.map(item=>editMode
      ?'<tr><td><input class="inp inp-l" data-f="n" data-id="'+item.id+'" data-acc="'+acc.id+'" value="'+item.n+'"/></td>'
        +'<td class="r"><input class="inp inp-r" type="number" data-f="a" data-id="'+item.id+'" data-acc="'+acc.id+'" value="'+(item.a||"")+'"/></td>'

    ).join("");

    rows=sorted.map(item=>{
      const priceKrw=itemPriceKrw(item,type), val=itemVal(item,type), gp=itemGp(item,type);
      const cost=itemCost(item,type);
      const profit=(val&&cost)?val-cost:null;
      const priceStr=isUS
        ?(showUSD?(px[item.t]?usd(px[item.t]):(loading?'<span class="cell-loading">···</span>':'<span class="price-na">—</span>'))
                :(priceKrw?won(priceKrw):(loading?'<span class="cell-loading">···</span>':'<span class="price-na">—</span>')))
        :(priceKrw?won(priceKrw):(loading?'<span class="cell-loading">···</span>':'<span class="price-na">—</span>'));
      if (editMode) return '<tr data-id="'+item.id+'" data-acc="'+acc.id+'" data-usd="'+isUS+'">'

        +'<td class="r">'+item.q+'</td>'

        +'<td class="r" style="font-weight:600">'+(isUS?(val&&usdKrw?usd(val/usdKrw):"—"):(val?won(val):"₩0"))+'</td>'
        +'<td class="r '+gCls(profit)+'" style="font-weight:600">'+(isUS?(profit&&usdKrw?((profit>=0?"+":"")+"$"+Math.abs(profit/usdKrw).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})):"—"):fProfit(profit))+'</td>'
        +'<td class="r '+gCls(gp)+'" style="font-weight:700">'+fPct(gp)+'</td></tr>';

      +'<th class="r">평가금액</th><th class="r">수익금</th><th class="r">수익률</th>'+(editMode?'<th></th>':'')+'</tr></thead>';

  if (!acc.deposits) acc.deposits=[];
  const valItems=sorted.filter(x=>isCash?Number(x.a)>0:x.q>0&&itemValBest(x,type)>0).map(x=>({l:isCash?x.n:(x.n||x.t),v:itemValBest(x,type)}));
  const secItems=sectorMapToItems(calcSectorMap([acc]));

  return '<div class="card" style="border-top:3px solid '+acc.color+'">'
    +'<div class="card-hdr"><span class="card-title">'+acc.name+'</span><div style="display:flex;align-items:center;gap:8px">'+buyBtn+hdrRight+'</div></div>'

    +(editMode?'<button class="add-btn" data-add-item="'+acc.id+'">+ 종목 추가</button>':"")
    +(acc.type!=="cash" ? buildDepositSection(acc.deposits, acc.id) : "")

    +buildDonutCard(secItems,acc.name+" 섹터")
    +'</div>';
}

// ─── 목표 추적 ───────────────────────────────────────────────
function buildGoals(tot) {
  const now=new Date(), curYear=now.getFullYear(), goals=ST.goals||[];
  if (!goals.length&&!editMode) return "";
  goals.forEach(g=>{ if(curYear>g.year&&g.snapshot===null){g.snapshot=tot;saveData();} });
  const rows=goals.map((g,i)=>{
    const isExpired=curYear>g.year, isCurrent=!isExpired&&(i===0||curYear>goals[i-1].year);
    const isAchieved=tot>=g.target||(isExpired&&(g.snapshot||0)>=g.target);
    const val=isExpired?(g.snapshot||0):tot, pct=Math.min(100,Math.round(val/g.target*100));
    const isFuture=!isExpired&&!isCurrent;
    let icon,col,bar;
    if(isAchieved){icon="✅";col="#10b981";bar="#10b981";}
    else if(isExpired){icon="⚠️";col="#f59e0b";bar="#f59e0b";}
    else if(isCurrent){icon="🎯";col="#6366f1";bar="#6366f1";}
    else{icon="";col="#475569";bar="#334155";}
    const ts=g.target>=1e8?(g.target/1e8).toFixed(g.target%1e8===0?0:1)+"억":(g.target/1e4).toFixed(0)+"만";
    if(isFuture) return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;opacity:0.4"><span style="font-size:11px;color:#475569;width:36px">'+g.year+'</span><span style="font-size:12px;color:#475569;width:52px">'+ts+'</span><div style="flex:1;height:4px;background:#1e293b;border-radius:2px"></div></div>';
    return '<div style="margin-bottom:12px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><span>'+icon+'</span><span style="font-size:12px;color:#94a3b8;width:36px">'+g.year+'</span><span style="font-size:12px;font-weight:600;flex:1">'+ts+'</span><span style="font-size:12px;font-weight:700;color:'+col+'">'+pct+'%</span>'+(isExpired&&!isAchieved?'<span style="font-size:10px;color:#f59e0b">기간종료</span>':"")+'</div>'
      +'<div style="height:6px;background:#1e293b;border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+bar+';border-radius:3px;transition:width 0.5s"></div></div>'
      +(isCurrent||isExpired?'<div style="font-size:10px;color:#475569;margin-top:3px;text-align:right">'+(isExpired?'종료시 ':'현재 ')+won(val)+(isExpired&&!isAchieved?' · '+won(g.target-(g.snapshot||0))+" 미달":'')+'</div>':"")
      +'</div>';
  }).join("");
  const editRows=editMode?goals.map(g=>'<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center"><input class="inp inp-r" type="number" style="width:60px" data-gf="year" data-gid="'+g.id+'" value="'+g.year+'"/><input class="inp inp-r" type="number" style="flex:1" data-gf="target" data-gid="'+g.id+'" value="'+g.target+'"/><button class="del-btn" data-gdel="'+g.id+'">✕</button></div>').join("")+'<button class="add-btn" id="btn-add-goal">+ 목표 추가</button>':"";
  return '<div class="card" style="border-top:3px solid #6366f1;margin-bottom:12px"><div class="card-hdr"><span class="card-title">📈 목표 달성 현황</span></div>'+(editMode?editRows:rows)+'</div>';
}

// ─── 전체 현황 ───────────────────────────────────────────────
function buildOverview() {
  const tot=grandTotal(), profit=grandProfit(), gp=grandGp();
  const pp=v=>tot>0?(v/tot*100).toFixed(1):"0.0";
  const segs=ST.accounts.map(a=>({l:a.name,v:accTotal(a),c:a.color})).filter(s=>s.v>0);
  const paths=buildDonutSVG(segs,tot,80,80,65,38,true);
  const legend=segs.map(s=>'<div class="legend-item" data-label="'+s.l+'" style="display:flex;justify-content:space-between;margin-bottom:7px;align-items:center;transition:opacity 0.2s"><div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:2px;background:'+s.c+'"></div><span style="font-size:12px">'+s.l+'</span></div><div><span style="font-size:11px;font-weight:700;color:#94a3b8;margin-right:4px">'+pp(s.v)+'%</span><span style="font-size:12px;font-weight:600">'+won(s.v)+'</span></div></div>').join("");
  const secItems=sectorMapToItems(calcSectorMap(ST.accounts));
  // 종목별 비중 헬퍼
  function buildTickerItems(filterFn, colorFn) {
    const map={};
    for (const acc of ST.accounts) {
      if (!filterFn(acc)) continue;
      for (const item of acc.items) {
        if (!item.q) continue;
        const v=itemValBest(item,acc.type); if(!v) continue;
        const key=item.t||"?";
        if (!map[key]) map[key]={v:0, label:item.n||item.t||key};
        map[key].v+=v;
      }
    }
    return Object.entries(map)
      .sort((a,b)=>b[1].v-a[1].v)
      .filter(([,x])=>x.v>0)
      .map(([t,x],i)=>({l:x.label, t, v:x.v, c:colorFn?colorFn(t,i):COLORS[i%COLORS.length]}));
  }
  const usItems  = buildTickerItems(a=>a.type==="us",  (l,i)=>SECTOR_COLORS[getSector(l,"us")]  ||COLORS[i%COLORS.length]);
  const krxItems = buildTickerItems(a=>a.type==="krx", (l,i)=>SECTOR_COLORS[getSector(l,"krx")] ||COLORS[i%COLORS.length]);
  const allItems = buildTickerItems(a=>a.type!=="cash", (l,i)=>COLORS[i%COLORS.length]);

  return buildGoals(tot)
    +'<div class="card-grad">'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:6px">총 평가 자산</div>'
    +'<div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">'
    +'<div style="font-size:32px;font-weight:800;letter-spacing:-1px">'+(tot?won(tot):"₩0")+'</div>'
    +(gp!=null?'<div style="font-size:16px;font-weight:700;color:'+(gp>=0?'#ef4444':'#3b82f6')+'">'+fPct(gp)+'</div>':"")
    +'</div>'
    +(profit!=null?'<div style="font-size:13px;font-weight:600;color:'+(profit>=0?'#ef4444':'#3b82f6')+';margin-top:4px">'+fProfit(profit)+'</div>':"")
    +'<div style="margin-top:8px;display:flex;gap:14px;flex-wrap:wrap">'+segs.map(s=>'<span style="font-size:11px;color:#64748b">'+s.l+' <b style="color:#94a3b8">'+pp(s.v)+'%</b></span>').join("")+'</div></div>'
    +buildOverviewDepositSection()
    +buildDonutCard(secItems,"섹터 비중")
    +'<div class="card"><div class="card-title" style="margin-bottom:12px">계좌별 비중</div>'
    +(segs.length
      ?'<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap"><svg id="overview-donut" width="160" height="160" viewBox="0 0 160 160" style="flex-shrink:0">'+paths+'<text x="80" y="75" text-anchor="middle" fill="#94a3b8" font-size="9" class="donut-ct">탭하여</text><text x="80" y="88" text-anchor="middle" fill="#94a3b8" font-size="9" class="donut-cb">확인</text></svg><div style="flex:1;min-width:140px">'+legend+'</div></div>'
      :'<div style="color:#475569;text-align:center;padding:16px;font-size:12px">자산을 입력해주세요</div>')
    +(allItems.length >= 2 ? buildDonutCard(allItems, '📦 전체 종목별 비중') : '');
}

function clearOverlayLine(svg) {
  svg?.parentElement?.querySelector(".donut-popup")?.remove();
  const legend=svg?.parentElement?.querySelector(".donut-legend");
  if (legend) legend.style.visibility="";
  if (svg?.parentElement) svg.parentElement.style.position="";
}
function showDonutPopup(seg, svg) {
  clearOverlayLine(svg);
  const flex=svg?.parentElement, legend=flex?.querySelector(".donut-legend");
  if (!flex||!legend) return;
  legend.style.visibility="hidden"; flex.style.position="relative";
  const popup=document.createElement("div");
  popup.className="donut-popup";
  popup.style.cssText="position:absolute;background:#0f172a;border:1px solid #6366f1;border-radius:10px;padding:12px 14px;box-shadow:0 0 12px rgba(99,102,241,0.3);pointer-events:none";
  popup.innerHTML='<div style="font-size:11px;color:#94a3b8;margin-bottom:4px">'+seg.dataset.label+'</div><div style="font-size:16px;font-weight:800">'+won(Number(seg.dataset.val))+'</div><div style="font-size:14px;font-weight:700;color:#6366f1;margin-top:3px">'+seg.dataset.pct+'%</div>';
  flex.style.position="relative";
  const lr=legend.getBoundingClientRect(), fr=flex.getBoundingClientRect();
  popup.style.top=(lr.top-fr.top)+"px"; popup.style.left=(lr.left-fr.left)+"px"; popup.style.width=lr.width+"px";
  flex.appendChild(popup);
  clearTimeout(window._popTimer);
  window._popTimer=setTimeout(()=>{ clearOverlayLine(svg); svg?.querySelectorAll(".donut-seg").forEach(s=>{s.style.opacity="1";delete s.dataset.active;}); const ct=svg?.querySelector(".donut-ct");if(ct)ct.textContent="탭하여"; const cb=svg?.querySelector(".donut-cb");if(cb)cb.textContent="확인"; },3000);
}
function showSectorPopup(seg, svg) {
  clearOverlayLine(svg);
  const sectorName=seg.dataset.label;
  const accs=tab==="overview"?ST.accounts:ST.accounts.filter(a=>a.id===tab);
  const items=[];
  for (const acc of accs) {
    if (acc.type==="cash") continue;
    for (const item of acc.items) {
      if (!item.q||getSector(item.t,acc.type)!==sectorName) continue;
      const v=itemValBest(item,acc.type); if(v>0) items.push({t:item.t,v});
    }
  }
  items.sort((a,b)=>b.v-a.v);
  const sectorTotal=items.reduce((s,x)=>s+x.v,0);
  const flex=svg?.parentElement, legend=flex?.querySelector(".donut-legend");
  if (!flex||!legend) return;
  legend.style.visibility="hidden"; flex.style.position="relative";
  const popup=document.createElement("div");
  popup.className="donut-popup";
  popup.style.cssText="position:absolute;background:#0f172a;border:1px solid #6366f1;border-radius:10px;padding:10px 12px;box-shadow:0 0 12px rgba(99,102,241,0.3);pointer-events:none;overflow-y:auto;max-height:160px";
  popup.innerHTML='<div style="font-size:11px;font-weight:700;color:#6366f1;margin-bottom:8px">'+sectorName+'</div>'
    +items.map(item=>'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;gap:8px"><span style="font-size:12px;font-weight:600;flex-shrink:0">'+item.t+'</span><span style="font-size:10px;color:#94a3b8;flex-shrink:0">'+(sectorTotal?(item.v/sectorTotal*100).toFixed(1):"0.0")+'%</span><span style="font-size:11px;font-weight:600">'+won(item.v)+'</span></div>').join("")
    +(items.length===0?'<div style="font-size:11px;color:#475569">종목 없음</div>':"");
  const lr=legend.getBoundingClientRect(), fr=flex.getBoundingClientRect();
  popup.style.top=(lr.top-fr.top)+"px"; popup.style.left=(lr.left-fr.left)+"px"; popup.style.width=lr.width+"px";
  flex.appendChild(popup);
  clearTimeout(window._popTimer);
  window._popTimer=setTimeout(()=>{ clearOverlayLine(svg); svg?.querySelectorAll(".donut-seg").forEach(s=>{s.style.opacity="1";delete s.dataset.active;}); const ct=svg?.querySelector(".donut-ct");if(ct)ct.textContent="탭하여"; const cb=svg?.querySelector(".donut-cb");if(cb)cb.textContent="확인"; },4000);
}


// ─── 입금/출금 모달 이벤트 ───────────────────────────────────
function bindDepositModalEvents() {
  if (!depositModal) return;
  const {accId, mode} = depositModal;
  const acc  = ST.accounts.find(a=>a.id===accId);
  if (!acc) return;
  const isUS = acc.type === "us";
  const $ = id => document.getElementById(id);

  // 닫기
  $("dm-close")?.addEventListener("click",()=>{ depositModal=null; render(); });
  $("deposit-modal-bg")?.addEventListener("click",e=>{ if(e.target.id==="deposit-modal-bg"){depositModal=null;render();} });

  // 탭 전환
  $("dm-in-tab")?.addEventListener("click",()=>{ depositModal.mode="in"; render(); setTimeout(()=>bindDepositModalEvents(),50); });
  $("dm-out-tab")?.addEventListener("click",()=>{ depositModal.mode="out"; render(); setTimeout(()=>bindDepositModalEvents(),50); });

  // USD 환전 계산 미리보기
  if (isUS) {
    const updateUsdPreview = () => {
      const krw  = parseFloat($("dm-krw")?.value) || 0;
      const rate = parseFloat($("dm-rate")?.value) || 0;
      const res  = $("dm-result"), usdEl = $("dm-usd-result");
      if (krw > 0 && rate > 0 && res && usdEl) {
        res.style.display = "block";
        usdEl.textContent = usd(krw / rate);
      } else if (res) { res.style.display = "none"; }
    };
    $("dm-krw")?.addEventListener("input", updateUsdPreview);
    $("dm-rate")?.addEventListener("input", updateUsdPreview);
  }

  // 확정
  $("dm-confirm")?.addEventListener("click", ()=>{
    const isIn  = depositModal.mode === "in";
    const krw   = parseFloat($("dm-krw")?.value) || 0;
    const rate  = isUS ? (parseFloat($("dm-rate")?.value) || usdKrw || 1350) : 1;
    const date  = $("dm-date")?.value || new Date().toISOString().slice(0,10);
    const memo  = $("dm-memo")?.value || "";

    if (!krw || krw <= 0) { alert("금액을 입력해주세요"); return; }

    const amount = isUS ? krw / rate : krw; // USD 또는 KRW

    if (!acc.deposits) acc.deposits = [];

    if (isIn) {
      acc.cash = (acc.cash || 0) + amount;
      // 순입금에 KRW 기준으로 추가
      acc.deposits.push({ id:"d"+Date.now(), year:new Date(date).getFullYear(), amount: krw, memo, type:"cash-in", date });
    } else {
      if (amount > (acc.cash||0)) { alert("예수금보다 많이 출금할 수 없어요"); return; }
      acc.cash = (acc.cash || 0) - amount;
      // 출금은 순입금에서 차감
      acc.deposits.push({ id:"d"+Date.now(), year:new Date(date).getFullYear(), amount: -krw, memo, type:"cash-out", date });
    }

    saveData();
    depositModal = null;
    render();
  });
}

// ─── 트레이드 모달 이벤트 ───────────────────────────────────
function bindTradeModalEvents() {
  if (!tradeModal) return;
  const {accId, itemId} = tradeModal;
  const acc   = ST.accounts.find(a=>a.id===accId);
  const isNew = itemId === "__new__";
  const isUS  = acc?.type === "us";
  const isCoin= acc?.type === "coin";

  const $  = id => document.getElementById(id);
  const qEl = $("tm-qty"), pEl = $("tm-price"), resEl = $("tm-result");

  // 닫기
  $("tm-close")?.addEventListener("click",()=>{ tradeModal=null; render(); });
  $("trade-modal-bg")?.addEventListener("click",e=>{ if(e.target.id==="trade-modal-bg"){tradeModal=null;render();} });

  // 매수/매도 탭 전환
  $("tm-buy-tab")?.addEventListener("click",()=>{ tradeModal.mode="buy"; render(); setTimeout(()=>bindTradeModalEvents(),50); });
  $("tm-sell-tab")?.addEventListener("click",()=>{ tradeModal.mode="sell"; render(); setTimeout(()=>bindTradeModalEvents(),50); });

  // 티커 자동완성 (신규 매수)
  if (isNew) {
    let nameTimer;
    $("tm-ticker")?.addEventListener("input", e=>{
      const t = e.target.value.toUpperCase();
      e.target.value = t;
      clearTimeout(nameTimer);
      if (!t) return;
      // KRX DB 먼저
      const krxName = KRX_DB[t];
      if (krxName) { const el=$("tm-name-preview"); if(el) el.textContent="✓ "+krxName; return; }
      const usName = US_DB[t];
      if (usName) { const el=$("tm-name-preview"); if(el) el.textContent="✓ "+usName; return; }
      // Yahoo에서 이름 조회
      nameTimer = setTimeout(async()=>{
        try {
          const r = await fetch(WORKER+"?type=us&symbols="+t);
          const d = await r.json();
          // names는 별도 요청 필요 — 가격만 확인해서 존재 여부 파악
          const el=$("tm-name-preview");
          if(el) el.textContent = d.prices?.[t] ? "✓ 종목 확인됨" : "⚠ 종목을 찾을 수 없어요";
        } catch {}
      }, 600);
    });
  }

  // 수량/단가 입력 시 예상 결과 계산
  function updateResult() {
    const qty   = parseFloat(qEl?.value) || 0;
    const price = parseFloat(pEl?.value) || 0;
    if (!qty || !price || !resEl) { resEl.style.display="none"; return; }

    const item  = isNew ? null : acc?.items.find(x=>x.id===itemId);
    const isBuy = tradeModal.mode === "buy";

    resEl.style.display = "block";

    if (isBuy) {
      const curQty   = item?.q  || 0;
      const curAvg   = item?.a  || 0;
      const newQty   = curQty + qty;
      const newAvg   = curQty > 0 ? (curQty*curAvg + qty*price) / newQty : price;
      const total    = qty * price;
      resEl.innerHTML =
        '<div class="trade-result-row"><span style="color:#64748b">매수 금액</span><span style="font-weight:700">'+(isUS?usd(total):won(total))+'</span></div>'
        +(item?'<div class="trade-result-row"><span style="color:#64748b">변경 후 수량</span><span style="font-weight:700">'+newQty+(isCoin?"":"주")+'</span></div>'
             +'<div class="trade-result-row"><span style="color:#64748b">변경 후 평단</span><span style="font-weight:700">'+(isUS?usd(newAvg):won(newAvg))+'</span></div>':"");
    } else {
      const item  = acc?.items.find(x=>x.id===itemId);
      const avg   = item?.a || 0;
      const pnl   = (price - avg) * qty;
      const pnlPct= avg > 0 ? ((price-avg)/avg)*100 : 0;
      resEl.innerHTML =
        '<div class="trade-result-row"><span style="color:#64748b">매도 금액</span><span style="font-weight:700">'+(isUS?usd(qty*price):won(qty*price))+'</span></div>'
        +'<div class="trade-result-row"><span style="color:#64748b">실현 손익</span><span style="font-weight:700;color:'+(pnl>=0?"#ef4444":"#3b82f6")+'">'+(pnl>=0?"+":"")+(isUS?usd(pnl):won(pnl))+" ("+fPct(pnlPct)+")"+'</span></div>'
        +'<div class="trade-result-row"><span style="color:#64748b">변경 후 수량</span><span style="font-weight:700">'+((item?.q||0)-qty)+(isCoin?"":"주")+'</span></div>';
    }
  }
  qEl?.addEventListener("input", updateResult);
  pEl?.addEventListener("input", updateResult);

  // 확정 버튼
  $("tm-confirm")?.addEventListener("click", ()=>{
    const qty   = parseFloat(qEl?.value) || 0;
    const price = parseFloat(pEl?.value) || 0;
    const date  = $("tm-date")?.value || new Date().toISOString().slice(0,10);
    const memo  = $("tm-memo")?.value || "";
    const isBuy = tradeModal.mode === "buy";

    if (!qty || qty <= 0) { alert("수량을 입력해주세요"); return; }
    if (!price || price <= 0) { alert("단가를 입력해주세요"); return; }

    if (isNew) {
      const ticker = $("tm-ticker")?.value.toUpperCase().trim();
      if (!ticker) { alert("티커를 입력해주세요"); return; }
      // 이미 있는 종목인지 확인
      let item = acc.items.find(x=>x.t===ticker);
      if (!item) {
        item = {id:"i"+Date.now(), t:ticker, n:US_DB[ticker]||KRX_DB[ticker]||"", q:0, a:0, trades:[]};
        acc.items.push(item);
      }
      if (!item.trades) item.trades=[];
      item.trades.push({id:"tr"+Date.now(), type:"buy", date, qty, price, memo});
      // 가중평균 재계산
      const buyTrades = item.trades.filter(t=>t.type==="buy");
      const totalQty  = buyTrades.reduce((s,t)=>s+t.qty,0) - item.trades.filter(t=>t.type==="sell").reduce((s,t)=>s+t.qty,0);
      const totalCost = buyTrades.reduce((s,t)=>s+t.qty*t.price,0);
      item.q = totalQty;
      item.a = totalQty > 0 ? totalCost / buyTrades.reduce((s,t)=>s+t.qty,0) : 0;
      // 예수금 차감
      acc.cash = Math.max(0, (acc.cash||0) - qty*price);
    } else {
      const item = acc.items.find(x=>x.id===itemId);
      if (!item) return;
      if (!item.trades) item.trades=[];

      if (isBuy) {
        item.trades.push({id:"tr"+Date.now(), type:"buy", date, qty, price, memo});
        // 가중평균 재계산
        const buyTrades = item.trades.filter(t=>t.type==="buy");
        const totalBuyQty = buyTrades.reduce((s,t)=>s+t.qty,0);
        const totalCost   = buyTrades.reduce((s,t)=>s+t.qty*t.price,0);
        const soldQty     = item.trades.filter(t=>t.type==="sell").reduce((s,t)=>s+t.qty,0);
        item.q = totalBuyQty - soldQty;
        item.a = totalCost / totalBuyQty;
        // 예수금 차감
        acc.cash = Math.max(0, (acc.cash||0) - qty*price);
      } else {
        if (qty > item.q) { alert("보유 수량보다 많이 매도할 수 없어요"); return; }
        const pnl = (price - item.a) * qty;
        item.trades.push({id:"tr"+Date.now(), type:"sell", date, qty, price, memo, pnl});
        item.q -= qty;
        // 예수금 증가
        acc.cash = (acc.cash||0) + qty*price;
        if (item.q <= 0.00001) {
          if (confirm("보유 수량이 0이 됐어요. 종목을 삭제할까요?")) {
            const idx = acc.items.findIndex(x=>x.id===itemId);
            if (idx>-1) acc.items.splice(idx,1);
          } else { item.q = 0; }
        }
      }
    }

    saveData();
    tradeModal = null;
    render();
    fetchAll();
  });
}

  document.querySelectorAll("[data-profile]").forEach(b=>b.addEventListener("click",()=>switchProfile(b.dataset.profile)));
  $("btn-add-profile")?.addEventListener("click",()=>{ const name=prompt("새 프로필 이름:"); if(!name?.trim()) return; const list=getProfiles(); if(list.includes(name.trim())){alert("이미 있는 이름이에요");return;} list.push(name.trim()); saveProfiles(list); switchProfile(name.trim()); });
  document.querySelectorAll("[data-profile-rename]").forEach(inp=>inp.addEventListener("change",e=>{ const oldName=inp.dataset.profileRename, newName=e.target.value.trim(); if(!newName||newName===oldName) return; const list=getProfiles(); if(list.includes(newName)){alert("이미 있는 이름이에요");e.target.value=oldName;return;} const data=localStorage.getItem(profileKey(oldName)); if(data){localStorage.setItem(profileKey(newName),data);localStorage.removeItem(profileKey(oldName));} list[list.indexOf(oldName)]=newName; saveProfiles(list); if(curProfile===oldName){curProfile=newName;localStorage.setItem(PROFILE_CUR_KEY,newName);} render(); }));
  document.querySelectorAll("[data-profile-del]").forEach(b=>b.addEventListener("click",e=>{ e.stopPropagation(); const name=b.dataset.profileDel, list=getProfiles(); if(list.length<=1){alert("마지막 프로필은 삭제할 수 없어요");return;} if(confirm("'"+name+"' 프로필을 삭제할까요? (저장된 데이터도 삭제됩니다)")) deleteProfile(name); }));

  // 모달
  document.querySelectorAll("[data-modal-type]").forEach(b=>b.addEventListener("click",()=>{modalType=b.dataset.modalType;render();}));
  document.querySelectorAll("[data-modal-color]").forEach(b=>b.addEventListener("click",()=>{modalColor=b.dataset.modalColor;render();}));
  $("modal-cancel")?.addEventListener("click",()=>{showModal=false;render();});
  $("modal-bg")?.addEventListener("click",e=>{if(e.target.id==="modal-bg"){showModal=false;render();}});
  $("modal-confirm")?.addEventListener("click",()=>{ const name=($("modal-name")?.value||"").trim()||ACCOUNT_TYPES[modalType].label; const id="a"+Date.now(); ST.accounts.push({id,name,type:modalType,color:modalColor,items:modalType==="cash"?[{id:"ca"+Date.now(),n:"현금",a:0}]:[]}); tab=id; showModal=false; render(); });

  // 탭
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{tab=b.dataset.tab;render();}));

  // 탭 드래그
  if (editMode) {
    let dragId=null;
    document.querySelectorAll("[data-drag]").forEach(b=>{ b.addEventListener("dragstart",e=>{dragId=b.dataset.drag;e.dataTransfer.effectAllowed="move";b.style.opacity="0.4";}); b.addEventListener("dragend",()=>b.style.opacity="1"); b.addEventListener("dragover",e=>e.preventDefault()); b.addEventListener("drop",e=>{ e.preventDefault(); const toId=b.dataset.drag; if(!dragId||!toId||dragId===toId||dragId==="overview"||toId==="overview") return; const fi=ST.accounts.findIndex(a=>a.id===dragId), ti=ST.accounts.findIndex(a=>a.id===toId); if(fi>-1&&ti>-1){const [a]=ST.accounts.splice(fi,1);ST.accounts.splice(ti,0,a);} saveData();render(); }); });
  }

  // 계좌 CRUD
  document.querySelectorAll("[data-acc-del]").forEach(b=>b.addEventListener("click",()=>{ if(!confirm("'"+ST.accounts.find(a=>a.id===b.dataset.accDel)?.name+"' 계좌를 삭제할까요?")) return; const i=ST.accounts.findIndex(a=>a.id===b.dataset.accDel); if(i>-1) ST.accounts.splice(i,1); tab="overview"; render(); }));
  document.querySelectorAll("[data-acc-name]").forEach(inp=>inp.addEventListener("input",e=>{ const acc=ST.accounts.find(a=>a.id===inp.dataset.accName); if(acc){acc.name=e.target.value;saveData();} }));
  document.querySelectorAll("[data-acc-color]").forEach(dot=>dot.addEventListener("click",()=>{ const acc=ST.accounts.find(a=>a.id===dot.dataset.accColor); if(acc){acc.color=dot.dataset.color;saveData();render();} }));

  // 종목 추가/삭제
  document.querySelectorAll("[data-add-item]").forEach(b=>b.addEventListener("click",()=>{ const acc=ST.accounts.find(a=>a.id===b.dataset.addItem); if(!acc) return; const id="i"+Date.now(); acc.items.push(acc.type==="cash"?{id,n:"새 항목",a:0}:{id,t:"",n:"",q:0,a:0}); render(); }));
  document.querySelectorAll("[data-del][data-acc]").forEach(b=>b.addEventListener("click",()=>{ const acc=ST.accounts.find(a=>a.id===b.dataset.acc); if(!acc) return; const i=acc.items.findIndex(x=>x.id===b.dataset.del); if(i>-1) acc.items.splice(i,1); render(); }));

  // 종목 인풋
  document.querySelectorAll(".inp[data-id][data-acc]").forEach(inp=>{ const id=inp.dataset.id, f=inp.dataset.f, accId=inp.dataset.acc; const acc=ST.accounts.find(a=>a.id===accId); const item=acc?.items.find(x=>x.id===id); if(!item||!acc) return; const tr=inp.closest("tr"), isUS=tr?.dataset.usd==="true"; inp.addEventListener("input",e=>{ const v=e.target.value; if(f==="t"){const upper=v.toUpperCase();item.t=upper;e.target.value=upper;const db=isUS?US_DB:acc.type==="coin"?null:KRX_DB;const auto=db?.[upper];if(auto){item.n=auto;const ni=tr?.querySelector('[data-f="n"]');if(ni)ni.value=auto;}}else if(f==="n"){item.n=v;}else{item[f]=Number(v)||0;if(acc.type!=="cash"){const vc=tr?.querySelector("[data-calc='val']"),gc=tr?.querySelector("[data-calc='gp']"),pc=tr?.querySelector("[data-calc='profit']");if(vc)vc.textContent=won(itemVal(item,acc.type))||"₩0";const gp=itemGp(item,acc.type);if(gc){gc.textContent=fPct(gp);gc.className="r "+gCls(gp);}const profit=(itemVal(item,acc.type)&&itemCost(item,acc.type))?itemVal(item,acc.type)-itemCost(item,acc.type):null;if(pc){pc.textContent=fProfit(profit);pc.className="r "+gCls(profit);}}} saveData(); }); });

  // ─ 입금/출금 버튼
  document.querySelectorAll("[data-deposit-acc]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    depositModal={accId:b.dataset.depositAcc, mode:"in"};
    render();
    setTimeout(()=>bindDepositModalEvents(),50);
  }));

  // ─ 신규 매수 버튼
  document.querySelectorAll("[data-new-trade]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    tradeModal={accId:b.dataset.newTrade, itemId:"__new__", mode:"buy"};
    render();
    setTimeout(()=>bindTradeModalEvents(),50);
  }));

  // ─ 종목 행 탭 → 매수/매도 모달
  document.querySelectorAll("[data-trade-item]").forEach(tr=>tr.addEventListener("click",()=>{
    if(editMode) return;
    tradeModal={accId:tr.dataset.tradeAcc, itemId:tr.dataset.tradeItem, mode:"buy"};
    render();
    setTimeout(()=>bindTradeModalEvents(),50);
  }));

  // 순입금 CRUD
  document.querySelectorAll("[data-dadd]").forEach(b=>b.addEventListener("click",()=>{
    const accId=b.dataset.dadd;
    const acc=ST.accounts.find(a=>a.id===accId); if(!acc) return;
    if(!acc.deposits) acc.deposits=[];
    acc.deposits.push({id:"d"+Date.now(), year:new Date().getFullYear(), amount:0});
    saveData(); render();
  }));
  document.querySelectorAll("[data-ddel]").forEach(b=>b.addEventListener("click",()=>{
    const accId=b.dataset.dscope, did=b.dataset.ddel;
    const acc=ST.accounts.find(a=>a.id===accId); if(!acc) return;
    acc.deposits=(acc.deposits||[]).filter(d=>d.id!==did);
    saveData(); render();
  }));
  document.querySelectorAll(".inp[data-did][data-dscope]").forEach(inp=>inp.addEventListener("input",e=>{
    const accId=inp.dataset.dscope, did=inp.dataset.did, field=inp.dataset.df;
    const acc=ST.accounts.find(a=>a.id===accId); if(!acc) return;
    const dep=(acc.deposits||[]).find(d=>d.id===did); if(!dep) return;
    dep[field]=field==="year"?parseInt(e.target.value)||new Date().getFullYear():Number(e.target.value)||0;
    saveData();
  }));

  // 목표
  $("btn-add-goal")?.addEventListener("click",()=>{ST.goals.push({id:"g"+Date.now(),year:new Date().getFullYear()+1,target:100000000,snapshot:null});render();});
  document.querySelectorAll("[data-gdel]").forEach(b=>b.addEventListener("click",()=>{const i=ST.goals.findIndex(g=>g.id===b.dataset.gdel);if(i>-1)ST.goals.splice(i,1);render();}));
  document.querySelectorAll(".inp[data-gid]").forEach(inp=>inp.addEventListener("input",e=>{const g=ST.goals.find(x=>x.id===inp.dataset.gid);if(g){g[inp.dataset.gf]=Number(e.target.value)||0;saveData();}}));

  // 도넛 클릭
  document.querySelectorAll(".donut-seg").forEach(seg=>{ seg.addEventListener("click",()=>{ const svg=seg.closest("svg"), allSegs=svg?.querySelectorAll(".donut-seg")||[]; const isActive=seg.dataset.active==="1"; if(isActive){allSegs.forEach(s=>{s.style.opacity="1";delete s.dataset.active;});const ct=svg?.querySelector(".donut-ct");if(ct)ct.textContent="탭하여";const cb=svg?.querySelector(".donut-cb");if(cb)cb.textContent="확인";clearOverlayLine(svg);document.querySelectorAll(".legend-item").forEach(el=>el.style.opacity="1");return;} allSegs.forEach(s=>{s.style.opacity="0.25";delete s.dataset.active;});seg.style.opacity="1";seg.dataset.active="1";const ct=svg?.querySelector(".donut-ct");if(ct)ct.textContent=seg.dataset.label;const cb=svg?.querySelector(".donut-cb");if(cb)cb.textContent=seg.dataset.pct+"%"; if(svg?.id==="overview-donut"){document.querySelectorAll(".legend-item").forEach(el=>{el.style.opacity=el.dataset.label===seg.dataset.label?"1":"0.2";});}else if(svg?.dataset.sectorDonut==="1"){showSectorPopup(seg,svg);}else{document.querySelectorAll(".legend-item").forEach(el=>el.style.opacity="1");showDonutPopup(seg,svg);} }); });
}

// ─── 시작 ────────────────────────────────────────────────────
render();
fetchAll();
setInterval(fetchAll,60000);
</script>
</body>
</html>
