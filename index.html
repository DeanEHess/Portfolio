<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>자산 대시보드</title>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="자산현황"/>
  <meta name="theme-color" content="#0f172a"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#0f172a;color:#e2e8f0;font-family:'Apple SD Gothic Neo','Pretendard',sans-serif;min-height:100vh;}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
    input,button{outline:none;font-family:inherit;}
    ::-webkit-scrollbar{height:4px;}::-webkit-scrollbar-track{background:#0f172a;}::-webkit-scrollbar-thumb{background:#334155;border-radius:2px;}
    #app{max-width:600px;margin:0 auto;padding:16px 14px;}
    .hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
    .hdr-left{}
    .hdr-title{font-size:20px;font-weight:800;letter-spacing:-0.5px;}
    .hdr-sub{font-size:11px;color:#475569;margin-top:3px;}
    .hdr-rate{font-size:12px;color:#94a3b8;font-weight:600;margin-top:2px;}
    .hdr-btns{display:flex;gap:6px;}
    .btn{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:7px 13px;border-radius:8px;font-size:15px;cursor:pointer;}
    .btn.on{background:#6366f1;}
    .tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
    .tab{background:#1e293b;border:none;color:#64748b;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;}
    .tab.on{background:#6366f1;color:#fff;font-weight:700;}
    .card{background:#1e293b;border-radius:16px;padding:14px;margin-bottom:12px;border:1px solid #334155;}
    .card-grad{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid #1e293b;border-radius:16px;padding:18px 16px;margin-bottom:12px;}
    .card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .tbl-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    th{padding:5px 6px;color:#475569;font-weight:600;font-size:10px;border-bottom:1px solid #334155;white-space:nowrap;}
    tr{border-bottom:1px solid #0f172a;}
    td{padding:8px 6px;vertical-align:middle;}
    .r{text-align:right;}
    .inp{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:4px 6px;font-size:11px;width:100%;}
    .inp-big{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:8px 12px;font-size:13px;width:100%;text-align:right;}
    .add-btn{margin-top:8px;background:transparent;border:1px dashed #334155;color:#475569;padding:6px 12px;border-radius:8px;font-size:12px;width:100%;cursor:pointer;}
    .up{color:#ef4444;font-weight:700;}
    .dn{color:#3b82f6;font-weight:700;}
    .na{color:#94a3b8;}
    .dim{color:#475569;font-size:10px;}
    .loading{color:#475569;animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
  </style>
</head>
<body><div id="app"></div>
<script>
// ═══════════════════════════════════════════
// DB
// ═══════════════════════════════════════════
const US_DB={NVO:"Novo Nordisk",TQQQ:"ProShares UltraPro QQQ",JEPQ:"JPMorgan Nasdaq Eq Premium",QLD:"ProShares Ultra QQQ",SGOV:"iShares 0-3M Treasury",QQQ:"Invesco QQQ",SPY:"SPDR S&P500",VOO:"Vanguard S&P500",NVDA:"NVIDIA",AAPL:"Apple",MSFT:"Microsoft",GOOGL:"Alphabet",AMZN:"Amazon",META:"Meta",TSLA:"Tesla",SOXL:"Direxion Semi Bull 3X",UPRO:"ProShares UltraPro S&P500",TLT:"iShares 20Y Treasury",GLD:"SPDR Gold",PLTR:"Palantir",AMD:"AMD"};
const KRX_STOCK_DB={"005930":"삼성전자","000660":"SK하이닉스","035420":"NAVER","035720":"카카오","000270":"기아","005380":"현대차","051910":"LG화학","006400":"삼성SDI","207940":"삼성바이오로직스","068270":"셀트리온","105560":"KB금융","055550":"신한지주","086790":"하나금융지주","316140":"우리금융지주","032830":"삼성생명","011200":"HMM","003550":"LG","066570":"LG전자","017670":"SK텔레콤","030200":"KT"};
const KRX_DB={"381170":"TIGER 미국테크TOP10 INDXX","360750":"TIGER 미국S&P500","381180":"TIGER 미국필라델피아반도체","411060":"ACE KRX금현물","367380":"ACE 미국나스닥100","360200":"ACE 미국S&P500","473540":"ACE 미국S&P500채권혼합50액티브","069500":"KODEX 200","133690":"TIGER 미국나스닥100","379800":"KODEX 미국S&P500"};

// ═══════════════════════════════════════════
// 기본값 / 저장
// ═══════════════════════════════════════════
const SK="asset_v5";
const DFLT={
  us:[{id:"us1",t:"NVO",n:"Novo Nordisk",q:0,a:0},{id:"us2",t:"TQQQ",n:"ProShares UltraPro QQQ",q:0,a:0},{id:"us3",t:"JEPQ",n:"JPMorgan Nasdaq Eq Premium",q:0,a:0},{id:"us4",t:"QLD",n:"ProShares Ultra QQQ",q:0,a:0}],
  pen:[{id:"p1",t:"381170",n:"TIGER 미국테크TOP10 INDXX",q:68,a:0},{id:"p2",t:"360750",n:"TIGER 미국S&P500",q:73,a:0},{id:"p3",t:"381180",n:"TIGER 미국필라델피아반도체",q:29,a:0},{id:"p4",t:"411060",n:"ACE KRX금현물",q:14,a:0}],
  irp:[{id:"i1",t:"367380",n:"ACE 미국나스닥100",q:0,a:0},{id:"i2",t:"411060",n:"ACE KRX금현물",q:0,a:0},{id:"i3",t:"360200",n:"ACE 미국S&P500",q:0,a:0},{id:"i4",t:"473540",n:"ACE 미국S&P500채권혼합50액티브",q:0,a:0}],
  coins:[{id:"c1",t:"ETH",n:"이더리움",q:0,a:0}],
  krx:[],
  cashItems:[{id:"ca1",n:"현금",a:0}],
  eth:{q:0,a:0},cash:0
};
function ld(){
  try{
    const r=localStorage.getItem(SK);
    if(!r)return JSON.parse(JSON.stringify(DFLT));
    const d=JSON.parse(r);
    // 구버전 호환: coins/krx 없으면 기본값
    if(!d.coins){
      d.coins=d.eth?[{id:"c1",t:"ETH",n:"이더리움",q:d.eth.q||0,a:d.eth.a||0}]:[{id:"c1",t:"ETH",n:"이더리움",q:0,a:0}];
    }
    if(!d.krx) d.krx=[];
    if(!d.cashItems) d.cashItems=d.cash?[{id:"ca1",n:"현금",a:d.cash||0}]:[{id:"ca1",n:"현금",a:0}];
    return d;
  }catch{return JSON.parse(JSON.stringify(DFLT));}
}
function sv(){try{localStorage.setItem(SK,JSON.stringify(ST));}catch{}}

// ═══════════════════════════════════════════
// 상태
// ═══════════════════════════════════════════
const ST=ld();
let usdKrw=null;       // 환율
let px={};             // 현재가: 미국=USD, KRX=KRW, ETH=KRW
let loading=false;
let lastUp=null;
let editMode=false;
let tab="overview";

// ═══════════════════════════════════════════
// 포맷 헬퍼
// ═══════════════════════════════════════════
const won=(n)=>n!=null&&n!==0?"₩"+Math.round(n).toLocaleString("ko-KR"):"—";
const usd=(n)=>n?"$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";
const pct=(n)=>n==null?"—":(n>=0?"+":"")+n.toFixed(2)+"%";
const cls=(n)=>n==null?"na":n>=0?"up":"dn";

// ═══════════════════════════════════════════
// 계산 - 명확한 규칙
// ═══════════════════════════════════════════
// 미국주식: 현재가(USD) × 수량 × 환율 = 원화 평가금액
// KRX/ETH: 현재가(KRW) × 수량 = 원화 평가금액
// 현재가 없으면: 평단 × 수량 × 환율(미국) 또는 평단 × 수량(KRX)
function usVal(item){
  const rate=usdKrw||0;
  const price=px[item.t]||0;  // USD
  if(price&&rate) return price*item.q*rate;
  if(item.a&&rate) return item.a*item.q*rate;
  return 0;
}
function krxVal(item){
  const price=px[item.t]||0;  // KRW
  if(price) return price*item.q;
  return item.a*item.q;
}
function usGp(item){
  const price=px[item.t];
  if(!price||!item.a||!item.q) return null;
  return ((price-item.a)/item.a)*100;
}
function krxGp(item){
  const price=px[item.t];
  if(!price||!item.a||!item.q) return null;
  return ((price-item.a)/item.a)*100;
}
function usKrwPrice(item){
  const p=px[item.t];
  return (p&&usdKrw)?p*usdKrw:null;
}

// ═══════════════════════════════════════════
// API fetch
// ═══════════════════════════════════════════
async function fetchAll(){
  if(loading)return;
  loading=true; renderHeader();

  // 환율
  try{
    const d=await fetch("https://api.exchangerate-api.com/v4/latest/USD").then(r=>r.json());
    if(d.rates?.KRW) usdKrw=d.rates.KRW;
  }catch{}

  // 미국주식 - Yahoo Finance (여러 proxy 시도)
  for(const s of ST.us){
    if(!s.t)continue;
    const proxies=[
      `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${s.t}?interval=1d&range=1d`)}`,
      `https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${s.t}?interval=1d&range=1d`)}`,
    ];
    for(const url of proxies){
      try{
        const d=await fetch(url).then(r=>r.json());
        const p=d?.chart?.result?.[0]?.meta?.regularMarketPrice;
        if(p){px[s.t]=p;break;}
      }catch{}
    }
  }

  // KRX ETF - 네이버 모바일 API (종목별 JSON)
  const codes=[...new Set([...ST.pen.map(e=>e.t),...ST.irp.map(e=>e.t)].filter(Boolean))];
  await Promise.all(codes.map(async code=>{
    // 방법1: 네이버 모바일 stock API
    try{
      const url=`https://m.stock.naver.com/api/stock/${code}/basic`;
      const proxy=`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
      const d=await fetch(proxy).then(r=>r.json());
      const price=Number((d?.closePrice||d?.currentPrice||"").toString().replace(/,/g,""));
      if(price>100){px[code]=price;return;}
    }catch{}
    // 방법2: 네이버 금융 fchart API
    try{
      const url=`https://fchart.stock.naver.com/sise.nhn?symbol=${code}&timeframe=day&count=1&requestType=0`;
      const proxy=`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
      const text=await fetch(proxy).then(r=>r.text());
      const m=text.match(/<item data="([^|]+)\|([^|]+)\|([^|]+)\|([^|]+)\|([^"]+)"/);
      if(m){const price=Number(m[5]);if(price>100){px[code]=price;return;}}
    }catch{}
    // 방법3: HTML 파싱 fallback
    try{
      const url=`https://finance.naver.com/item/sise.naver?code=${code}`;
      const proxy=`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
      const html=await fetch(proxy).then(r=>r.text());
      const pats=[/id="now_value">([0-9,]+)/,/"now">([0-9,]+)</,/class="tah p11"[^>]*>([0-9,]+)/];
      for(const p of pats){const m=html.match(p);if(m){const v=parseInt(m[1].replace(/,/g,""),10);if(v>100){px[code]=v;return;}}}
    }catch{}
  }));

  // 코인 - Upbit
  const coinTickers=[...new Set(ST.coins.map(x=>x.t).filter(Boolean))];
  if(coinTickers.length){
    try{
      const markets=coinTickers.map(t=>"KRW-"+t).join(",");
      const d=await fetch("https://api.upbit.com/v1/ticker?markets="+markets).then(r=>r.json());
      for(const item of d){const t=item.market.replace("KRW-","");if(item.trade_price)px[t]=item.trade_price;}
    }catch{}
  }
  // 한국 개별주식 - 네이버 모바일 API
  const krxStockCodes=[...new Set(ST.krx.map(x=>x.t).filter(Boolean))];
  await Promise.all(krxStockCodes.map(async code=>{
    if(px[code])return;
    try{
      const url="https://m.stock.naver.com/api/stock/"+code+"/basic";
      const d=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url)).then(r=>r.json());
      const price=Number((d?.closePrice||d?.currentPrice||"").toString().replace(/,/g,""));
      if(price>100)px[code]=price;
    }catch{}
  }));

  loading=false;lastUp=new Date();
  render();
}

// ═══════════════════════════════════════════
// 렌더
// ═══════════════════════════════════════════
function render(){
  document.getElementById("app").innerHTML=buildPage();
  bindAll();
  sv();
}
function renderHeader(){
  const el=document.getElementById("hdr-sub");
  const er=document.getElementById("hdr-rate");
  if(el)el.innerHTML=loading?`<span class="loading">⟳ 갱신 중...</span>`:(lastUp?`${lastUp.toLocaleTimeString("ko-KR")} 기준`:"—");
  if(er)er.textContent=usdKrw?`USD/KRW ₩${Math.round(usdKrw).toLocaleString()}`:"환율 로딩 중...";
}

function buildPage(){
  const usT=ST.us.reduce((s,x)=>s+usVal(x),0);
  const penT=ST.pen.reduce((s,x)=>s+krxVal(x),0);
  const irpT=ST.irp.reduce((s,x)=>s+krxVal(x),0);
  const coinsT=ST.coins.reduce((s,x)=>s+(px[x.t]?px[x.t]*x.q:x.a*x.q),0);
  const krxT=ST.krx.reduce((s,x)=>s+krxVal(x),0);
  const cashT=ST.cashItems.reduce((s,x)=>s+(x.a||0),0);
  const ethV=coinsT;
  const tot=usT+penT+irpT+coinsT+krxT+cashT;
  const pp=v=>tot>0?(v/tot*100).toFixed(1):"0.0";

  const rateStr=usdKrw?`USD/KRW ₩${Math.round(usdKrw).toLocaleString()}`:"환율 로딩 중...";
  const subStr=loading?`<span class="loading">⟳ 갱신 중...</span>`:(lastUp?`${lastUp.toLocaleTimeString("ko-KR")} 기준`:"—");

  return `
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-title">📊 자산 대시보드</div>
    <div class="hdr-sub" id="hdr-sub">${subStr}</div>
    <div class="hdr-rate" id="hdr-rate">${rateStr}</div>
  </div>
  <div class="hdr-btns">
    <button class="btn" id="btn-refresh">↻</button>
    <button class="btn ${editMode?"on":""}" id="btn-edit">${editMode?"✓":"✏"}</button>
  </div>
</div>
<div class="tabs">
  ${[["overview","전체"],["us","미국주식"],["krx","한국주식"],["pension","연금저축"],["irp","IRP"],["crypto","코인"],["cash","현금/예금"]]
    .map(([k,l])=>`<button class="tab ${tab===k?"on":""}" data-tab="${k}">${l}</button>`).join("")}
</div>
${tab==="overview"?buildOverview(tot,usT,penT,irpT,ethV,pp):""}
${tab==="us"?buildSection("미국 주식",ST.us,"us","#6366f1",usT):""}
${tab==="pension"?buildSection("연금저축펀드",ST.pen,"pen","#f59e0b",penT):""}
${tab==="irp"?buildSection("IRP",ST.irp,"irp","#10b981",irpT):""}
${tab==="krx"?buildSection("한국 주식",ST.krx,"krx","#f43f5e",krxT):""}
${tab==="crypto"?buildCrypto(coinsT):""}
${tab==="cash"?buildCashTab(cashT):""}
<div style="height:32px"></div>`;
}

function buildOverview(tot,usT,penT,irpT,ethV,pp){
  const segs=[{l:"미국주식",v:usT,c:"#6366f1"},{l:"한국주식",v:krxT,c:"#f43f5e"},{l:"연금저축",v:penT,c:"#f59e0b"},{l:"IRP",v:irpT,c:"#10b981"},{l:"코인",v:coinsT,c:"#3b82f6"},{l:"현금/예금",v:cashT,c:"#475569"}].filter(s=>s.v>0);
  const cx=80,cy=80,R=65,r=38;let ang=-Math.PI/2;
  const donutPaths=segs.length?segs.map(seg=>{
    const a=seg.v/tot*Math.PI*2,x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang);
    ang+=a;const x2=cx+R*Math.cos(ang),y2=cy+R*Math.sin(ang),xi1=cx+r*Math.cos(ang-a),yi1=cy+r*Math.sin(ang-a),xi2=cx+r*Math.cos(ang),yi2=cy+r*Math.sin(ang),lg=a>Math.PI?1:0;
    return`<path d="M${xi1},${yi1}L${x1},${y1}A${R},${R} 0 ${lg},1 ${x2},${y2}L${xi2},${yi2}A${r},${r} 0 ${lg},0 ${xi1},${yi1}Z" fill="${seg.c}" stroke="#0f172a" stroke-width="2"/>`;
  }).join(""):"";
  const lbl=tot>=1e8?(tot/1e8).toFixed(1)+"억":(tot/1e4).toFixed(0)+"만";
  return`
<div class="card-grad">
  <div style="font-size:12px;color:#64748b;margin-bottom:6px">총 평가 자산</div>
  <div style="font-size:32px;font-weight:800;letter-spacing:-1px">${won(tot)||"₩0"}</div>
  <div style="margin-top:8px;display:flex;gap:14px;flex-wrap:wrap">
    ${[{l:"미국주식",v:usT},{l:"한국주식",v:krxT},{l:"연금저축",v:penT},{l:"IRP",v:irpT},{l:"코인",v:coinsT},{l:"현금/예금",v:cashT}]
      .map(x=>`<span style="font-size:11px;color:#64748b">${x.l} <b style="color:#94a3b8">${pp(x.v)}%</b></span>`).join("")}
  </div>
</div>
<div class="card">
  <div style="font-weight:700;font-size:14px;margin-bottom:12px">자산 배분</div>
  <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
    <svg width="160" height="160" viewBox="0 0 160 160">
      ${donutPaths}
      <text x="${cx}" y="${cy-5}" text-anchor="middle" fill="#94a3b8" font-size="9">총자산</text>
      <text x="${cx}" y="${cy+8}" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="bold">${lbl}</text>
    </svg>
    <div style="flex:1;min-width:140px">
      ${segs.map(s=>`<div style="display:flex;justify-content:space-between;margin-bottom:7px;align-items:center">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:2px;background:${s.c}"></div><span style="font-size:12px">${s.l}</span></div>
        <div><span style="font-size:12px;font-weight:600">${won(s.v)}</span><span style="font-size:10px;color:#475569;margin-left:4px">${pp(s.v)}%</span></div>
      </div>`).join("")}
    </div>
  </div>
</div>
`;
}

function buildSection(title,list,key,accent,total){
  const isUSD=key==="us";
  const rows=list.map(item=>{
    const priceKrw=isUSD?usKrwPrice(item):(px[item.t]||null);
    const valKrw=isUSD?usVal(item):krxVal(item);
    const gp=isUSD?usGp(item):krxGp(item);
    const priceStr=priceKrw?won(priceKrw):`<span class="dim">—</span>`;
    if(editMode){return`<tr data-id="${item.id}" data-key="${key}">
      <td style="min-width:110px">
        <input class="inp" style="text-align:left;font-weight:600;font-size:12px;margin-bottom:3px" data-f="t" data-id="${item.id}" value="${item.t}" placeholder="티커"/>
        <input class="inp" style="text-align:left;font-size:10px;color:#94a3b8" data-f="n" data-id="${item.id}" value="${item.n}" placeholder="종목명"/>
      </td>
      <td class="r"><input class="inp" style="text-align:right" type="number" data-f="q" data-id="${item.id}" value="${item.q||""}" placeholder="0"/></td>
      <td class="r"><input class="inp" style="text-align:right" type="number" data-f="a" data-id="${item.id}" value="${item.a||""}" placeholder="${isUSD?"USD":"KRW"}"/></td>
      <td class="r" style="font-size:12px">${priceStr}</td>
      <td class="r" style="font-weight:600;font-size:13px" data-calc="val">${won(valKrw)||"₩0"}</td>
      <td class="r ${cls(gp)}" style="font-size:13px" data-calc="gp">${pct(gp)}</td>
      <td><button style="background:#7f1d1d;border:none;color:#fca5a5;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer" data-del="${item.id}" data-key="${key}">✕</button></td>
    </tr>`;}
    return`<tr>
      <td style="min-width:110px"><div style="font-weight:600;font-size:12px">${item.t}</div><div style="font-size:10px;color:#64748b;margin-top:1px">${item.n}</div></td>
      <td class="r" style="font-size:13px">${item.q}</td>
      <td class="r" style="font-size:12px;color:#94a3b8">${isUSD?usd(item.a):won(item.a)}</td>
      <td class="r" style="font-size:12px">${priceStr}</td>
      <td class="r" style="font-weight:600;font-size:13px">${won(valKrw)||"₩0"}</td>
      <td class="r ${cls(gp)}" style="font-size:13px;font-weight:700">${pct(gp)}</td>
      ${editMode?"<td></td>":""}
    </tr>`;
  }).join("");
  return`
<div class="card" style="border-top:3px solid ${accent}">
  <div class="card-hdr">
    <span style="font-weight:700;font-size:14px">${title}</span>
    <span style="font-weight:800;font-size:17px;color:${accent}">${won(total)||"₩0"}</span>
  </div>
  <div class="tbl-wrap"><table>
    <thead><tr>
      <th style="text-align:left">종목</th><th class="r">수량</th><th class="r">평단</th><th class="r">현재가(원)</th><th class="r">평가금액</th><th class="r">수익률</th>
      ${editMode?"<th></th>":""}
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  ${editMode?`<button class="add-btn" data-add="${key}">+ 종목 추가</button>`:""}
</div>`;
}

function buildCashTab(cashT){
  const rows=ST.cashItems.map(item=>{
    if(editMode){return`<tr data-id="${item.id}" data-key="cashItems">
      <td style="min-width:160px"><input class="inp" style="text-align:left;font-size:13px" data-f="n" data-id="${item.id}" value="${item.n}" placeholder="예) 예금, 적금, 주택청약"/></td>
      <td class="r"><input class="inp" style="text-align:right" type="number" data-f="a" data-id="${item.id}" value="${item.a||""}" placeholder="0"/></td>
      <td><button style="background:#7f1d1d;border:none;color:#fca5a5;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer" data-del="${item.id}" data-key="cashItems">✕</button></td>
    </tr>`;}
    return`<tr>
      <td style="font-size:13px;font-weight:500">${item.n}</td>
      <td class="r" style="font-size:13px;font-weight:600">${won(item.a)||"₩0"}</td>
    </tr>`;
  }).join("");
  return`
<div class="card" style="border-top:3px solid #475569">
  <div class="card-hdr">
    <span style="font-weight:700;font-size:14px">현금 / 예금</span>
    <span style="font-weight:800;font-size:17px;color:#94a3b8">${won(cashT)||"₩0"}</span>
  </div>
  <div class="tbl-wrap"><table>
    <thead><tr>
      <th style="text-align:left">항목</th>
      <th class="r">금액</th>
      ${editMode?"<th></th>":""}
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  ${editMode?`<button class="add-btn" data-add="cashItems">+ 항목 추가</button>`:""}
</div>`;
}

function buildCrypto(coinsT){
  const rows=ST.coins.map(item=>{
    const price=px[item.t]||0;
    const val=price?price*item.q:item.a*item.q;
    const gp=(price&&item.a)?((price-item.a)/item.a)*100:null;
    if(editMode){return`<tr data-id="${item.id}" data-key="coins">
      <td style="min-width:110px">
        <input class="inp" style="text-align:left;font-weight:600;font-size:12px;margin-bottom:3px" data-f="t" data-id="${item.id}" value="${item.t}" placeholder="ETH"/>
        <input class="inp" style="text-align:left;font-size:10px;color:#94a3b8" data-f="n" data-id="${item.id}" value="${item.n}" placeholder="코인명"/>
      </td>
      <td class="r"><input class="inp" style="text-align:right" type="number" step="0.0001" data-f="q" data-id="${item.id}" value="${item.q||""}" placeholder="0"/></td>
      <td class="r"><input class="inp" style="text-align:right" type="number" data-f="a" data-id="${item.id}" value="${item.a||""}" placeholder="KRW"/></td>
      <td class="r" style="font-size:12px">${price?won(price):"<span class='dim'>—</span>"}</td>
      <td class="r" style="font-weight:600;font-size:13px" data-calc="val">${won(val)||"₩0"}</td>
      <td class="r ${cls(gp)}" style="font-size:13px" data-calc="gp">${pct(gp)}</td>
      <td><button style="background:#7f1d1d;border:none;color:#fca5a5;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer" data-del="${item.id}" data-key="coins">✕</button></td>
    </tr>`;}
    return`<tr>
      <td style="min-width:110px"><div style="font-weight:600;font-size:12px">${item.t}</div><div style="font-size:10px;color:#64748b">${item.n}</div></td>
      <td class="r" style="font-size:13px">${item.q}</td>
      <td class="r" style="font-size:12px;color:#94a3b8">${won(item.a)}</td>
      <td class="r" style="font-size:12px">${price?won(price):"<span class='dim'>—</span>"}</td>
      <td class="r" style="font-weight:600;font-size:13px">${won(val)||"₩0"}</td>
      <td class="r ${cls(gp)}" style="font-size:13px;font-weight:700">${pct(gp)}</td>
    </tr>`;
  }).join("");
  return`
<div class="card" style="border-top:3px solid #3b82f6">
  <div class="card-hdr"><span style="font-weight:700;font-size:14px">코인 (업비트)</span><span style="font-weight:800;font-size:17px;color:#3b82f6">${won(coinsT)||"₩0"}</span></div>
  <div class="tbl-wrap"><table>
    <thead><tr>
      <th style="text-align:left">종목</th><th class="r">수량</th><th class="r">평단(원)</th><th class="r">현재가(원)</th><th class="r">평가금액</th><th class="r">수익률</th>
      ${editMode?"<th></th>":""}
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  ${editMode?`<button class="add-btn" data-add="coins">+ 코인 추가</button>`:""}
</div>`;
}

// ═══════════════════════════════════════════
// 이벤트
// ═══════════════════════════════════════════
function bindAll(){
  document.getElementById("btn-refresh")?.addEventListener("click",fetchAll);
  document.getElementById("btn-edit")?.addEventListener("click",()=>{editMode=!editMode;render();});
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{tab=b.dataset.tab;render();}));
  document.querySelectorAll("[data-add]").forEach(b=>b.addEventListener("click",()=>{
    const k=b.dataset.add,id=k+Date.now();
    if(k==="us")ST.us.push({id,t:"",n:"",q:0,a:0});
    else if(k==="pen")ST.pen.push({id,t:"",n:"",q:0,a:0});
    else if(k==="irp")ST.irp.push({id,t:"",n:"",q:0,a:0});
    else if(k==="coins")ST.coins.push({id,t:"",n:"",q:0,a:0});
    else if(k==="krx")ST.krx.push({id,t:"",n:"",q:0,a:0});
    else if(k==="cashItems")ST.cashItems.push({id,n:"새 항목",a:0});
    else ST.irp.push({id,t:"",n:"",q:0,a:0});
    render();
  }));

  // ── 핵심: input은 DOM만 업데이트, 리렌더 없음 ──
  document.querySelectorAll(".inp[data-id]").forEach(inp=>{
    const id=inp.dataset.id, f=inp.dataset.f;
    inp.addEventListener("input",e=>{
      const list=findList(id);
      const item=list?.find(x=>x.id===id);
      if(!item)return;
      const key2=inp.closest("tr")?.dataset.key;
      const isUSD=key2==="us";

      if(f==="t"){
        const v=e.target.value.toUpperCase();
        item.t=v; e.target.value=v;
        const key2=inp.closest("tr")?.dataset.key;
        const auto=key2==="us"?US_DB[v]:key2==="coins"?v:(KRX_DB[v]||KRX_STOCK_DB[v]);
        if(auto){item.n=auto;const ni=inp.closest("tr").querySelector('[data-f="n"]');if(ni)ni.value=auto;}
      } else if(f==="n"){
        item.n=e.target.value;
      } else {
        if(f==="q") item.q=Number(e.target.value)||0;
        if(f==="a") item.a=Number(e.target.value)||0;
        // 평가금액/수익률 셀만 즉시 갱신
        const tr=inp.closest("tr");
        const valKrw=isUSD?usVal(item):krxVal(item);
        const gp=isUSD?usGp(item):krxGp(item);
        const vc=tr.querySelector("[data-calc='val']");
        const gc2=tr.querySelector("[data-calc='gp']");
        if(vc)vc.textContent=valKrw?won(valKrw):"₩0";
        if(gc2){gc2.textContent=pct(gp);gc2.className=`r ${cls(gp)}`;}
      }
      sv();
    });
  });

  document.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>{
    const id=b.dataset.del,key=b.dataset.key;
    if(key==="us")ST.us=ST.us.filter(x=>x.id!==id);
    else if(key==="pen")ST.pen=ST.pen.filter(x=>x.id!==id);
    else if(key==="irp")ST.irp=ST.irp.filter(x=>x.id!==id);
    else if(key==="coins")ST.coins=ST.coins.filter(x=>x.id!==id);
    else if(key==="krx")ST.krx=ST.krx.filter(x=>x.id!==id);
    else if(key==="cashItems")ST.cashItems=ST.cashItems.filter(x=>x.id!==id);
    render();
  }));


}

function findList(id){
  if(ST.us.find(x=>x.id===id))return ST.us;
  if(ST.pen.find(x=>x.id===id))return ST.pen;
  if(ST.irp.find(x=>x.id===id))return ST.irp;
  if(ST.coins.find(x=>x.id===id))return ST.coins;
  if(ST.krx.find(x=>x.id===id))return ST.krx;
  if(ST.cashItems.find(x=>x.id===id))return ST.cashItems;
  return null;
}

// ═══════════════════════════════════════════
// 시작
// ═══════════════════════════════════════════
render();
fetchAll();
setInterval(fetchAll,60000);
</script>
